<!DOCTYPE html>
<html>
<head>
  <title>Payit - v3.3 (fixed + supabase)</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
      background:#1c1c1e;
      color:#e5e5e7;
      font-size:15px;
    }

    .container{display:flex;height:100vh;}

    .sidebar{
      width:260px;
      background:#2a2a2d;
      padding:18px;
      border-right:1px solid #3a3a3d;
    }

    .account{
      padding:10px 12px;
      border-radius:6px;
      margin-bottom:6px;
      cursor:pointer;
    }

    .account.active{background:#3f8cff;color:white;}

    .add-account-btn,.cat-btn{
      width:100%;
      padding:10px;
      margin-top:8px;
      background:#3a3a3d;
      border:none;
      color:#ccc;
      border-radius:6px;
      cursor:pointer;
    }

    .main{flex:1;padding:24px;}

    .topbar{
      display:flex;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .total-box{
      background:#ff9f43;
      color:#000;
      padding:6px 12px;
      border-radius:6px;
      font-weight:600;
    }

    .add-btn{
      background:#3f8cff;
      width:36px;
      height:36px;
      border-radius:10px;
      border:none;
      color:white;
      cursor:pointer;
    }

    table{width:100%;border-collapse:collapse;}

    th,td{
      padding:8px;
      border-bottom:1px solid #333;
    }

    td:nth-child(4){text-align:right;}

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#2a2a2d;
      padding:20px;
      border-radius:10px;
      width:420px;
    }

    .label{
      font-size:12px;
      color:#888;
      margin-top:10px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin-top:4px;
      background:#1c1c1e;
      border:1px solid #3a3a3d;
      color:white;
      border-radius:6px;
    }

    .btn-row{display:flex;gap:8px;margin-top:16px;}

    .btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .save{background:#4caf50;}
    .cancel{background:#555;}

  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
</div>

<div class="main">

<div class="topbar">
  <div id="total" class="total-box"></div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr>
  <th>ST</th>
  <th>Datum</th>
  <th>Categorie</th>
  <th>Bedrag</th>
  <th>Memo</th>
</tr>
</thead>
<tbody id="transactions-body"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<label class="label">Datum</label>
<input type="date" id="date">

<label class="label">Categorie</label>
<input type="text" id="category">

<label class="label">Memo</label>
<input type="text" id="memo">

<label class="label">Inkomsten</label>
<input type="number" id="income">

<label class="label">Uitgaven</label>
<input type="number" id="expense">

<label class="label">Status</label>
<select id="status">
  <option value="pending">Afwachtend</option>
  <option value="confirmed">Bevestigd</option>
</select>

<div class="btn-row">
  <button class="btn cancel" onclick="closeModal()">Annuleren</button>
  <button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://oubutokvbhfifihjgiiy.supabase.co",
  "sb_publishable_duu2yC3c_-vwRMAam-LyXg_LLegwzo-"
);

let categories = JSON.parse(localStorage.getItem('payit_categories')) || [
"Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW"
];

let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];

function formatCurrency(n){
  return "€ "+Number(n).toLocaleString('nl-BE',{minimumFractionDigits:2});
}

function renderTransactions(){
  const tbody=document.getElementById('transactions-body');
  tbody.innerHTML='';

  let total=0;

  transactions.forEach(t=>{
    total+=Number(t.amount);

    tbody.innerHTML+=`
    <tr>
      <td>•</td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>${formatCurrency(t.amount)}</td>
      <td>${t.memo||''}</td>
    </tr>`;
  });

  document.getElementById('total').innerText="Totaal: "+formatCurrency(total);
}

function openModal(){modal.style.display='flex';}
function closeModal(){modal.style.display='none';}

async function saveTransaction(){

  if(!categories.includes(category.value)){
    alert("Categorie bestaat niet");
    return;
  }

  let amount=income.value
    ? parseFloat(income.value)
    : -parseFloat(expense.value||0);

  let data={
    date:date.value,
    category:category.value,
    memo:memo.value,
    amount,
    status:status.value,
    accountId:'1'
  };

  transactions.push(data);
  localStorage.setItem('payit_transactions',JSON.stringify(transactions));

  await supabase.from('transactions').insert([data]);

  closeModal();
  renderTransactions();
}

function addAccount(){
  alert("Nog niet gekoppeld");
}

renderTransactions();

</script>

</body>
</html>
