<!DOCTYPE html>
<html>
<head>
  <title>Payit - V4 Ultra</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
      color: #e5e7eb;
      font-size: 18px;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 24px;
      gap: 24px;
      box-sizing: border-box;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(15,23,42,0.9), rgba(2,6,23,0.95));
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px rgba(255,255,255,0.05), 0 40px 100px rgba(0,0,0,0.9);
    }

    .sidebar h2 {
      font-size: 18px;
      color: #34d399;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .account-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .account {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .account:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(4px);
    }

    .account.active {
      background: linear-gradient(135deg, #34d399, #059669);
      box-shadow: 0 0 20px rgba(52,211,153,0.6);
      color: white;
    }

    .acc-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #9ca3af;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-acc-btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 12px;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.2);
      color: #9ca3af;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-acc-btn:hover {
      border-color: #34d399;
      color: #34d399;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 30px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9));
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px rgba(255,255,255,0.05), 0 40px 120px rgba(0,0,0,1);
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .topbar h2 {
      font-size: 26px;
      font-weight: 600;
    }

    .add-btn {
      background: linear-gradient(135deg, #fb923c, #ea580c);
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(249,115,22,0.6);
      transition: 0.2s;
    }

    .add-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    /* ===== TABLE → CARD STYLE ===== */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
    }

    th {
      padding: 12px;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    tr {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      transition: all 0.2s ease;
    }

    tr:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    td {
      padding: 18px 14px;
    }

    td:first-child { border-radius: 14px 0 0 14px; }
    td:last-child { border-radius: 0 14px 14px 0; }

    td:nth-child(4) {
      font-size: 20px;
      font-weight: 600;
      text-align: right;
    }

    td:nth-child(5) {
      color: #94a3b8;
      font-size: 14px;
    }

    /* ===== STATUS ===== */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .green {
      background: #34d399;
      box-shadow: 0 0 12px #34d399;
    }

    .red {
      background: #ef4444;
      box-shadow: 0 0 12px #ef4444;
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(40px);
      padding: 30px;
      border-radius: 20px;
      width: 480px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 30px 80px rgba(0,0,0,1);
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .save-btn { background: linear-gradient(135deg,#fb923c,#ea580c); color:white; }
    .duplicate-btn { background:#3b82f6; color:white; }
    .delete-btn { background:transparent; color:#ef4444; border:1px solid #ef4444; }
    .close-btn { background:#555; color:white; }

  </style>
</head>
<body>
