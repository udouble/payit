<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: white; }
    .container { display: flex; height: 100vh; }

    /* Sidebar Styling */
    .sidebar { width: 250px; background: #2b2b2b; padding: 20px; border-right: 1px solid #444; }
    
    .account {
      padding: 12px;
      margin-bottom: 8px;
      background: #3a3a3a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .account:hover { background: #4a4a4a; }
    .account.active { background: #4caf50; font-weight: bold; }

    /* Main Content */
    .main { flex: 1; padding: 20px; overflow-y: auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .add-btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Table Styling */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 12px 5px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    th { cursor: pointer; color: #888; font-size: 0.9em; user-select: none; }
    th:hover { color: white; }

    th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 110px; }
    th:nth-child(3), td:nth-child(3) { width: 150px; }
    th:nth-child(4), td:nth-child(4) { width: 100px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 20px; color: #aaa; }

    tr:hover { background: #2a2a2a; cursor: pointer; }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .green { background: #4caf50; box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
    .red { background: #ff4444; box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #2b2b2b;
      padding: 30px;
      border-radius: 12px;
      width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .modal-content h3 {
      margin-top: 0;
      font-size: 22px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .modal-content label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #bbb;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-content input, 
    .modal-content select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: white;
      box-sizing: border-box;
      font-size: 18px;
    }

    .modal-content input:focus, 
    .modal-content select:focus {
      outline: 2px solid #4caf50;
      border-color: transparent;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }

    .save-btn { background: #4caf50; color: white; }
    .delete-btn { background: #ff4444; color: white; margin-top: 25px; }
    .close-btn { background: #555; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="sortBy('status')">ST</th>
          <th onclick="sortBy('date')">Datum</th>
          <th onclick="sortBy('category')">Categorie</th>
          <th onclick="sortBy('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Nieuwe transactie</h3>
    
    <label for="date">Datum</label>
    <input type="date" id="date">
    
    <label for="category">Categorie</label>
    <input type="text" id="category" placeholder="Bijv. Boodschappen">
    
    <label for="memo">Memo</label>
    <input type="text" id="memo" placeholder="Optioneel">
    
    <label for="amount">Bedrag</label>
    <input type="number" id="amount" step="0.01" placeholder="0.00">
    
    <label for="status">Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    
    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
    <button class="btn delete-btn" id="delete-btn" onclick="deleteTransaction()" style="display:none;">Verwijder Transactie</button>
  </div>
</div>

    { id: '1', name: 'Privé' },
    { id: '2', name: 'VOF' }
  ];

  // Default instelling: Status sorteren, Afwachtend eerst
  let currentSort = {
    field: 'status',
    direction: 'asc'
  };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    accounts.forEach(acc => {
      const div = document.createElement('div');
      div.className = `account ${acc.id === activeAccountId ? 'active' : ''}`;
      div.innerText = acc.name;
      div.onclick = () => {
        activeAccountId = acc.id;
        renderAccounts();
        renderTransactions();
      };
      list.appendChild(div);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId);
    document.getElementById('current-account-title').innerText = activeAcc ? activeAcc.name : 'Transacties';
  }
