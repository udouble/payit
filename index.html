<!DOCTYPE html>
<html>
<head>
  <title>Payit - v2.3 (dropdown fix + categoriebeheer)</title>

  <style>
    body { margin:0; font-family:Arial; background:#1e1e1e; color:white; font-size:20px;}
    .container{display:flex;height:100vh;}

    .sidebar{width:300px;background:#2b2b2b;padding:25px;border-right:1px solid #444;}
    .account{padding:12px;background:#3a3a3a;border-radius:6px;margin-bottom:10px;cursor:pointer;}
    .account.active{background:#4caf50;font-weight:bold;}

    .add-account-btn,
    .cat-btn{
      width:100%;
      padding:16px;
      margin-top:10px;
      background:#444;
      border:none;
      color:white;
      border-radius:8px;
      font-size:20px;
      cursor:pointer;
    }

    .main{flex:1;padding:30px;}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}

    .add-btn{background:#4caf50;padding:14px 20px;border:none;color:white;border-radius:8px;font-size:26px;cursor:pointer;}
    .filter-btn{background:#444;padding:14px 18px;border:none;color:white;border-radius:8px;font-size:18px;cursor:pointer;}

    .total-box{background:#fb923c;color:black;padding:12px 18px;border-radius:10px;font-weight:bold;}

    table{width:100%;border-collapse:collapse;}
    th,td{padding:12px;border-bottom:1px solid #333;}
    th{color:#aaa;}

    .positive{color:#4caf50;}
    .negative{color:#ff5252;}

    .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
    .green{background:#4caf50;}
    .red{background:#ff5252;}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
    .modal-content{background:#2b2b2b;padding:30px;border-radius:12px;width:500px;}

    input,select{
      width:100%;
      padding:18px;
      margin-top:12px;
      background:#1a1a1a;
      border:1px solid #444;
      color:white;
      border-radius:8px;
      font-size:20px;
      box-sizing:border-box;
    }

    /* 🔥 FIX: dropdowns terug normaal groot */
    select{
      height:56px;
      font-size:20px;
    }

    .amount-row{display:flex;gap:10px;}

    .btn-row{display:flex;gap:12px;margin-top:20px;}
    .btn{flex:1;padding:16px;border:none;border-radius:8px;font-size:18px;cursor:pointer;}

    .save{background:#4caf50;}
    .cancel{background:#666;}
    .dup{background:#2196F3;}
    .del{background:#ff5252;}

    .autocomplete-box{position:relative;}
    .autocomplete-list{
      position:absolute;
      width:100%;
      background:#1a1a1a;
      border:1px solid #444;
      max-height:200px;
      overflow-y:auto;
      z-index:10;
    }
    .autocomplete-item{padding:10px;cursor:pointer;}
    .autocomplete-item:hover{background:#333;}

    /* categorie modal */
    .cat-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>

  <button class="cat-btn" onclick="openCatModal()">Categorieën beheren</button>
</div>

<div class="main">

<div class="topbar">
  <div style="display:flex;gap:10px;">
    <div id="total" class="total-box"></div>
    <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr>
  <th>ST</th>
  <th>Datum</th>
  <th>Categorie</th>
  <th>Bedrag</th>
  <th>Memo</th>
</tr>
</thead>
<tbody id="transactions"></tbody>
</table>

</div>
</div>

<!-- TRANSACTIE MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input type="date" id="date">

<div class="autocomplete-box">
  <input type="text" id="category" placeholder="Categorie" oninput="filterCategories()">
  <div id="category-list" class="autocomplete-list"></div>
</div>

<input type="text" id="memo" placeholder="Memo">

<div class="amount-row">
  <input type="number" id="income" placeholder="Inkomsten">
  <input type="number" id="expense" placeholder="Uitgaven">
</div>

<select id="status">
  <option value="pending">Afwachtend</option>
  <option value="confirmed">Bevestigd</option>
</select>

<select id="target-account"></select>

<div class="btn-row">
  <button class="btn dup" onclick="duplicateTransaction()">Dupliceren</button>
  <button class="btn del" onclick="deleteTransaction()">Verwijderen</button>
</div>

<div class="btn-row">
  <button class="btn cancel" onclick="closeModal()">Annuleren</button>
  <button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<!-- CATEGORIE MODAL -->
<div class="cat-modal" id="catModal">
<div class="modal-content">
  <h3>Categorieën</h3>

  <div id="catList"></div>

  <input type="text" id="newCat" placeholder="Nieuwe categorie">

  <div class="btn-row">
    <button class="btn save" onclick="addCategory()">Toevoegen</button>
    <button class="btn cancel" onclick="closeCatModal()">Sluiten</button>
  </div>
</div>
</div>

<script>

/* DATA */
let categories = JSON.parse(localStorage.getItem('payit_categories')) || ["Apple Pay","Bancontact","BTW"];
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id:'1',name:'Privé'}];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = accounts[0].id;
let editingId=null;
let showConfirmed=false;

/* CATEGORY AUTOCOMPLETE */
function filterCategories(){
  const val=document.getElementById('category').value.toLowerCase();
  const list=document.getElementById('category-list');
  list.innerHTML='';
  categories.filter(c=>c.toLowerCase().includes(val)).forEach(c=>{
    let div=document.createElement('div');
    div.className='autocomplete-item';
    div.innerText=c;
    div.onclick=()=>{document.getElementById('category').value=c;list.innerHTML='';};
    list.appendChild(div);
  });
}

/* CLICK OUTSIDE FIX */
document.addEventListener('click',e=>{
  if(!document.getElementById('category').contains(e.target))
    document.getElementById('category-list').innerHTML='';
});

/* CATEGORY MANAGEMENT */
function openCatModal(){
  document.getElementById('catModal').style.display='flex';
  renderCatList();
}
function closeCatModal(){
  document.getElementById('catModal').style.display='none';
}
function renderCatList(){
  const div=document.getElementById('catList');
  div.innerHTML='';
  categories.forEach(c=>{
    div.innerHTML+=`<div>${c}</div>`;
  });
}
function addCategory(){
  const val=document.getElementById('newCat').value;
  if(val){
    categories.push(val);
    localStorage.setItem('payit_categories',JSON.stringify(categories));
    renderCatList();
  }
}

/* BASIC APP (ongewijzigd) */
function formatCurrency(n){return "€ "+Number(n).toLocaleString('nl-BE',{minimumFractionDigits:2});}

function renderAccounts(){
  const list=document.getElementById('accounts-list');
  list.innerHTML='';
  accounts.forEach(a=>{
    list.innerHTML+=`<div class="account ${a.id===activeAccountId?'active':''}" onclick="selectAccount('${a.id}')">${a.name}</div>`;
  });

  const sel=document.getElementById('target-account');
  sel.innerHTML='';
  accounts.forEach(a=>{
    let o=document.createElement('option');
    o.value=a.id;o.innerText=a.name;
    sel.appendChild(o);
  });
}

function renderTransactions(){
  const tbody=document.getElementById('transactions');
  tbody.innerHTML='';
  let data=transactions.filter(t=>t.accountId===activeAccountId);

  let total=0;

  data.forEach(t=>{
    total+=Number(t.amount);
    tbody.innerHTML+=`
    <tr onclick="openModal('${t.id}')">
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td class="${t.amount<0?'negative':'positive'}">${formatCurrency(t.amount)}</td>
      <td>${t.memo||''}</td>
    </tr>`;
  });

  document.getElementById('total').innerText="Totaal: "+formatCurrency(total);
}

function openModal(id=null){
  editingId=id;
  document.getElementById('modal').style.display='flex';

  if(id){
    const t=transactions.find(x=>x.id===id);
    document.getElementById('date').value=t.date;
    document.getElementById('category').value=t.category;
    document.getElementById('memo').value=t.memo;
    document.getElementById('status').value=t.status;

    if(t.amount>=0) document.getElementById('income').value=t.amount;
    else document.getElementById('expense').value=Math.abs(t.amount);

    document.getElementById('target-account').value=t.accountId;
  } else {
    document.getElementById('date').value=new Date().toISOString().split('T')[0];
  }
}

function closeModal(){document.getElementById('modal').style.display='none';}

function saveTransaction(){
  let amount=0;
  if(income.value) amount=parseFloat(income.value);
  else if(expense.value) amount=-parseFloat(expense.value);

  const data={
    id:editingId||Date.now().toString(),
    date:date.value,
    category:category.value,
    memo:memo.value,
    amount,
    status:status.value,
    accountId:editingId?target-account.value:activeAccountId
  };

  if(editingId){
    const i=transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else transactions.push(data);

  localStorage.setItem('payit_transactions',JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function addAccount(){
  const n=prompt("Naam rekening:");
  if(n){accounts.push({id:Date.now().toString(),name:n});renderAccounts();}
}

function selectAccount(id){
  activeAccountId=id;
  renderAccounts();
  renderTransactions();
}

renderAccounts();
renderTransactions();

</script>

</body>
</html>
