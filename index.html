<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.0</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top left, #1e293b, #0f172a, #020617);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #10b981;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: var(--bg-gradient); 
      background-attachment: fixed;
      color: var(--text-main); 
      font-size: 20px; 
      height: 100vh;
      overflow: hidden;
    }

    .container { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { 
      width: 300px; 
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(10px);
      padding: 40px 20px; 
      border-right: 1px solid var(--glass-border); 
    }
    
    .sidebar h2 { 
      font-size: 12px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      color: var(--accent); 
      margin-bottom: 30px; 
      padding-left: 15px;
    }

    .account-item { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }

    .account { 
      flex: 1; 
      padding: 14px 18px; 
      background: var(--glass); 
      border: 1px solid var(--glass-border);
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 18px;
    }

    .account:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
    .account.active { 
      background: var(--accent); 
      color: white; 
      font-weight: 600; 
      border-color: transparent;
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
    }

    .acc-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
      width: 38px; height: 38px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-acc-btn { 
      width: calc(100% - 10px);
      margin-top: 25px;
      padding: 14px; 
      background: transparent; 
      border: 1px dashed #475569; 
      color: var(--text-dim); 
      border-radius: 12px; 
      cursor: pointer;
    }

    /* Main Content */
    .main { flex: 1; padding: 50px 60px; overflow-y: auto; }
    
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .topbar h2 { font-size: 36px; font-weight: 800; letter-spacing: -1px; }

    .add-btn { 
      background: var(--accent); 
      border: none; color: white; 
      width: 54px; height: 54px; 
      border-radius: 16px; 
      font-size: 28px; 
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
      transition: transform 0.2s;
    }
    .add-btn:hover { transform: scale(1.05); }

    /* Table - Ruimteverdeling aangepast */
    table { width: 100%; border-collapse: collapse; }
    
    th { 
      padding: 15px 10px; 
      text-align: left; 
      color: var(--text-dim); 
      font-size: 13px; 
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--glass-border);
    }
