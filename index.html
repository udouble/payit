<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.17</title>

<style>
body { margin:0; font-family:Arial; background:#1e1e1e; color:white; font-size:20px; }
.container { display:flex; height:100vh; }

.sidebar { width:300px; background:#2b2b2b; padding:25px; }
.account { padding:12px; background:#3a3a3a; border-radius:6px; margin-bottom:10px; cursor:pointer; }
.account.active { background:#4caf50; }

.main { flex:1; padding:30px; }

.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; }
.modal-content { background:#2b2b2b; padding:30px; border-radius:12px; width:480px; }

.modal-content input,
.modal-content select {
  width:100%;
  padding:16px;
  margin-top:8px;
  background:#1a1a1a;
  border:1px solid #444;
  color:white;
  border-radius:8px;
  font-size:20px;
  height:56px;
  box-sizing:border-box;
}

.modal-content label {
  display:block;
  margin-top:18px;
  font-size:16px;
  color:#aaa;
}

.amount-grid { display:flex; gap:12px; }

.btn-row { display:flex; gap:12px; margin-top:20px; }
.btn { flex:1; padding:16px; font-size:18px; border-radius:8px; cursor:pointer; border:none; }

.save-btn { background:#4caf50; color:white; }
.close-btn { background:#555; color:white; }
.duplicate-btn { background:#2196F3; color:white; }
.delete-btn { border:1px solid #ff5252; color:#ff5252; background:transparent; }

.button-section { margin-top:30px; }
.hidden { visibility:hidden; }

.total-box {
  background:#fb923c;
  color:black;
  padding:14px 18px;
  border-radius:10px;
  font-weight:bold;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
</div>

<div class="main">
  <h2 id="current-account-title"></h2>
  <button onclick="openModal()">＋</button>

  <div id="total" class="total-box"></div>

  <table>
    <thead>
      <tr><th>ST</th><th>Datum</th><th>Categorie</th><th>Bedrag</th><th>Memo</th></tr>
    </thead>
    <tbody id="transactions"></tbody>
  </table>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <label>Datum</label>
    <input type="date" id="date">

    <label>Categorie</label>
    <input type="text" id="category">

    <label>Memo</label>
    <input type="text" id="memo">

    <label>Bedrag</label>
    <div class="amount-grid">
      <input type="number" id="income" placeholder="Inkomsten">
      <input type="number" id="expense" placeholder="Uitgaven">
    </div>

    <select id="status">
