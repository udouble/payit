<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.24</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: white; font-size: 20px; }
    .container { display: flex; height: 100vh; }

    .sidebar { width: 300px; background: #2b2b2b; padding: 25px; border-right: 1px solid #444; }
    .sidebar h2 { font-size: 24px; color: #4caf50; margin-bottom: 20px; }

    .account { padding: 12px 15px; background: #3a3a3a; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
    .account.active { background: #4caf50; font-weight: bold; }

    .add-account-btn {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      background: #444;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    .main { flex: 1; padding: 30px; overflow-y: auto; }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .left-controls { display:flex; align-items:center; gap:12px; }

    .add-btn {
      background:#4caf50;
      border:none;
      color:white;
      padding:14px 20px;
      border-radius:8px;
      font-size:22px;
      cursor:pointer;
    }

    .filter-btn {
      background:#444;
      border:none;
      color:white;
      padding:14px 18px;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
    }

    .total-box {
      background:#fb923c;
      color:black;
      padding:12px 18px;
      border-radius:10px;
      font-weight:bold;
    }

    table { width:100%; border-collapse: collapse; }

    th {
      padding:15px 10px;
      text-align:left;
      color:#888;
      border-bottom:2px solid #333;
      font-size:16px;
    }

    td {
      padding:14px 10px;
      border-bottom:1px solid #222;
    }

    th:nth-child(1), td:nth-child(1) { width:50px; text-align:center; }
    th:nth-child(2), td:nth-child(2) { width:140px; }
    th:nth-child(3), td:nth-child(3) { width:220px; }
    th:nth-child(4), td:nth-child(4) { width:140px; text-align:right; }

    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .green { background:#4caf50; }
    .red { background:#ff5252; }

    .positive { color:#4caf50; }
    .negative { color:#ff5252; }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#2b2b2b;
      padding:30px;
      border-radius:12px;
      width:480px;
    }

    .modal-content input,
    .modal-content select {
      width:100%;
      padding:16px;
      margin-top:12px;
      background:#1a1a1a;
      border:1px solid #444;
      color:white;
      border-radius:8px;
      font-size:20px;
      height:56px;
      box-sizing:border-box;
    }

    .amount-row {
      display:flex;
      gap:10px;
    }

    .btn-row {
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    .btn {
      flex:1;
      padding:16px;
      border:none;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
    }

    .save { background:#4caf50; }
    .cancel { background:#666; }
    .dup { background:#2196F3; }
    .del { background:#ff5252; }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">

    <div class="topbar">
      <div class="left-controls">
        <div id="total" class="total-box"></div>
        <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
      </div>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ST</th>
          <th>Datum</th>
          <th>Categorie</th>
          <th>Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>

  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo">

    <div class="amount-row">
      <input type="number" id="income" placeholder="Inkomsten">
      <input type="number" id="expense" placeholder="Uitgaven">
    </div>

    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <select id="target-account"></select>

    <div class="btn-row">
      <button class="btn dup" onclick="duplicateTransaction()">Dupliceren</button>
      <button class="btn del" onclick="deleteTransaction()">Verwijderen</button>
    </div>

    <div class="btn-row">
      <button class="btn cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn save" onclick="saveTransaction()">Opslaan</button>
    </div>
  </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id:'1', name:'Privé' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = localStorage.getItem('active_account') || accounts[0].id;
let editingId = null;
let showConfirmed = false;

function formatCurrency(n){
  return "€ " + Number(n).toLocaleString('nl-BE', {minimumFractionDigits:2});
}

function renderAccounts(){
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';

  accounts.forEach(acc=>{
    const div = document.createElement('div');
    div.className = 'account '+(acc.id===activeAccountId?'active':'');
    div.innerText = acc.name;
    div.onclick = ()=>{
      activeAccountId = acc.id;
      localStorage.setItem('active_account', acc.id);
      renderAccounts();
      renderTransactions();
    };
    list.appendChild(div);
  });

  const select = document.getElementById('target-account');
  select.innerHTML = '';
  accounts.forEach(acc=>{
    const opt = document.createElement('option');
    opt.value = acc.id;
    opt.innerText = acc.name;
    select.appendChild(opt);
  });
}

function renderTransactions(){
  const tbody = document.getElementById('transactions');
  tbody.innerHTML = '';

  let data = transactions.filter(t=>t.accountId===activeAccountId);

  let pending = data.filter(t=>t.status!=='confirmed');
  let confirmed = data.filter(t=>t.status==='confirmed');

  data = showConfirmed ? [...pending, ...confirmed] : pending;

  let total = 0;

  data.forEach(t=>{
    total += Number(t.amount);

    const tr = document.createElement('tr');
    tr.onclick = ()=>openModal(t.id);

    tr.innerHTML = `
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td class="${t.amount<0?'negative':'positive'}">${formatCurrency(t.amount)}</td>
      <td>${t.memo||''}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById('total').innerText = "Totaal: " + formatCurrency(total);
}

function toggleConfirmed(){
  showConfirmed = !showConfirmed;
  document.getElementById('filterBtn').innerText =
    showConfirmed ? "Verberg bevestigd" : "Toon bevestigd";
  renderTransactions();
}

function openModal(id=null){
  editingId = id;
  document.getElementById('modal').style.display='flex';

  income.value = '';
  expense.value = '';

  if(id){
    const t = transactions.find(x=>x.id===id);
    date.value = t.date;
    category.value = t.category;
    memo.value = t.memo;
    status.value = t.status;

    if(t.amount >= 0){
      income.value = t.amount;
    } else {
      expense.value = Math.abs(t.amount);
    }

    document.getElementById('target-account').value = t.accountId;
  } else {
    date.value = new Date().toISOString().split('T')[0];
    category.value = '';
    memo.value = '';
    status.value = 'pending';
  }
}

function saveTransaction(){
  let amount = 0;

  if(income.value){
    amount = parseFloat(income.value);
  } else if(expense.value){
    amount = -parseFloat(expense.value);
  }

  const data = {
    id: editingId || Date.now().toString(),
    date: date.value,
    category: category.value,
    memo: memo.value,
    amount: amount,
    status: status.value,
    accountId: editingId ? target-account.value : activeAccountId
  };

  if(editingId){
    const i = transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

function duplicateTransaction(){
  if(!editingId) return;
  const t = transactions.find(x=>x.id===editingId);
  transactions.push({...t, id: Date.now().toString(), accountId: activeAccountId});
  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function deleteTransaction(){
  if(editingId && confirm('Wissen?')){
    transactions = transactions.filter(t=>t.id!==editingId);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }
}

function addAccount(){
  const n = prompt("Naam rekening:");
  if(n){
    const id = Date.now().toString();
    accounts.push({id, name:n});
    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    renderAccounts();
  }
}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
