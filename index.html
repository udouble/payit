<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.2</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: white; font-size: 20px; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #2b2b2b; padding: 25px; border-right: 1px solid #444; }

    .account { padding: 12px; background: #3a3a3a; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
    .account.active { background: #4caf50; font-weight: bold; }

    .add-account-btn {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      background: #444;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
    }

    .main { flex: 1; padding: 30px; overflow-y: auto; }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .left-controls { display: flex; gap: 12px; align-items: center; }

    .add-btn { background: #4caf50; padding: 14px 20px; border: none; color: white; border-radius: 8px; font-size: 26px; cursor: pointer; }

    .filter-btn { background: #444; padding: 14px 18px; border: none; color: white; border-radius: 8px; font-size: 18px; cursor: pointer; }

    .total-box { background: #fb923c; color: black; padding: 12px 18px; border-radius: 10px; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 15px 10px; text-align: left; color: #888; border-bottom: 2px solid #333; cursor: pointer; }
    td { padding: 15px 10px; border-bottom: 1px solid #222; }

    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 140px; }
    th:nth-child(3), td:nth-child(3) { width: 200px; }
    th:nth-child(4), td:nth-child(4) { width: 140px; text-align: right; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .green { background: #4caf50; }
    .red { background: #ff5252; }

    .positive { color: #4caf50; }
    .negative { color: #ff5252; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #2b2b2b; padding: 30px; border-radius: 12px; width: 480px; }

    .modal-content input, .modal-content select {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      font-size: 20px;
      box-sizing: border-box;
    }

    .amount-row { display: flex; gap: 10px; }

    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn { flex: 1; padding: 16px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }

    .save { background: #4caf50; }
    .cancel { background: #666; }
    .dup { background: #2196F3; }
    .del { background: #ff5252; }

    .autocomplete-box { position: relative; }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      margin-top: 4px;
      background: #1a1a1a;
      border: 1px solid #444;
      max-height: 200px;
      overflow-y: auto;
      z-index: 2000;
    }

    .autocomplete-item {
      padding: 10px;
      cursor: pointer;
    }

    .autocomplete-item:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
</div>

<div class="main">

<div class="topbar">
  <div class="left-controls">
    <div id="total" class="total-box"></div>
    <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr>
  <th onclick="toggleSort('status')">ST</th>
  <th onclick="toggleSort('date')">Datum</th>
  <th onclick="toggleSort('category')">Categorie</th>
  <th onclick="toggleSort('amount')">Bedrag</th>
  <th>Memo</th>
</tr>
</thead>
<tbody id="transactions"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<input type="date" id="date">

<div class="autocomplete-box">
  <input type="text" id="category" placeholder="Categorie" oninput="filterCategories()">
  <div id="category-list" class="autocomplete-list"></div>
</div>

<input type="text" id="memo" placeholder="Memo">

<div class="amount-row">
  <input type="number" id="income" placeholder="Inkomsten">
  <input type="number" id="expense" placeholder="Uitgaven">
</div>

<select id="status">
  <option value="pending">Afwachtend</option>
  <option value="confirmed">Bevestigd</option>
</select>

<select id="target-account"></select>

<div class="btn-row">
  <button class="btn dup" onclick="duplicateTransaction()">Dupliceren</button>
  <button class="btn del" onclick="deleteTransaction()">Verwijderen</button>
</div>

<div class="btn-row">
  <button class="btn cancel" onclick="closeModal()">Annuleren</button>
  <button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<script>

let categories = JSON.parse(localStorage.getItem('payit_categories')) || [
"Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW"
];

function filterCategories() {
  const input = document.getElementById('category').value.toLowerCase();
  const list = document.getElementById('category-list');
  list.innerHTML = '';

  const matches = categories.filter(c => c.toLowerCase().includes(input));

  matches.forEach(c => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.innerText = c;
    div.onclick = () => {
      document.getElementById('category').value = c;
      list.innerHTML = '';
    };
    list.appendChild(div);
  });
}

/* CLICK OUTSIDE FIX */
document.addEventListener('click', function(e) {
  const input = document.getElementById('category');
  const list = document.getElementById('category-list');

  if (!input.contains(e.target) && !list.contains(e.target)) {
    list.innerHTML = '';
  }
});

/* rest identiek aan 2.0 */

let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = localStorage.getItem('active_account') || accounts[0].id;
let editingId = null;
let showConfirmed = false;
let sortConfig = { field: 'status', direction: 'asc' };

function formatCurrency(n) {
  return "€ " + Number(n).toLocaleString('nl-BE', { minimumFractionDigits: 2 });
}

function renderAccounts() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';
  accounts.forEach(acc => {
    list.innerHTML += `<div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>`;
  });

  const sel = document.getElementById('target-account');
  sel.innerHTML = '';
  accounts.forEach(a => {
    const o = document.createElement('option');
    o.value = a.id;
    o.innerText = a.name;
    sel.appendChild(o);
  });
}

function renderTransactions() {
  const tbody = document.getElementById('transactions');
  tbody.innerHTML = '';

  let data = transactions.filter(t => t.accountId === activeAccountId);

  let pending = data.filter(t => t.status !== 'confirmed');
  let confirmed = data.filter(t => t.status === 'confirmed');

  data = showConfirmed ? [...pending, ...confirmed] : pending;

  data.sort((a, b) => {
    let vA = a[sortConfig.field] || "";
    let vB = b[sortConfig.field] || "";

    if (sortConfig.field === 'amount') {
      vA = parseFloat(a.amount) || 0;
      vB = parseFloat(b.amount) || 0;
    }

    if (sortConfig.field === 'status') {
      vA = a.status === 'pending' ? 0 : 1;
      vB = b.status === 'pending' ? 0 : 1;
    }

    if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
    if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;

    return (b.date || "").localeCompare(a.date || "");
  });

  let total = 0;

  data.forEach(t => {
    total += Number(t.amount);

    tbody.innerHTML += `
    <tr onclick="openModal('${t.id}')">
      <td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
      <td>${t.date || ''}</td>
      <td>${t.category || ''}</td>
      <td class="${t.amount < 0 ? 'negative' : 'positive'}">${formatCurrency(t.amount)}</td>
      <td>${t.memo || ''}</td>
    </tr>`;
  });

  document.getElementById('total').innerText = "Totaal: " + formatCurrency(total);
}

function toggleSort(field) {
  sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc';
  sortConfig.field = field;
  renderTransactions();
}

function toggleConfirmed() {
  showConfirmed = !showConfirmed;
  document.getElementById('filterBtn').innerText = showConfirmed ? "Verberg bevestigd" : "Toon bevestigd";
  renderTransactions();
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal').style.display = 'flex';

  document.getElementById('income').value = '';
  document.getElementById('expense').value = '';

  if (id) {
    const t = transactions.find(x => x.id === id);
    document.getElementById('date').value = t.date;
    document.getElementById('category').value = t.category;
    document.getElementById('memo').value = t.memo;
    document.getElementById('status').value = t.status;

    if (t.amount >= 0) document.getElementById('income').value = t.amount;
    else document.getElementById('expense').value = Math.abs(t.amount);

    document.getElementById('target-account').value = t.accountId;
  } else {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('category').value = '';
    document.getElementById('memo').value = '';
    document.getElementById('status').value = 'pending';
  }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function saveTransaction() {
  let amount = 0;
  if (document.getElementById('income').value) amount = parseFloat(document.getElementById('income').value);
  else if (document.getElementById('expense').value) amount = -parseFloat(document.getElementById('expense').value);

  const data = {
    id: editingId || Date.now().toString(),
    date: document.getElementById('date').value,
    category: document.getElementById('category').value,
    memo: document.getElementById('memo').value,
    amount: amount,
    status: document.getElementById('status').value,
    accountId: editingId ? document.getElementById('target-account').value : activeAccountId
  };

  if (editingId) {
    const i = transactions.findIndex(t => t.id === editingId);
    transactions[i] = data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function duplicateTransaction() {
  if (!editingId) return;
  const t = transactions.find(x => x.id === editingId);
  transactions.push({ ...t, id: Date.now().toString() });
  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  renderTransactions();
}

function deleteTransaction() {
  if (editingId && confirm('Wissen?')) {
    transactions = transactions.filter(t => t.id !== editingId);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }
}

function addAccount() {
  const n = prompt("Naam rekening:");
  if (n && n.trim()) {
    const id = Date.now().toString();
    accounts.push({ id, name: n.trim() });
    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    renderAccounts();
  }
}

function selectAccount(id) {
  activeAccountId = id;
  localStorage.setItem('active_account', id);
  renderAccounts();
  renderTransactions();
}

renderAccounts();
renderTransactions();

</script>

</body>
</html>
