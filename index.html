<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body { margin: 0; font-family: Arial; background: #1e1e1e; color: white; }
    .container { display: flex; height: 100vh; }

    .sidebar { width: 250px; background: #2b2b2b; padding: 20px; }

    .account {
      padding: 10px;
      margin-bottom: 10px;
      background: #3a3a3a;
      border-radius: 5px;
      cursor: pointer;
    }

    .active { background:#4caf50; }

    .account-actions {
      margin-top: 15px;
    }

    .small-btn {
      width:100%;
      margin-top:5px;
      padding:8px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .main { flex: 1; padding: 20px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      background: #4caf50;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:6px;
      font-size:20px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      table-layout:fixed;
    }

    th, td { padding:10px 5px; white-space:nowrap; }

    th { border-bottom:1px solid #444; cursor:pointer; }

    th:nth-child(1), td:nth-child(1){ width:70px; text-align:center; }
    th:nth-child(2), td:nth-child(2){ width:110px; }
    th:nth-child(3), td:nth-child(3){ width:120px; }
    th:nth-child(4), td:nth-child(4){ width:110px; text-align:right; padding-right:20px; }
    th:nth-child(5), td:nth-child(5){ width:auto; padding-left:10px; }

    .status-dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-left:5px;
    }

    .green{ background:lightgreen; }
    .red{ background:red; }

    .modal{
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#2b2b2b;
      padding:30px;
      border-radius:12px;
      width:90%;
      max-width:500px;
    }

    input, select{
      width:100%;
      padding:12px;
      margin:8px 0 15px 0;
      border-radius:6px;
      border:none;
    }

    .btn{
      width:100%;
      padding:12px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .save-btn{ background:#4caf50; }
    .delete-btn{ background:#ff4444; }
    .close-btn{ background:#666; }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>

    <div id="accountsList"></div>

    <div class="account-actions">
      <button class="small-btn" onclick="addAccount()">+ rekening</button>
      <button class="small-btn" onclick="renameAccount()">hernoemen</button>
      <button class="small-btn" onclick="deleteAccount()">verwijderen</button>
    </div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2 id="accountTitle"></h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="sortBy('status')">ST</th>
          <th onclick="sortBy('date')">Datum</th>
          <th onclick="sortBy('category')">Categorie</th>
          <th onclick="sortBy('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>

  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Transactie</h3>

    <input type="date" id="date">
    <input type="text" id="category">
    <input type="text" id="memo">
    <input type="number" id="amount">

    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    <button class="btn close-btn" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let accounts = JSON.parse(localStorage.getItem("accounts")) || ["Privé","VOF"];

let currentAccount = accounts[0];
let editIndex = null;

let sortField = null;
let sortDirection = 1;

function saveAll(){
  localStorage.setItem("transactions", JSON.stringify(transactions));
  localStorage.setItem("accounts", JSON.stringify(accounts));
}

function renderAccounts(){
  const container = document.getElementById("accountsList");
  container.innerHTML = "";

  accounts.sort((a,b)=>a.localeCompare(b));

  accounts.forEach(name=>{
    const div = document.createElement("div");
    div.className = "account" + (name===currentAccount ? " active":"");
    div.innerText = name;

    div.onclick = ()=>{
      currentAccount = name;
      renderAccounts();
      renderTransactions();
    };

    container.appendChild(div);
  });

  document.getElementById("accountTitle").innerText = currentAccount;
}

function addAccount(){
  const name = prompt("Naam rekening?");
  if(!name) return;

  accounts.push(name);
  saveAll();
  renderAccounts();
}

function renameAccount(){
  const newName = prompt("Nieuwe naam?", currentAccount);
  if(!newName) return;

  transactions.forEach(t=>{
    if(t.account===currentAccount){
      t.account = newName;
    }
  });

  accounts = accounts.map(a => a===currentAccount ? newName : a);
  currentAccount = newName;

  saveAll();
  renderAccounts();
  renderTransactions();
}

function deleteAccount(){
  if(!confirm("Zeker verwijderen?")) return;

  accounts = accounts.filter(a => a!==currentAccount);
  transactions = transactions.filter(t => t.account!==currentAccount);

  currentAccount = accounts[0] || "";

  saveAll();
  renderAccounts();
  renderTransactions();
}

function today(){
  return new Date().toISOString().split("T")[0];
}

function renderTransactions(){
  const table = document.getElementById("transactions");
  table.innerHTML = "";

  let list = transactions.filter(t=>t.account===currentAccount);

  if(sortField){
    list.sort((a,b)=>{
      let A=a[sortField], B=b[sortField];
      if(sortField==="status"){
        A=a.status==="confirmed"?1:0;
        B=b.status==="confirmed"?1:0;
      }
      return A>B ? sortDirection : -sortDirection;
    });
  }

  list.forEach(t=>{
    const i = transactions.indexOf(t);
    const color = t.status==="confirmed"?"green":"red";

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>ST <span class="status-dot ${color}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>${t.amount} €</td>
      <td>${t.memo||""}</td>
    `;
    row.onclick = ()=>editTransaction(i);
    table.appendChild(row);
  });
}

function sortBy(f){
  if(sortField===f){ sortDirection*=-1; }
  else{ sortField=f; sortDirection=1; }
  renderTransactions();
}

function openModal(){
  editIndex=null;
  date.value="";
  category.value="";
  memo.value="";
  amount.value="";
  status.value="pending";
  modal.style.display="flex";
}

function editTransaction(i){
  const t=transactions[i];
  editIndex=i;
  date.value=t.date;
  category.value=t.category;
  memo.value=t.memo;
  amount.value=t.amount;
  status.value=t.status;
  modal.style.display="flex";
}

function saveTransaction(){
  const d = date.value || today();

  const obj={
    date:d,
    category:category.value,
    memo:memo.value,
    amount:parseFloat(amount.value),
    status:status.value,
    account:currentAccount
  };

  if(editIndex!==null) transactions[editIndex]=obj;
  else transactions.push(obj);

  saveAll();
  renderTransactions();
  closeModal();
}

function deleteTransaction(){
  if(editIndex!==null){
    transactions.splice(editIndex,1);
    saveAll();
    renderTransactions();
    closeModal();
  }
}

function closeModal(){
  modal.style.display="none";
}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
