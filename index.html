<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg,#020617,#0f172a);
      color: white;
      font-size: 18px;
    }

    .container {
      display: flex;
      height: 100vh;
      gap: 20px;
      padding: 20px;
      box-sizing: border-box;
    }

    .sidebar {
      width: 280px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar h2 {
      font-size: 20px;
      color: #10b981;
      margin-bottom: 20px;
    }

    .account-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .account {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
    }

    .account.active {
      background: #10b981;
      font-weight: bold;
    }

    .acc-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
    }

    .add-acc-btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,0.1);
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 25px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 24px;
    }

    .add-btn {
      background: #10b981;
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 22px;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th {
      font-size: 14px;
      color: #94a3b8;
      padding: 6px;
      text-align: left;
    }

    tr {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
    }

    td {
      padding: 14px 10px;
    }

    th:nth-child(1), td:nth-child(1) { width: 50px; text-align:center; }
    th:nth-child(2), td:nth-child(2) { width: 120px; }
    th:nth-child(3), td:nth-child(3) { width: 140px; }
    th:nth-child(4), td:nth-child(4) { width: 120px; text-align:right; }
    th:nth-child(5), td:nth-child(5) { width: auto; color: #94a3b8; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .green { background: #10b981; }
    .red { background: #ff5252; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #020617;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .modal-content label {
      display: block;
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0f172a;
      color: white;
      font-size: 16px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .save-btn { background: #10b981; color:white; }
    .duplicate-btn { background: #3b82f6; color:white; }
    .delete-btn { background: transparent; color: #ff5252; border:1px solid #ff5252; }
    .close-btn { background: #444; color:white; margin-top: 10px; }

    @media (max-width: 700px) {
      .container { flex-direction: column; padding: 10px; }
      .sidebar { width: 100%; display: flex; overflow-x: auto; gap: 10px; }
      table, tr, td { display: block; }
      tr { margin-bottom: 10px; padding: 10px; }
      td:nth-child(4) { font-weight: bold; font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <label>Categorie</label>
    <input type="text" id="category">
    <label>Memo</label>
    <input type="text" id="memo">
    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    
    <div id="account-select-container">
        <label>Verplaats naar rekening</label>
        <select id="target-account"></select>
    </div>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    
    <div class="btn-group" id="edit-actions">
        <button class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
        <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    </div>
    
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    if(!list) return;
    list.innerHTML = '';
    const displayAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    displayAccounts.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      item.innerHTML = `
        <div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
        <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
        <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>
      `;
      list.appendChild(item);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
    updateAccountDropdown();
  }

  function updateAccountDropdown() {
    const select = document.getElementById('target-account');
    select.innerHTML = '';
    accounts.sort((a, b) => a.name.localeCompare(b.name)).forEach(acc => {
      const opt = document.createElement('option');
      opt.value = acc.id;
      opt.innerText = acc.name;
      select.appendChild(opt);
    });
  }

  function selectAccount(id) {
    activeAccountId = id;
    renderAccounts();
    renderTransactions();
  }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    if(!tbody) return;
    tbody.innerHTML = '';
    let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    data.sort((a, b) => {
      let vA = a[sortConfig.field] || "";
      let vB = b[sortConfig.field] || "";
      if (sortConfig.field === 'amount') { vA = parseFloat(a.amount) || 0; vB = parseFloat(b.amount) || 0; }
      if (sortConfig.field === 'status') { vA = a.status === 'pending' ? 0 : 1; vB = b.status === 'pending' ? 0 : 1; }
      if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
      if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
      return (b.date || "").localeCompare(a.date || "");
    });
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      tr.innerHTML = `
        <td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
        <td>${t.date || ''}</td>
        <td>${t.category || ''}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td style="color:#888">${t.memo || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function toggleSort(field) {
    sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc';
    sortConfig.field = field;
    renderTransactions();
  }

  function openModal(id = null) {
    editingId = id;
    const m = document.getElementById('modal');
    const accSelect = document.getElementById('account-select-container');
    const editActions = document.getElementById('edit-actions');
    
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Bewerken';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      document.getElementById('target-account').value = t.accountId || accounts[0].id;
      accSelect.style.display = 'block';
      editActions.style.display = 'flex';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuw';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('status').value = 'pending';
      accSelect.style.display = 'none';
      editActions.style.display = 'none';
    }
    m.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = {
      date: document.getElementById('date').value,
      category: document.getElementById('category').value || 'Diversen',
      memo: document.getElementById('memo').value,
      amount: document.getElementById('amount').value || 0,
      status: document.getElementById('status').value,
      accountId: editingId ? document.getElementById('target-account').value : activeAccountId
    };
    if (editingId) {
      const i = transactions.findIndex(t => t.id === editingId);
      transactions[i] = { ...data, id: editingId };
    } else {
      data.id = Date.now().toString();
      transactions.push(data);
    }
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function duplicateTransaction() {
    if (!editingId) return;
    const t = transactions.find(x => x.id === editingId);
    const copy = { 
        ...t, 
        id: Date.now().toString(), 
        accountId: activeAccountId
    };
    transactions.push(copy);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function addAccount() {
    const n = prompt("Naam rekening:");
    if (n && n.trim()) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: n.trim() });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const n = prompt("Nieuwe naam:", acc.name);
    if (n && n.trim()) {
      acc.name = n.trim();
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;

    if (!confirm("Rekening verwijderen?")) return;
    if (!confirm("Weet je het zeker? Alle transacties worden dan ook verwijderd.")) return;

    accounts = accounts.filter(a => a.id !== id);
    transactions = transactions.filter(t => t.accountId !== id);

    activeAccountId = accounts[0].id;

    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));

    renderAccounts();
    renderTransactions();
  }

  function deleteTransaction() {
    if (editingId && confirm('Wissen?')) {
      transactions = transactions.filter(t => t.id !== editingId);
      localStorage.setItem('payit_transactions', JSON.stringify(transactions));
      closeModal();
      renderTransactions();
    }
  }

  renderAccounts();
  renderTransactions();
</script>

</body>
</html>
