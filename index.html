<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body { margin:0; font-family:Arial; background:#1e1e1e; color:white; }
    .container { display:flex; height:100vh; }

    .sidebar { width:250px; background:#2b2b2b; padding:20px; }

    /* 👉 FIX spacing */
    .account {
      margin-bottom:10px;
    }

    .main { flex:1; padding:20px; }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .add-btn {
      background:#4caf50;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:6px;
      font-size:20px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      table-layout:fixed;
    }

    th, td {
      padding:10px 5px;
      white-space:nowrap;
    }

    th { border-bottom:1px solid #444; cursor:pointer; }

    th:nth-child(1), td:nth-child(1) { width:70px; text-align:center; }
    th:nth-child(2), td:nth-child(2) { width:110px; }
    th:nth-child(3), td:nth-child(3) { width:120px; }
    th:nth-child(4), td:nth-child(4) { width:110px; text-align:right; padding-right:20px; }
    th:nth-child(5), td:nth-child(5) { width:auto; padding-left:10px; }

    .status-dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-left:5px;
    }

    .green { background:lightgreen; }
    .red { background:red; }

    .modal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#2b2b2b;
      padding:30px;
      border-radius:12px;
      width:90%;
      max-width:500px;
    }

    input, select {
      width:100%;
      padding:12px;
      margin:8px 0 15px 0;
      border-radius:6px;
      border:none;
    }

    .btn {
      width:100%;
      padding:12px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .save-btn { background:#4caf50; }
    .delete-btn { background:#ff4444; }
    .close-btn { background:#666; }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div class="account">Privé</div>
    <div class="account">VOF</div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="sortBy('status')">ST</th>
          <th onclick="sortBy('date')">Datum</th>
          <th onclick="sortBy('category')">Categorie</th>
          <th onclick="sortBy('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>

  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Transactie</h3>

    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo">
    <input type="number" id="amount" placeholder="Bedrag">

    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    <button class="btn close-btn" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let editIndex = null;
let sortField = null;
let sortDirection = 1;

function saveToStorage() {
  localStorage.setItem("transactions", JSON.stringify(transactions));
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function renderTransactions() {
  const table = document.getElementById("transactions");
  table.innerHTML = "";

  let list = [...transactions];

  if (sortField) {
    list.sort((a,b) => {
      let valA = a[sortField];
      let valB = b[sortField];

      if (sortField === "status") {
        valA = a.status === "confirmed" ? 1 : 0;
        valB = b.status === "confirmed" ? 1 : 0;
      }

      return valA > valB ? sortDirection : -sortDirection;
    });
  }

  list.forEach((t, index) => {
    const dotClass = t.status === "confirmed" ? "green" : "red";

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>ST <span class="status-dot ${dotClass}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>${t.amount} €</td>
      <td>${t.memo}</td>
    `;

    row.onclick = () => editTransaction(index);
    table.appendChild(row);
  });
}

function sortBy(field) {
  if (sortField === field) {
    sortDirection *= -1;
  } else {
    sortField = field;
    sortDirection = 1;
  }
  renderTransactions();
}

/* 👉 FIX: modal correct ophalen */
function openModal() {
  editIndex = null;

  document.getElementById("date").value = today();
  document.getElementById("category").value = "";
  document.getElementById("memo").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("status").value = "pending";

  document.querySelector(".delete-btn").style.display = "none";
  document.getElementById("modal").style.display = "flex";
}

function editTransaction(index) {
  const t = transactions[index];
  editIndex = index;

  document.getElementById("date").value = t.date;
  document.getElementById("category").value = t.category;
  document.getElementById("memo").value = t.memo;
  document.getElementById("amount").value = t.amount;
  document.getElementById("status").value = t.status;

  document.querySelector(".delete-btn").style.display = "block";
  document.getElementById("modal").style.display = "flex";
}

function saveTransaction() {
  const d = date.value || today();
  const c = category.value.trim();
  const m = memo.value.trim();
  const a = amount.value;

  if (!d || !c || !m || a === "" || isNaN(a)) {
    alert("Vul alle velden correct in.");
    return;
  }

  const transaction = {
    date: d,
    category: c,
    memo: m,
    amount: parseFloat(a),
    status: document.getElementById("status").value
  };

  if (editIndex !== null) {
    transactions[editIndex] = transaction;
  } else {
    transactions.push(transaction);
  }

  saveToStorage();
  renderTransactions();
  closeModal();
}

function deleteTransaction() {
  if (editIndex !== null && confirm("Zeker verwijderen?")) {
    transactions.splice(editIndex, 1);
    saveToStorage();
    renderTransactions();
    closeModal();
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

renderTransactions();
</script>

</body>
</html>
