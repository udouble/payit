<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.1 Ultra Glass</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg-gradient: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #10b981;
      --orange: #fb923c;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif; 
      background: var(--bg-gradient);
      color: white; 
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
    }

    .sidebar { 
      width: 300px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
    }

    .account {
      padding: 14px;
      border-radius: 12px;
      background: var(--glass-bg);
      margin-bottom: 10px;
      cursor: pointer;
      transition: .2s;
    }

    .account:hover { transform: translateX(5px); }
    .account.active { background: var(--accent); }

    .account-actions-bar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 15px;
    }

    .account-actions-bar button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .add-acc-btn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: linear-gradient(135deg,#10b981,#059669);
      color: white;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 30px;
      border-radius: 20px;
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      overflow-y: auto;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .add-btn {
      background: linear-gradient(135deg,#fb923c,#ea580c);
      border:none;
      padding:12px 18px;
      border-radius:14px;
      font-size:22px;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:separate;
      border-spacing:0 12px;
      table-layout: fixed;
    }

    tr {
      background: var(--glass-bg);
      border-radius: 14px;
      transition:.2s;
    }

    td {
      padding:18px 10px;
    }

    /* 👉 HIER ZIT DE ENIGE WIJZIGING */

    th:nth-child(1), td:nth-child(1) { width: 50px; }
    th:nth-child(2), td:nth-child(2) { width: 110px; }
    th:nth-child(3), td:nth-child(3) { width: 120px; }
    th:nth-child(4), td:nth-child(4) { width: 100px; text-align:right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 20px; }

    /* 👆 Memo krijgt alle resterende ruimte */

    .status-dot {
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .green { background:#10b981; }
    .red { background:#f43f5e; }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-content {
      background:#0f172a;
      padding:40px;
      border-radius:20px;
      width:500px;
      border:1px solid var(--glass-border);
    }

  </style>
</head>
<body>

<!-- REST VAN JE CODE IS ONGEWIJZIGD -->

<div class="container">
  <div class="sidebar">
    <h2>REKENINGEN</h2>

    <div class="account-actions-bar">
      <button onclick="renameAccount()">✏️</button>
      <button onclick="deleteAccount()">✖</button>
    </div>

    <div id="accounts-list"></div>

    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Laden...</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ST</th>
          <th>Datum</th>
          <th>Categorie</th>
          <th>Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

</body>
</html>
