<!DOCTYPE html>
<html>
<head>
<title>Payit - Versie 2.1 FIX FINAL</title>

<style>
body { margin:0; font-family:Arial; background:#1e1e1e; color:white; font-size:20px; }
.container { display:flex; height:100vh; }

.sidebar { width:300px; background:#2b2b2b; padding:25px; }
.account { padding:12px; background:#3a3a3a; border-radius:6px; margin-bottom:10px; cursor:pointer; }
.account.active { background:#4caf50; }

.add-account-btn {
  width:100%;
  padding:16px;
  margin-top:15px;
  background:#444;
  border:none;
  color:white;
  border-radius:8px;
  font-size:18px;
}

.main { flex:1; padding:30px; }

.topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.left-controls { display:flex; gap:12px; }

.add-btn { background:#4caf50; padding:14px 20px; border:none; color:white; border-radius:8px; font-size:22px; }

.filter-btn { background:#444; padding:14px 18px; border:none; color:white; border-radius:8px; }

.total-box { background:#fb923c; color:black; padding:12px 18px; border-radius:10px; }

table { width:100%; border-collapse:collapse; }
th, td { padding:12px; border-bottom:1px solid #222; }
th { color:#888; }

.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.green { background:#4caf50; }
.red { background:#ff5252; }

.positive { color:#4caf50; }
.negative { color:#ff5252; }

.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; }
.modal-content { background:#2b2b2b; padding:30px; border-radius:12px; width:480px; }

.modal-content input, .modal-content select {
  width:100%; padding:16px; margin-top:12px;
  background:#1a1a1a; border:1px solid #444; color:white;
  border-radius:8px; font-size:20px;
}

.amount-row { display:flex; gap:10px; }

.btn-row { display:flex; gap:12px; margin-top:20px; }
.btn { flex:1; padding:16px; border:none; border-radius:8px; font-size:18px; }

.save { background:#4caf50; }
.cancel { background:#666; }
.dup { background:#2196F3; }
.del { background:#ff5252; }

.autocomplete-list {
  position:absolute;
  background:#1a1a1a;
  border:1px solid #444;
  width:100%;
  max-height:200px;
  overflow-y:auto;
  z-index:999;
}
.autocomplete-item { padding:10px; cursor:pointer; }
.autocomplete-item:hover { background:#333; }

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
</div>

<div class="main">

<div class="topbar">
  <div class="left-controls">
    <div id="total" class="total-box"></div>
    <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr><th>ST</th><th>Datum</th><th>Categorie</th><th>Bedrag</th><th>Memo</th></tr>
</thead>
<tbody id="transactions"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<input type="date" id="date">

<div style="position:relative;">
<input type="text" id="category" placeholder="Categorie">
<div id="autocomplete" class="autocomplete-list"></div>
</div>

<input type="text" id="memo" placeholder="Memo">

<div class="amount-row">
<input type="number" id="income" placeholder="Inkomsten">
<input type="number" id="expense" placeholder="Uitgaven">
</div>

<select id="status">
<option value="pending">Afwachtend</option>
<option value="confirmed">Bevestigd</option>
</select>

<select id="target-account"></select>

<div class="btn-row">
<button class="btn dup" onclick="duplicateTransaction()">Dupliceren</button>
<button class="btn del" onclick="deleteTransaction()">Verwijderen</button>
</div>

<div class="btn-row">
<button class="btn cancel" onclick="closeModal()">Annuleren</button>
<button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<script>

/* ===== BASIS ===== */
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id:'1', name:'Privé' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = localStorage.getItem('active_account') || accounts[0].id;
let editingId=null;
let showConfirmed=false;

/* ===== CATEGORIEEN ===== */
let categories = JSON.parse(localStorage.getItem('payit_categories')) || [
"Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW"
];

/* ===== AUTOCOMPLETE (VEILIG) ===== */
function initAutocomplete() {
  const input = document.getElementById('category');
  const list = document.getElementById('autocomplete');

  input.oninput = () => {
    const val = input.value.toLowerCase();
    list.innerHTML = '';

    categories
      .filter(c => c.toLowerCase().includes(val))
      .forEach(c => {
        const div = document.createElement('div');
        div.className='autocomplete-item';
        div.innerText=c;
        div.onclick=()=>{
          input.value=c;
          list.innerHTML='';
        };
        list.appendChild(div);
      });
  };
}

/* ===== REST ===== */

function formatCurrency(n){
  return "€ " + Number(n).toLocaleString('nl-BE',{minimumFractionDigits:2});
}

function renderAccounts(){
  const list=document.getElementById('accounts-list');
  list.innerHTML='';
  accounts.forEach(acc=>{
    list.innerHTML+=`<div class="account ${acc.id===activeAccountId?'active':''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>`;
  });

  const sel=document.getElementById('target-account');
  sel.innerHTML='';
  accounts.forEach(a=>{
    const o=document.createElement('option');
    o.value=a.id;
    o.innerText=a.name;
    sel.appendChild(o);
  });
}

function renderTransactions(){
  const tbody=document.getElementById('transactions');
  tbody.innerHTML='';
  let data=transactions.filter(t=>t.accountId===activeAccountId);

  let pending=data.filter(t=>t.status!=='confirmed');
  let confirmed=data.filter(t=>t.status==='confirmed');

  data=showConfirmed?[...pending,...confirmed]:pending;

  let total=0;

  data.forEach(t=>{
    total+=Number(t.amount);
    tbody.innerHTML+=`
    <tr onclick="openModal('${t.id}')">
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td class="${t.amount<0?'negative':'positive'}">${formatCurrency(t.amount)}</td>
      <td>${t.memo||''}</td>
    </tr>`;
  });

  document.getElementById('total').innerText="Totaal: "+formatCurrency(total);
}

function toggleConfirmed(){
  showConfirmed=!showConfirmed;
  filterBtn.innerText=showConfirmed?"Verberg bevestigd":"Toon bevestigd";
  renderTransactions();
}

function openModal(id=null){
  editingId=id;
  modal.style.display='flex';

  initAutocomplete(); // ✅ hier pas initialiseren

  income.value='';
  expense.value='';

  if(id){
    const t=transactions.find(x=>x.id===id);
    date.value=t.date;
    category.value=t.category;
    memo.value=t.memo;
    status.value=t.status;

    if(t.amount>=0) income.value=t.amount;
    else expense.value=Math.abs(t.amount);

    target-account.value=t.accountId;
  } else {
    date.value=new Date().toISOString().split('T')[0];
    category.value='';
    memo.value='';
    status.value='pending';
  }
}

function saveTransaction(){
  let amount=0;
  if(income.value) amount=parseFloat(income.value);
  else if(expense.value) amount=-parseFloat(expense.value);

  const data={
    id:editingId||Date.now().toString(),
    date:date.value,
    category:category.value,
    memo:memo.value,
    amount:amount,
    status:status.value,
    accountId:editingId?target-account.value:activeAccountId
  };

  if(editingId){
    const i=transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions',JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function closeModal(){ modal.style.display='none'; }

function duplicateTransaction(){
  if(!editingId)return;
  const t=transactions.find(x=>x.id===editingId);
  transactions.push({...t,id:Date.now().toString()});
  localStorage.setItem('payit_transactions',JSON.stringify(transactions));
  renderTransactions();
}

function deleteTransaction(){
  if(editingId && confirm('Wissen?')){
    transactions=transactions.filter(t=>t.id!==editingId);
    localStorage.setItem('payit_transactions',JSON.stringify(transactions));
    renderTransactions();
  }
}

function addAccount(){
  const n=prompt("Naam rekening:");
  if(n){
    const id=Date.now().toString();
    accounts.push({id,name:n});
    localStorage.setItem('payit_accounts',JSON.stringify(accounts));
    renderAccounts();
  }
}

function selectAccount(id){
  activeAccountId=id;
  localStorage.setItem('active_account',id);
  renderAccounts();
  renderTransactions();
}

renderAccounts();
renderTransactions();

</script>
</body>
</html>
