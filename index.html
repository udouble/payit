<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body { margin: 0; font-family: Arial; background: #1e1e1e; color: white; }
    .container { display: flex; height: 100vh; }

    .sidebar { width: 250px; background: #2b2b2b; padding: 20px; border-right: 1px solid #444; }
    
    .account {
      padding: 12px;
      margin-bottom: 8px;
      background: #3a3a3a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .account:hover { background: #4a4a4a; }
    .account.active { background: #4caf50; font-weight: bold; }

    .main { flex: 1; padding: 20px; overflow-y: auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .add-btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 12px 5px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    th { cursor: pointer; color: #888; font-size: 0.9em; user-select: none; }
    th:hover { color: white; }

    th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 110px; }
    th:nth-child(3), td:nth-child(3) { width: 150px; }
    th:nth-child(4), td:nth-child(4) { width: 100px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 20px; color: #aaa; }

    tr:hover { background: #2a2a2a; cursor: pointer; }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .green { background: #4caf50; box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
    .red { background: #ff4444; box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #2b2b2b;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: white;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .save-btn { background: #4caf50; color: white; }
    .delete-btn { background: #ff4444; color: white; margin-top: 20px; }
    .close-btn { background: #555; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="sortBy('status')">ST</th>
          <th onclick="sortBy('date')">Datum</th>
          <th onclick="sortBy('category')">Categorie</th>
          <th onclick="sortBy('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Nieuwe transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo (optioneel)">
    <input type="number" id="amount" step="0.01" placeholder="0.00">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
    <button class="btn delete-btn" id="delete-btn" onclick="deleteTransaction()" style="display:none;">Verwijder Transactie</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [
    { id: '1', name: 'Privé' },
    { id: '2', name: 'VOF' }
  ];
  
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;

  // Sorteer-status bijhouden
  let currentSort = {
    field: 'status',
    direction: 'asc' // asc: pending eerst, desc: confirmed eerst
  };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    accounts.forEach(acc => {
      const div = document.createElement('div');
      div.className = `account ${acc.id === activeAccountId ? 'active' : ''}`;
      div.innerText = acc.name;
      div.onclick = () => {
        activeAccountId = acc.id;
        renderAccounts();
        renderTransactions();
      };
      list.appendChild(div);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId);
    document.getElementById('current-account-title').innerText = activeAcc ? activeAcc.name : 'Transacties';
  }

  // --- UITGEBREIDE SORTEER LOGICA ---
  function applySorting(data) {
    return data.sort((a, b) => {
      let valA = a[currentSort.field];
      let valB = b[currentSort.field];

      // Numerieke check voor bedrag
      if (currentSort.field === 'amount') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      }

      // Richting bepalen
      let comparison = 0;
      if (valA < valB) comparison = -1;
      if (valA > valB) comparison = 1;

      // Als we op status sorteren, willen we specifiek gedrag (pending/confirmed)
      // Als we op iets anders sorteren maar waarden zijn gelijk, sorteer dan op datum (secundair)
      if (comparison === 0 && currentSort.field !== 'date') {
        return b.date.localeCompare(a.date); // Verste datum eerst als fallback
      }

      return currentSort.direction === 'asc' ? comparison : -comparison;
    });
  }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    tbody.innerHTML = '';

    // Filteren op account
    let filtered = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    
    // Sorteren toepassen
    let sorted = applySorting(filtered);

    sorted.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      const statusClass = t.status === 'confirmed' ? 'green' : 'red';
      tr.innerHTML = `
        <td><span class="status-dot ${statusClass}"></span></td>
        <td>${t.date}</td>
        <td>${t.category}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td>${t.memo || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function sortBy(field) {
    if (currentSort.field === field) {
      // Toggle richting als op dezelfde kolom wordt geklikt
      currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
    } else {
      // Nieuwe kolom geselecteerd
      currentSort.field = field;
      currentSort.direction = 'asc';
    }
    renderTransactions();
  }

  function openModal(id = null) {
    editingId = id;
    const modal = document.getElementById('modal');
    const deleteBtn = document.getElementById('delete-btn');
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Transactie aanpassen';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      deleteBtn.style.display = 'block';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuwe transactie';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('status').value = 'pending';
      deleteBtn.style.display = 'none';
    }
    modal.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = {
      date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
      category: document.getElementById('category').value || 'Onbekend',
      memo: document.getElementById('memo').value,
      amount: document.getElementById('amount').value || 0,
      status: document.getElementById('status').value,
      accountId: activeAccountId
    };

    if (editingId) {
      const index = transactions.findIndex(t => t.id === editingId);
      data.accountId = transactions[index].accountId || accounts[0].id;
      transactions[index] = { ...data, id: editingId };
    } else {
      data.id = Date.now().toString();
      transactions.push(data);
    }

    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function deleteTransaction() {
    if (editingId && confirm('Verwijderen?')) {
      transactions = transactions.filter(t => t.id !== editingId);
      localStorage.setItem('payit_transactions', JSON.stringify(transactions));
      closeModal();
      renderTransactions();
    }
  }

  renderAccounts();
  renderTransactions();
</script>
</body>
</html>
