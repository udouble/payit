<!DOCTYPE html>
<html>
<head>
  <title>Payit - v3.5 (supabase transactions)</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
      background:#1c1c1e;
      color:#e5e5e7;
      font-size:15px;
    }

    .container{display:flex;height:100vh;}

    .sidebar{
      width:260px;
      background:#2a2a2d;
      padding:18px;
      border-right:1px solid #3a3a3d;
    }

    .account{
      padding:10px 12px;
      border-radius:6px;
      margin-bottom:6px;
      cursor:pointer;
      font-size:14px;
    }

    .account:hover{background:#3a3a3d;}
    .account.active{background:#3f8cff;color:white;}

    .add-account-btn,.cat-btn{
      width:100%;
      padding:10px;
      margin-top:8px;
      background:#3a3a3d;
      border:none;
      color:#ccc;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
    }

    .main{flex:1;padding:24px;}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .total-box{
      background:#ff9f43;
      color:#000;
      padding:6px 12px;
      border-radius:6px;
      font-size:13px;
      font-weight:600;
    }

    .filter-btn{
      background:#3a3a3d;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      font-size:12px;
      color:#ccc;
      cursor:pointer;
    }

    .add-btn{
      background:#3f8cff;
      width:36px;
      height:36px;
      border-radius:10px;
      font-size:20px;
      border:none;
      color:white;
      cursor:pointer;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th{
      text-align:left;
      font-size:12px;
      color:#888;
      padding:8px;
      border-bottom:1px solid #333;
    }

    td{
      padding:10px 8px;
      border-bottom:1px solid #2a2a2d;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    th:nth-child(1), td:nth-child(1){width:30px;}
    th:nth-child(2), td:nth-child(2){width:110px;}
    th:nth-child(3), td:nth-child(3){width:180px;}
    th:nth-child(4), td:nth-child(4){width:120px;text-align:right;}
    th:nth-child(5), td:nth-child(5){width:auto;}

    .positive{color:#4caf50;}
    .negative{color:#ff5e57;}

    .status-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      display:inline-block;
    }

    .green{background:#4caf50;}
    .red{background:#ff5e57;}

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#2a2a2d;
      padding:20px;
      border-radius:10px;
      width:420px;
    }

    label{
      display:block;
      margin-top:10px;
      font-size:12px;
      color:#aaa;
    }

    input,select{
      width:100%;
      padding:10px;
      margin-top:4px;
      background:#1c1c1e;
      border:1px solid #3a3a3d;
      color:white;
      border-radius:6px;
      font-size:14px;
    }

    select{height:40px;}

    .amount-row{display:flex;gap:8px;}

    .btn-row{display:flex;gap:8px;margin-top:16px;}

    .btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
    }

    .save{background:#4caf50;}
    .cancel{background:#555;}
    .dup{background:#3f8cff;}
    .del{background:#ff5e57;}

    .autocomplete-box{position:relative;}
    .autocomplete-list{
      position:absolute;
      width:100%;
      background:#1c1c1e;
      border:1px solid #333;
      max-height:160px;
      overflow-y:auto;
    }

    .autocomplete-item{
      padding:8px;
      cursor:pointer;
      font-size:13px;
    }

    .autocomplete-item:hover{background:#333;}

    .cat-modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      justify-content:center;
      align-items:center;
    }
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  <button class="cat-btn" onclick="openCatModal()">Categorie toevoegen</button>
</div>

<div class="main">

<div class="topbar">
  <div style="display:flex;gap:8px;">
    <div id="total" class="total-box"></div>
    <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr>
  <th>ST</th>
  <th>Datum</th>
  <th>Categorie</th>
  <th>Bedrag</th>
  <th>Memo</th>
</tr>
</thead>
<tbody id="transactions-body"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<label>Datum</label>
<input type="date" id="date">

<label>Categorie</label>
<div class="autocomplete-box">
  <input type="text" id="category" oninput="filterCategories()">
  <div id="category-list" class="autocomplete-list"></div>
</div>

<label>Memo</label>
<input type="text" id="memo">

<div class="amount-row">
  <input type="number" id="income" placeholder="Inkomsten">
  <input type="number" id="expense" placeholder="Uitgaven">
</div>

<label>Status</label>
<select id="status">
  <option value="pending">Afwachtend</option>
  <option value="confirmed">Bevestigd</option>
</select>

<select id="target-account"></select>

<div class="btn-row">
  <button class="btn dup" onclick="duplicateTransaction()">Dupliceren</button>
  <button class="btn del" onclick="deleteTransaction()">Verwijderen</button>
</div>

<div class="btn-row">
  <button class="btn cancel" onclick="closeModal()">Annuleren</button>
  <button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
  "https://oubutokvbhfifihjgiiy.supabase.co",
  "sb_publishable_duu2yC3c_-vwRMAam-LyXg_LLegwzo-"
);

/* DATA */
let categories = JSON.parse(localStorage.getItem('payit_categories')) || [
"Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW",
"BMW - onderhoud en verzekering","Consensus","Correctie","Delhaize",
"Dienstencheques","Diversen","Eneco","Etentjes","Invecon","Kampen",
"Kapper-voeten","KBC","Lening","Maxem","NOG TE ONTVANGEN",
"Nutsvoorzieningen","Onderhoud","Opzij","Opzij voor liq.reserve 01/2027",
"Overige","Overschrijving","Paypal","Pensioen","Rekening courant",
"Reserve","Restant voor de maand","Straetus","Straetus-tweewekelijks",
"Terugbetaling","TotalEnergies","Tuin","Vanalles","Vergoeding laden"
];

let accounts = [{ id:'1',name:'Privé'}];
let transactions = [];

let activeAccountId = accounts[0].id;
let editingId=null;
let showConfirmed=false;

/* LOAD FROM SUPABASE */
async function loadTransactions(){
  const { data } = await supabase.from('transactions').select('*');
  transactions = data || [];
  renderTransactions();
}

/* SAVE */
async function saveTransaction(){
  let amount=income.value?parseFloat(income.value):-parseFloat(expense.value||0);

  let data={
    date:date.value,
    category:category.value,
    memo:memo.value,
    amount,
    status:status.value,
    accountId:activeAccountId
  };

  if(editingId){
    await supabase.from('transactions').update(data).eq('id', editingId);
  } else {
    await supabase.from('transactions').insert(data);
  }

  closeModal();
  loadTransactions();
}

/* RENDER */
function renderTransactions(){
  const tbody=document.getElementById('transactions-body');
  tbody.innerHTML='';

  let data=transactions.filter(t=>t.accountId===activeAccountId);

  let pending=data.filter(t=>t.status!=='confirmed');
  let confirmed=data.filter(t=>t.status==='confirmed');

  data=showConfirmed?[...pending,...confirmed]:pending;

  let total=0;

  data.forEach(t=>{
    total+=Number(t.amount);
    tbody.innerHTML+=`
    <tr onclick="openModal('${t.id}')">
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td class="${t.amount<0?'negative':'positive'}">€ ${Number(t.amount).toFixed(2)}</td>
      <td>${t.memo||''}</td>
    </tr>`;
  });

  document.getElementById('total').innerText="Totaal: € "+total.toFixed(2);
}

/* INIT */
loadTransactions();

</script>

</body>
</html>
