<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payit - v3.2 (kolommen fix)</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#1c1c1e;
  color:#e5e5e7;
  font-size:15px;
}

.container{display:flex;height:100vh;}

.sidebar{
  width:260px;
  background:#2a2a2d;
  padding:20px;
  border-right:1px solid #3a3a3d;
}

.account{
  padding:10px;
  border-radius:6px;
  margin-bottom:6px;
  cursor:pointer;
}

.account.active{background:#3f8cff;color:white;}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  background:#3a3a3d;
  color:#ccc;
}

.main{flex:1;padding:20px;}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.total{
  background:#ff9f43;
  color:#000;
  padding:6px 12px;
  border-radius:6px;
  font-weight:600;
  font-size:13px;
}

.add-btn{
  background:#3f8cff;
  width:40px;
  height:40px;
  border-radius:10px;
  font-size:22px;
  border:none;
  color:white;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th{
  text-align:left;
  font-size:12px;
  color:#888;
  padding:8px;
  border-bottom:1px solid #333;
}

td{
  padding:10px 8px;
  border-bottom:1px solid #2a2a2d;
}

/* KOLOMBREEDTES */
th:nth-child(1), td:nth-child(1){width:30px;}       /* ST */
th:nth-child(2), td:nth-child(2){width:110px;}     /* Datum */
th:nth-child(3), td:nth-child(3){width:160px;}     /* Categorie */
th:nth-child(4), td:nth-child(4){
  width:120px;
  text-align:right;
}                                                 /* Bedrag */
th:nth-child(5), td:nth-child(5){
  width:auto;
}                                                 /* Memo */

.positive{color:#4caf50;}
.negative{color:#ff5e57;}

.status-dot{
  width:6px;height:6px;border-radius:50%;
  display:inline-block;
}

.green{background:#4caf50;}
.red{background:#ff5e57;}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts"></div>
  <button onclick="addAccount()">+ Nieuwe rekening</button>
  <button onclick="addCategory()">Categorie toevoegen</button>
</div>

<div class="main">

<div class="topbar">
  <div style="display:flex;gap:10px;">
    <div id="total" class="total"></div>
    <button onclick="toggleConfirmed()">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">+</button>
</div>

<table>
<thead>
<tr>
<th>ST</th>
<th>Datum</th>
<th>Categorie</th>
<th>Bedrag</th>
<th>Memo</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
let accounts=[{id:1,name:"00. test"},{id:2,name:"00. VOF"}];
let transactions=[{id:1,date:"2026-04-10",category:"BTW",amount:-2000,memo:"",status:"pending",accountId:1}];

let active=1,showConfirmed=false;

function format(n){
  return "€ "+Number(n).toLocaleString("nl-BE",{minimumFractionDigits:2});
}

function renderAccounts(){
  accounts.innerHTML="";
  accounts.forEach(a=>{
    accounts.innerHTML+=`<div class="account ${a.id===active?'active':''}" onclick="selectAccount(${a.id})">${a.name}</div>`;
  });
}

function render(){
  let list=transactions.filter(t=>t.accountId===active);
  let total=0;

  tbody.innerHTML="";

  list.forEach(t=>{
    total+=t.amount;
    tbody.innerHTML+=`
    <tr>
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td class="${t.amount<0?'negative':'positive'}">${format(t.amount)}</td>
      <td>${t.memo}</td>
    </tr>`;
  });

  totalEl.innerText="Totaal: "+format(total);
}

function selectAccount(id){active=id;renderAccounts();render();}

function addAccount(){
  let n=prompt("Naam:");
  if(n) accounts.push({id:Date.now(),name:n});
  renderAccounts();
}

function addCategory(){alert("Categorie modal (ongewijzigd)");}

function toggleConfirmed(){showConfirmed=!showConfirmed;}

function openModal(){alert("Modal (ongewijzigd)");}

renderAccounts();
render();
</script>

</body>
</html>
