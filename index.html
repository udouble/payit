<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payit v4.7</title>
  <style>
    /* 1. Vernieuwd Kleurenpalet (Lichter & Frisser) */
    :root {
      --bg-body: #e2e8f0; /* Light Slate Grey */
      --bg-sidebar: #f1f5f9; /* Zeer licht Slate */
      --bg-card: #ffffff;
      --bg-input: #f8fafc;
      --primary: #3f8cff; /* Helderblauw */
      --text-main: #1e293b; /* Deep Slate (bijna zwart) */
      --text-muted: #64748b; /* Medium Slate */
      --border: #cbd5e1; /* Slate Border */
      --positive: #10b981; /* Emerald Green */
      --negative: #ef4444; /* Red */
      --orange: #f97316; /* Bright Orange */
    }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* MAIN VIEW */
    .main-view {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-body);
      position: relative;
    }

    .navbar {
      background: rgba(241, 245, 249, 0.8);
      backdrop-filter: blur(12px);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 90;
    }

    /* ACCOUNT ITEMS (Sidebar) */
    .acc-item {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .acc-item:hover { background: var(--bg-card); border-color: var(--border); }
    .acc-item.active { 
      background: #ffffff;
      border-color: var(--primary); 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .acc-name { font-weight: 600; font-size: 15px; color: var(--text-main); }
    .acc-bal { font-family: "SF Mono", monospace; color: var(--orange); font-size: 14px; font-weight: 700; }

    /* TRANSACTIONS CONTENT */
    .content-wrapper {
      padding: 30px;
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .summary-hero {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 25px 40px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03);
    }
    .hero-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .hero-total { font-size: 32px; font-weight: 800; color: var(--orange); }

    /* TRANSACTION ROW (Single Line) */
    .tr-row {
      background: var(--bg-card);
      margin-bottom: 8px;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tr-row:hover { background: var(--bg-input); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .tr-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    
    .tr-info { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
    .tr-cat { font-weight: 600; font-size: 15px; color: var(--text-main); white-space: nowrap; }
    .tr-sep { color: var(--border); font-size: 12px; }
    .tr-memo { color: var(--text-muted); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .tr-right { text-align: right; display: flex; align-items: center; gap: 25px; }
    .tr-amount { font-family: "SF Mono", monospace; font-weight: 700; font-size: 16px; min-width: 110px; }
    .tr-date { font-size: 12px; color: var(--text-muted); width: 85px; }

    /* MODALS & BUTTONS (Verbeterde Layout) */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--bg-card); width: 90%; max-width: 480px;
      padding: 35px; border-radius: 24px; border: 1px solid var(--border);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%; padding: 14px; margin-top: 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text-main); font-size: 16px; box-sizing: border-box;
      -webkit-appearance: none;
    }

    /* Knoppen Grid */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 25px;
    }

    .btn { padding: 16px; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; text-align: center; font-size: 15px;}
    .btn-save { background: var(--primary); color: white; grid-column: 2; }
    .btn-cancel { background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); grid-column: 1; }
    .btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
    .btn-dup { background: #e0e7ff; color: #4f46e5; border: 1px solid #c7d2fe; }

    /* Pull indicator */
    #pull-indicator {
      position: absolute; top: 64px; left: 0; right: 0; text-align: center;
      font-size: 12px; color: var(--text-muted); opacity: 0; z-index: 10;
    }

    /* Helpers */
    .green { background: var(--positive); box-shadow: 0 0 8px rgba(16, 185, 129, 0.2); }
    .red { background: var(--negative); box-shadow: 0 0 8px rgba(239, 68, 68, 0.2); }
    .pos-text { color: var(--positive); }
    .neg-text { color: var(--negative); }
    .sync-label { font-size: 11px; color: var(--text-muted); text-align: center; margin: 15px 0; }

    @media (max-width: 850px) {
      .sidebar { display: none; }
      .content-wrapper { padding: 15px; padding-bottom: 100px; }
      .tr-info { flex-direction: column; align-items: flex-start; gap: 2px; }
      .tr-sep { display: none; }
      .tr-memo { font-size: 12px; }
      .tr-right { gap: 10px; }
      .summary-hero { padding: 20px; flex-direction: column; gap: 10px; text-align: center; }
      .modal { align-items: flex-end; }
      .modal-content { border-radius: 24px 24px 0 0; width: 100%; max-width: 100%; padding: 25px;}
      .btn-grid { grid-template-columns: 1fr; }
      .btn-save { grid-column: 1; }
      .btn-cancel { grid-column: 1; order: 2;}
    }
  </style>
</head>
<body id="app-body">

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: 800; color: var(--primary); font-size: 20px;">Payit</span>
      <button onclick="openAccountModal()" style="background:var(--bg-card); border:1px solid var(--border); color:var(--primary); width:32px; height:32px; border-radius:8px; cursor:pointer;">+</button>
    </div>
    <div class="sidebar-content" id="sidebar-accounts">
      </div>
    <div class="sync-label" id="sync-label">Sync: OK</div>
  </aside>

  <main class="main-view" id="main-scroll">
    <div id="pull-indicator">Laat los om te verversen...</div>
    
    <nav class="navbar">
      <div id="nav-title" style="font-weight: 700; font-size: 18px;">Laden...</div>
      <div style="flex: 1;"></div>
      <button onclick="openModal()" class="btn-save" style="padding: 10px 20px; border-radius: 12px; font-size: 14px; border: none; cursor:pointer;">+ Nieuw</button>
    </nav>

    <div class="content-wrapper">
      <div id="transaction-view">
        <div class="summary-hero">
          <div class="hero-label">Huidig Saldo</div>
          <div id="total" class="hero-total">€ 0,00</div>
        </div>
        
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Historie</span>
          <button id="filterBtn" onclick="toggleConfirmed()" style="background:none; border:none; color:var(--primary); font-size: 13px; font-weight: 600; cursor:pointer;">Toon bevestigd</button>
        </div>
        
        <div id="transactions-container"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin:0 0 20px 0; color:var(--primary);">Transactie</h3>
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie" list="cat-list">
    <datalist id="cat-list"></datalist>
    <input type="text" id="memo" placeholder="Memo / Omschrijving">
    <div style="display:flex; gap:10px;">
        <input type="number" id="income" placeholder="In" step="0.01" style="color:var(--positive)">
        <input type="number" id="expense" placeholder="Uit" step="0.01" style="color:var(--negative)">
    </div>
    <select id="status"><option value="pending">Afwachtend</option><option value="confirmed">Bevestigd</option></select>
    <select id="target-account"></select>
    
    <div class="btn-grid">
        <button id="btnCancelTransaction" class="btn btn-cancel" onclick="closeModal()">Annuleren</button>
        <button id="btnSaveTransaction" class="btn btn-save" onclick="saveTransaction()">Opslaan</button>
        
        <button id="btnDeleteTransaction" class="btn btn-danger" onclick="deleteTransaction()" style="display:none; grid-column: 1 / -1;">Wissen</button>
        <button id="btnDupTransaction" class="btn btn-dup" onclick="duplicateTransaction()" style="display:none; grid-column: 1 / -1; margin-top:-8px;">Dupliceren</button>
    </div>
  </div>
</div>

<div class="modal" id="accModal">
  <div class="modal-content">
    <h3 id="accModalTitle" style="color:var(--primary);">Rekening Management</h3>
    <input type="text" id="newAccName" placeholder="Naam rekening">
    <div class="btn-grid">
      <button class="btn btn-cancel" onclick="closeAccountModal()">Annuleren</button>
      <button class="btn btn-save" onclick="handleAccountAction()">Opslaan</button>
      <button id="acc-delete-btn" class="btn btn-danger" onclick="deleteAccount()" style="display:none; grid-column: 1 / -1;">Verwijder Rekening</button>
    </div>
  </div>
</div>

<script>
/** CONFIGURATIE **/
const SUPABASE_URL = 'https://bfbcyskqgasqouzbakpe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmYmN5c2txZ2FzcW91emJha3BlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjkxMzcsImV4cCI6MjA5MTUwNTEzN30._0_530X8aEaLJmPpH0oBoUZnDdG3O0oIwsWHkP1VxqQ';
const DB_RECORD_ID = 'main_user'; 

let categories = ["Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW","BMW - onderhoud en verzekering","Consensus","Correctie","Delhaize","Dienstencheques","Diversen","Eneco","Etentjes","Invecon","Kampen","Kapper-voeten","KBC","Lening","Maxem","NOG TE ONTVANGEN","Nutsvoorzieningen","Onderhoud","Opzij","Opzij voor liq.reserve 01/2027","Overige","Overschrijving","Paypal","Pensioen","Rekening courant","Reserve","Restant voor de maand","Straetus","Straetus-tweewekelijks","Terugbetaling","TotalEnergies","Tuin","Vanalles","Vergoeding laden"];
let accounts = [{ id:'1',name:'Privé'}];
let transactions = [];
let activeAccountId = null;
let editingId = null;
let editingAccountId = null;
let showConfirmed = false;

function formatCurrency(n) { return new Intl.NumberFormat('nl-BE', { style: 'currency', currency: 'EUR' }).format(n); }

function selectAccount(accId) {
    activeAccountId = accId;
    const acc = accounts.find(a => a.id === accId);
    document.getElementById('nav-title').innerText = acc.name;
    renderAccounts();
    renderTransactions();
}

function renderAccounts() {
    const sidebar = document.getElementById('sidebar-accounts');
    sidebar.innerHTML = '';
    accounts.forEach(acc => {
        const bal = transactions.filter(t => t.accountId === acc.id).reduce((sum, t) => sum + Number(t.amount), 0);
        const div = document.createElement('div');
        div.className = `acc-item ${activeAccountId === acc.id ? 'active' : ''}`;
        div.onclick = () => selectAccount(acc.id);
        div.innerHTML = `
            <span class="acc-name">${acc.name}</span>
            <span class="acc-bal">${formatCurrency(bal)}</span>
            <span onclick="event.stopPropagation(); openAccountModal('${acc.id}')" style="margin-left:10px; opacity:0.5; font-size:12px;">⚙️</span>
        `;
        sidebar.appendChild(div);
    });
}

function renderTransactions() {
    const container = document.getElementById('transactions-container');
    container.innerHTML = '';
    let filtered = transactions.filter(t => t.accountId === activeAccountId);
    let pending = filtered.filter(t => t.status !== 'confirmed');
    let confirmed = filtered.filter(t => t.status === 'confirmed');
    let displayList = showConfirmed ? [...pending, ...confirmed] : pending;
    let total = displayList.reduce((sum, t) => sum + Number(t.amount), 0);

    displayList.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
        container.innerHTML += `
            <div class="tr-row" onclick="openModal('${t.id}')">
                <div class="tr-status ${t.status === 'confirmed' ? 'green' : 'red'}"></div>
                <div class="tr-info">
                    <span class="tr-cat">${t.category}</span>
                    <span class="tr-sep">•</span>
                    <span class="tr-memo">${t.memo || '-'}</span>
                </div>
                <div class="tr-right">
                    <div class="tr-amount ${t.amount < 0 ? 'neg-text' : 'pos-text'}">${formatCurrency(t.amount)}</div>
                    <div class="tr-date">${t.date}</div>
                </div>
            </div>
        `;
    });
    document.getElementById('total').innerText = formatCurrency(total);
}

/** MODALS & ACTIONS (Verbeterde Knoppen Logica) **/
function openModal(id = null) {
    editingId = id;
    document.getElementById('modal').style.display = 'flex';
    
    // Knoppen tonen/verbergen op basis van bewerken/nieuw
    document.getElementById('btnDeleteTransaction').style.display = id ? 'block' : 'none';
    document.getElementById('btnDupTransaction').style.display = id ? 'block' : 'none';
    
    document.getElementById('target-account').innerHTML = accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    document.getElementById('cat-list').innerHTML = categories.map(c => `<option value="${c}">`).join('');
    if (id) {
        let t = transactions.find(x => x.id === id);
        document.getElementById('date').value = t.date;
        document.getElementById('category').value = t.category;
        document.getElementById('memo').value = t.memo;
        document.getElementById('status').value = t.status;
        document.getElementById('target-account').value = t.accountId;
        if(t.amount >= 0) { document.getElementById('income').value = t.amount; document.getElementById('expense').value = ''; }
        else { document.getElementById('expense').value = Math.abs(t.amount); document.getElementById('income').value = ''; }
    } else {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('category').value = ''; document.getElementById('memo').value = '';
        document.getElementById('status').value = 'pending';
        document.getElementById('target-account').value = activeAccountId || accounts[0].id;
    }
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function openAccountModal(id = null) {
    editingAccountId = id;
    document.getElementById('accModal').style.display = 'flex';
    document.getElementById('acc-delete-btn').style.display = id ? 'block' : 'none';
    document.getElementById('newAccName').value = id ? accounts.find(a => a.id === id).name : '';
}
function closeAccountModal() { document.getElementById('accModal').style.display = 'none'; }

async function saveTransaction() {
    let amt = document.getElementById('income').value ? parseFloat(document.getElementById('income').value) : -parseFloat(document.getElementById('expense').value || 0);
    let data = { id: editingId || Date.now().toString(), date: document.getElementById('date').value, category: document.getElementById('category').value, memo: document.getElementById('memo').value, amount: amt, status: document.getElementById('status').value, accountId: document.getElementById('target-account').value };
    if (editingId) transactions[transactions.findIndex(t => t.id === editingId)] = data;
    else transactions.push(data);
    closeModal(); syncToCloud(); renderTransactions(); renderAccounts();
}
function deleteTransaction() { if(confirm('Wissen?')) { transactions = transactions.filter(t => t.id !== editingId); closeModal(); syncToCloud(); renderTransactions(); renderAccounts(); } }
function duplicateTransaction() { let t = transactions.find(x => x.id === editingId); transactions.push({...t, id: Date.now().toString(), status: 'pending'}); closeModal(); syncToCloud(); renderTransactions(); renderAccounts(); }

function handleAccountAction() {
    const name = document.getElementById('newAccName').value;
    if(!name) return;
    if(editingAccountId) accounts.find(a => a.id === editingAccountId).name = name;
    else accounts.push({ id: Date.now().toString(), name });
    closeAccountModal(); syncToCloud(); renderAccounts();
}
function deleteAccount() {
    if(confirm('Echt zeker? Data gaat verloren.')) {
        transactions = transactions.filter(t => t.accountId !== editingAccountId);
        accounts = accounts.filter(a => a.id !== editingAccountId);
        closeAccountModal(); syncToCloud(); renderAccounts();
        if (accounts.length > 0) selectAccount(accounts[0].id);
    }
}
function toggleConfirmed() { showConfirmed = !showConfirmed; document.getElementById('filterBtn').innerText = showConfirmed ? "Verberg bevestigd" : "Toon bevestigd"; renderTransactions(); }

/** CLOUD & SYNC **/
async function syncToCloud() {
    document.getElementById('sync-label').innerText = "Sync: Opslaan...";
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.${DB_RECORD_ID}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ data: { categories, accounts, transactions } }) });
        document.getElementById('sync-label').innerText = "Sync: OK";
    } catch (e) { document.getElementById('sync-label').innerText = "Sync: Offline"; }
}
async function loadFromCloud() {
    document.getElementById('sync-label').innerText = "Sync: Laden...";
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.${DB_RECORD_ID}&select=data`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        const result = await response.json();
        if (result?.[0]?.data) {
            const d = result[0].data;
            if(d.categories) categories = d.categories;
            if(d.accounts) accounts = d.accounts;
            if(d.transactions) transactions = d.transactions;
            if (!activeAccountId && accounts.length > 0) selectAccount(accounts[0].id);
            else { renderAccounts(); renderTransactions(); }
            document.getElementById('sync-label').innerText = "Sync: OK";
        }
    } catch (e) { document.getElementById('sync-label').innerText = "Sync: Fout"; }
}

/** KEYS & PULL **/
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (document.getElementById('modal').style.display === 'flex') saveTransaction();
        else if (document.getElementById('accModal').style.display === 'flex') handleAccountAction();
    }
    if (e.key === 'Escape') { closeModal(); closeAccountModal(); }
});

let startY = 0; let pullDist = 0;
const scrollArea = document.getElementById('main-scroll');
const indicator = document.getElementById('pull-indicator');
scrollArea.addEventListener('touchstart', (e) => { if (scrollArea.scrollTop === 0) startY = e.touches[0].pageY; else startY = 0; });
scrollArea.addEventListener('touchmove', (e) => {
    if (startY === 0) return;
    pullDist = e.touches[0].pageY - startY;
    if (pullDist > 0 && pullDist < 100) { indicator.style.opacity = pullDist / 100; indicator.style.transform = `translateY(${pullDist/2}px)`; }
});
scrollArea.addEventListener('touchend', async () => {
    if (pullDist > 70) await loadFromCloud();
    indicator.style.opacity = 0; indicator.style.transform = `translateY(0)`;
    pullDist = 0; startY = 0;
});

loadFromCloud();
</script>
</body>
</html>
