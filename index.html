<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.11</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: white; font-size: 20px; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #2b2b2b; padding: 25px; border-right: 1px solid #444; }
    .sidebar h2 { font-size: 24px; color: #4caf50; margin-bottom: 20px; }
    .account-item { display: flex; align-items: center; margin-bottom: 12px; gap: 8px; }
    .account { flex: 1; padding: 12px 15px; background: #3a3a3a; border-radius: 6px; cursor: pointer; font-size: 20px; }
    .account.active { background: #4caf50; font-weight: bold; }
    .acc-btn { background: #444; border: none; color: #999; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .add-acc-btn { width: 100%; padding: 12px; margin-top: 20px; background: transparent; border: 1px dashed #666; color: #aaa; border-radius: 6px; cursor: pointer; font-size: 20px; }
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .topbar h2 { font-size: 28px; margin: 0; }
    .add-btn { background: #4caf50; border: none; color: white; padding: 10px 20px; border-radius: 6px; font-size: 24px; cursor: pointer; }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 15px 10px; text-align: left; color: #888; border-bottom: 2px solid #333; cursor: pointer; font-size: 16px; user-select: none; }
    td { padding: 15px 10px; border-bottom: 1px solid #222; font-size: 20px; }

    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 140px; }
    th:nth-child(3), td:nth-child(3) { width: 200px; }
    th:nth-child(4), td:nth-child(4) { width: 140px; text-align: right; }

    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    .green { background: #4caf50; }
    .red { background: #ff5252; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
    .modal-content { background: #2b2b2b; padding: 30px; border-radius: 12px; width: 480px; }

    .modal-content label { display: block; margin-top: 15px; font-size: 14px; color: #888; text-transform: uppercase; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 12px; margin-top: 5px;
      background: #1a1a1a; border: 1px solid #444;
      color: white; border-radius: 6px; font-size: 20px;
    }

    .amount-grid {
      display: flex;
      gap: 10px;
    }

    .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .save-btn { background: #4caf50; color: white; }
    .duplicate-btn { background: #2196F3; color: white; }
    .delete-btn { background: transparent; color: #ff5252; border: 1px solid #ff5252; }
    .close-btn { background: #555; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>

    <label>Datum</label>
    <input type="date" id="date">

    <label>Categorie</label>
    <input type="text" id="category">

    <label>Memo</label>
    <input type="text" id="memo">

    <label>Bedrag</label>
    <div class="amount-grid">
      <input type="number" id="income" placeholder="Inkomsten">
      <input type="number" id="expense" placeholder="Uitgaven">
    </div>

    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <div id="account-select-container">
      <label>Verplaats naar rekening</label>
      <select id="target-account"></select>
    </div>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>

    <div class="btn-group" id="edit-actions">
      <button class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
      <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    </div>

    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = accounts[0].id;
let editingId = null;
let sortConfig = { field: 'status', direction: 'asc' };

function renderAccounts() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';
  accounts.sort((a,b)=>a.name.localeCompare(b.name)).forEach(acc=>{
    const item=document.createElement('div');
    item.className='account-item';
    item.innerHTML=`
      <div class="account ${acc.id===activeAccountId?'active':''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
      <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
      <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>`;
    list.appendChild(item);
  });
  document.getElementById('current-account-title').innerText=accounts.find(a=>a.id===activeAccountId)?.name;
  updateAccountDropdown();
}

function updateAccountDropdown(){
  const select=document.getElementById('target-account');
  select.innerHTML='';
  accounts.forEach(acc=>{
    const opt=document.createElement('option');
    opt.value=acc.id;
    opt.innerText=acc.name;
    select.appendChild(opt);
  });
}

function renderTransactions(){
  const tbody=document.getElementById('transactions');
  tbody.innerHTML='';
  transactions.filter(t=>t.accountId===activeAccountId).forEach(t=>{
    const tr=document.createElement('tr');
    tr.onclick=()=>openModal(t.id);
    tr.innerHTML=`
      <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>€ ${parseFloat(t.amount).toFixed(2)}</td>
      <td>${t.memo||''}</td>`;
    tbody.appendChild(tr);
  });
}

function openModal(id=null){
  editingId=id;
  modal.style.display='flex';

  income.value='';
  expense.value='';

  if(id){
    const t=transactions.find(x=>x.id===id);
    date.value=t.date;
    category.value=t.category;
    memo.value=t.memo;
    status.value=t.status;

    if(t.amount>=0){
      income.value=t.amount;
    } else {
      expense.value=Math.abs(t.amount);
    }

  } else {
    date.value=new Date().toISOString().split('T')[0];
    category.value='';
    memo.value='';
    status.value='pending';
  }
}

function saveTransaction(){
  let inc=parseFloat(income.value)||0;
  let exp=parseFloat(expense.value)||0;
  let amount=inc>0 ? inc : -exp;

  const data={
    id:editingId||Date.now().toString(),
    date:date.value,
    category:category.value||'Diversen',
    memo:memo.value,
    amount:amount,
    status:status.value,
    accountId:activeAccountId
  };

  if(editingId){
    const i=transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions',JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function closeModal(){modal.style.display='none';}
function duplicateTransaction(){if(!editingId)return;const t=transactions.find(x=>x.id===editingId);transactions.push({...t,id:Date.now().toString()});renderTransactions();}
function deleteTransaction(){transactions=transactions.filter(t=>t.id!==editingId);renderTransactions();}
function addAccount(){const n=prompt("Naam");if(!n)return;const id=Date.now().toString();accounts.push({id,name:n});activeAccountId=id;renderAccounts();}
function renameAccount(id){const acc=accounts.find(a=>a.id===id);const n=prompt("Nieuwe naam",acc.name);if(n)acc.name=n;renderAccounts();}
function removeAccount(id){accounts=accounts.filter(a=>a.id!==id);transactions=transactions.filter(t=>t.accountId!==id);activeAccountId=accounts[0]?.id;renderAccounts();renderTransactions();}
function selectAccount(id){activeAccountId=id;renderAccounts();renderTransactions();}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
