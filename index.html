<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    :root {
      --bg-dark: #121212;
      --bg-sidebar: #1e1e1e;
      --accent: #4caf50;
      --text-main: #e0e0e0;
    }

    body { 
      margin: 0; 
      font-family: Arial, sans-serif; 
      background: var(--bg-dark); 
      color: var(--text-main); 
      font-size: 20px; /* Dit is 15pt */
    }

    .container { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { width: 300px; background: var(--bg-sidebar); padding: 25px; border-right: 1px solid #333; }
    .sidebar h2 { font-size: 22px; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; }

    .account-item { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
    
    .account {
      flex: 1;
      padding: 12px 15px;
      background: #2d2d2d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 20px;
    }
    .account.active { background: var(--accent); color: white; font-weight: bold; }

    .acc-btn {
      background: #333;
      border: none;
      color: #999;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .acc-btn:hover { background: #444; color: white; }

    .add-acc-btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: transparent;
      border: 1px solid #444;
      color: #999;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
    }

    /* Main Content */
    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .topbar h2 { font-size: 28px; margin: 0; }

    .add-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 30px;
      cursor: pointer;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 15px 10px; text-align: left; color: #888; border-bottom: 2px solid #333; cursor: pointer; font-size: 16px; }
    td { padding: 15px 10px; border-bottom: 1px solid #222; font-size: 20px; }

    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 140px; }
    th:nth-child(3), td:nth-child(3) { width: 200px; }
    th:nth-child(4), td:nth-child(4) { width: 140px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 20px; color: #999; }

    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    .green { background: var(--accent); }
    .red { background: #ff5252; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content { background: #252525; padding: 30px; border-radius: 12px; width: 450px; }
    .modal-content label { display: block; margin-top: 15px; font-size: 14px; color: #888; text-transform: uppercase; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 12px; margin-top: 5px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 6px; font-size: 20px; box-sizing: border-box;
    }

    .btn { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .save-btn { background: var(--accent); color: white; }
    .delete-btn { background: transparent; color: #ff5252; border: 1px solid #ff5252; margin-top: 20px; }
    .close-btn { background: #444; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Laden...</h2>
      <button class="add-btn" onclick="openModal()">+</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <label>Categorie</label>
    <input type="text" id="category">
    <label>Memo</label>
    <input type="text" id="memo">
    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
    <button class="btn delete-btn" id="delete-btn" onclick="deleteTransaction()" style="display:none;">Verwijderen</button>
  </div>
</div>

<script>
  // Robuuste data-initialisatie
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [
    { id: '1', name: 'Privé' },
    { id: '2', name: 'VOF' }
  ];
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let sortConfig = { field: 'status', direction: 'asc' };
  let editingId = null;

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    
    accounts.forEach(acc => {
      const divItem = document.createElement('div');
      divItem.className = 'account-item';
      
      const divAcc = document.createElement('div');
      divAcc.className = `account ${acc.id === activeAccountId ? 'active' : ''}`;
      divAcc.innerText = acc.name;
      divAcc.onclick = () => { activeAccountId = acc.id; renderAccounts(); renderTransactions(); };
      
      const btnEdit = document.createElement('button');
      btnEdit.className = 'acc-btn';
      btnEdit.innerText = '✎';
      btnEdit.onclick = (e) => { e.stopPropagation(); renameAccount(acc.id); };

      const btnDel = document.createElement('button');
      btnDel.className = 'acc-btn';
      btnDel.innerText = '✕';
      btnDel.onclick = (e) => { e.stopPropagation(); removeAccount(acc.id); };

      divItem.appendChild(divAcc);
      divItem.appendChild(btnEdit);
      divItem.appendChild(btnDel);
      list.appendChild(divItem);
    });
    
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
  }

  function addAccount() {
    const n = prompt("Naam rekening:");
    if (n) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: n });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const n = prompt("Nieuwe naam:", acc.name);
    if (n) {
      acc.name = n;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;
    if (confirm("Rekening verwijderen?")) {
      accounts = accounts.filter(a => a.id !== id);
      if (activeAccountId === id) activeAccountId = accounts[0].id;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
      renderTransactions();
    }
  }

  function toggleSort(f) {
    if (sortConfig.field === f) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : '
