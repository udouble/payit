<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    :root {
      --bg-dark: #121212;
      --bg-sidebar: #1e1e1e;
      --bg-item: #2d2d2d;
      --accent: #4caf50;
      --text-main: #e0e0e0;
      --text-dim: #909090;
      --danger: #ef5350;
    }

    body { 
      margin: 0; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg-dark); 
      color: var(--text-main); 
      font-size: 20px; /* 15pt */
    }

    .container { display: flex; height: 100vh; }

    /* Sidebar Styling */
    .sidebar { 
      width: 320px; 
      background: var(--bg-sidebar); 
      padding: 30px 20px; 
      border-right: 1px solid #333; 
      display: flex; 
      flex-direction: column; 
    }
    
    .sidebar h2 { font-size: 24px; margin-bottom: 25px; color: var(--accent); letter-spacing: 1px; }

    .account-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      group: hover;
    }

    .account {
      flex: 1;
      padding: 14px 18px;
      background: var(--bg-item);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 20px;
      border: 1px solid transparent;
    }

    .account:hover { background: #383838; }
    .account.active { background: rgba(76, 175, 80, 0.15); border-color: var(--accent); color: white; font-weight: 600; }

    .acc-actions { display: flex; gap: 5px; margin-left: 10px; opacity: 0; transition: opacity 0.2s; }
    .account-item:hover .acc-actions { opacity: 1; }

    .acc-action-btn {
      background: #333;
      border: none;
      color: var(--text-dim);
      width: 40px;
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .acc-action-btn:hover { background: #444; color: white; }
    .acc-action-btn.del:hover { background: var(--danger); }

    .add-acc-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid #444;
      color: var(--text-dim);
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }

    .add-acc-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(76, 175, 80, 0.05); }

    /* Main Content */
    .main { flex: 1; padding: 40px; overflow-y: auto; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .topbar h2 { font-size: 32px; margin: 0; font-weight: 400; }

    .add-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .add-btn:hover { transform: scale(1.1); }

    /* Table Styling */
    table { width: 100%; border-collapse: collapse; }
    th { 
      padding: 15px 10px; 
      text-align: left; 
      font-size: 14px; 
      text-transform: uppercase; 
      color: var(--text-dim); 
      letter-spacing: 1px;
      border-bottom: 2px solid #2d2d2d;
      cursor: pointer;
    }
    th:hover { color: var(--text-main); }
    
    td { padding: 20px 10px; border-bottom: 1px solid #222; font-size: 20px; }

    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 150px; }
    th:nth-child(3), td:nth-child(3) { width: 220px; }
    th:nth-child(4), td:nth-child(4) { width: 150px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 30px; color: var(--text-dim); }

    tr:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }

    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    .green { background: var(--accent); box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); }
    .red { background: #ffb74d; box-shadow: 0 0 10px rgba(255, 183, 77, 0.4); }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #252525;
      padding: 40px;
      border-radius: 20px;
      width: 500px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .modal-content h3 { margin-top: 0; font-size: 24px; margin-bottom: 20px; }
    .modal-content label { display: block; margin-top: 20px; color: var(--text-dim); font-size: 14px; text-transform: uppercase; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 15px; margin-top: 8px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 20px;
    }

    .btn { width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .save-btn { background: var(--accent); color: white; }
    .delete-btn { background: transparent; color: var(--danger); margin-top: 20px; border: 1px solid var(--danger); }
    .delete-btn:hover { background: var(--danger); color: white; }
    .close-btn { background: #444; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>REKENINGEN</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Laden...</h2>
      <button class="add-btn" onclick="openModal()">+</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Nieuwe transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <label>Categorie</label>
    <input type="text" id="category" placeholder="Bijv. Huur">
    <label>Memo</label>
    <input type="text" id="memo" placeholder="Optioneel">
    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01" placeholder="0.00">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
    <button class="btn delete-btn" id="delete-btn" onclick="deleteTransaction()" style="display:none;">Transactie verwijderen</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [
    { id: '1', name: 'Privé' },
    { id: '2', name: 'VOF' }
  ];
  
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    const sorted = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    
    sorted.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      
      const div = document.createElement('div');
      div.className = `account ${acc.id === activeAccountId ? 'active' : ''}`;
      div.innerText = acc.name;
      div.onclick = () => { activeAccountId = acc.id; renderAccounts(); renderTransactions(); };
      
      const actions = document.createElement('div');
      actions.className = 'acc-actions';
      
      const editBtn = document.createElement('button');
      editBtn.className = 'acc-action-btn';
      editBtn.innerHTML = '✎';
      editBtn.onclick = (e) => { e.stopPropagation(); renameAccount(acc.id); };
      
      const delBtn = document.createElement('button');
      delBtn.className = 'acc-action-btn del';
      delBtn.innerHTML = '✕';
      delBtn.onclick = (e) => { e.stopPropagation(); removeAccount(acc.id); };
      
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      item.appendChild(div);
      item.appendChild(actions);
      list.appendChild(item);
    });
    
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
  }

  function addAccount() {
    const name = prompt("Naam nieuwe rekening:");
    if (name && name.trim()) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: name.trim() });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const newName = prompt("Hernoem rekening:", acc.name);
    if (newName && newName.trim()) {
      acc.name = newName.trim();
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;
    if (confirm("Rekening verwijderen?")) {
      accounts = accounts.filter(a => a.id !== id);
      if (activeAccountId === id) activeAccountId = accounts[0].id;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
      renderTransactions();
    }
  }

  function toggleSort(field) {
    if (sortConfig.field === field) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
    } else {
      sortConfig.field = field;
