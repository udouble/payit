<!DOCTYPE html>
<html>
<head>
  <title>Payit V3 Premium</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
      color: #e5e7eb;
      font-size: 18px;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 24px;
      gap: 24px;
      box-sizing: border-box;
    }

    .sidebar {
      width: 260px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .sidebar h2 {
      font-size: 16px;
      color: #34d399;
      margin-bottom: 15px;
    }

    .account-item { display:flex; gap:8px; margin-bottom:8px; }

    .account {
      flex:1;
      padding:10px;
      border-radius:10px;
      background: rgba(255,255,255,0.04);
      cursor:pointer;
    }

    .account.active {
      background: linear-gradient(135deg,#34d399,#059669);
      color:white;
    }

    .acc-btn {
      background: rgba(255,255,255,0.05);
      border:none;
      color:#9ca3af;
      padding:6px;
      border-radius:6px;
      cursor:pointer;
    }

    .add-acc-btn {
      width:100%;
      margin-top:15px;
      padding:10px;
      border-radius:10px;
      border:1px dashed rgba(255,255,255,0.2);
      background:transparent;
      color:#9ca3af;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:30px;
      border-radius:20px;
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(40px);
      border:1px solid rgba(255,255,255,0.15);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .add-btn {
      background: linear-gradient(135deg,#fb923c,#ea580c);
      border:none;
      padding:10px 18px;
      border-radius:12px;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
    }

    th {
      text-align:left;
      font-size:12px;
      color:#94a3b8;
      padding:10px;
    }

    tr {
      background: rgba(255,255,255,0.04);
      transition:0.2s;
    }

    tr:hover {
      background: rgba(255,255,255,0.08);
      transform:scale(1.01);
    }

    td {
      padding:16px 12px;
    }

    td:first-child { border-radius:12px 0 0 12px; }
    td:last-child { border-radius:0 12px 12px 0; }

    td:nth-child(4) {
      text-align:right;
      font-weight:600;
    }

    td:nth-child(5) { color:#94a3b8; }

    .status-dot {
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .green { background:#34d399; }
    .red { background:#ef4444; }

    .modal {
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-content {
      background: rgba(15,23,42,0.95);
      padding:30px;
      border-radius:20px;
      width:480px;
      border:1px solid rgba(255,255,255,0.15);
    }

    .modal-content input, .modal-content select {
      width:100%;
      padding:12px;
      margin-top:5px;
      background: rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;
      color:white;
    }

    .btn-group { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .btn { flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer; }

    .save-btn { background: linear-gradient(135deg,#fb923c,#ea580c); color:white; }
    .duplicate-btn { background:#3b82f6; color:white; }
    .delete-btn { background:transparent; color:#ef4444; border:1px solid #ef4444; }
    .close-btn { background:#555; color:white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>

    <label>Datum</label>
    <input type="date" id="date">

    <label>Categorie</label>
    <input type="text" id="category">

    <label>Memo</label>
    <input type="text" id="memo">

    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01">

    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <div id="account-select-container">
      <label>Verplaats naar rekening</label>
      <select id="target-account"></select>
    </div>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>

    <div class="btn-group" id="edit-actions">
      <button class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
      <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    </div>

    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
/* 🔽 EXACT jouw originele JS — NIETS aangepast */
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = accounts[0].id;
let editingId = null;
let sortConfig = { field: 'status', direction: 'asc' };

function renderAccounts() {
  const list = document.getElementById('accounts-list');
  if(!list) return;
  list.innerHTML = '';
  const displayAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
  displayAccounts.forEach(acc => {
    const item = document.createElement('div');
    item.className = 'account-item';
    item.innerHTML = `
      <div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
      <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
      <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>
    `;
    list.appendChild(item);
  });
  const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
  document.getElementById('current-account-title').innerText = activeAcc.name;
  updateAccountDropdown();
}

function updateAccountDropdown() {
  const select = document.getElementById('target-account');
  if(!select) return;
  select.innerHTML = '';
  [...accounts].sort((a, b) => a.name.localeCompare(b.name)).forEach(acc => {
    const opt = document.createElement('option');
    opt.value = acc.id;
    opt.innerText = acc.name;
    select.appendChild(opt);
  });
}

function selectAccount(id) {
  activeAccountId = id;
  renderAccounts();
  renderTransactions();
}

function renderTransactions() {
  const tbody = document.getElementById('transactions');
  if(!tbody) return;
  tbody.innerHTML = '';
  let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
  data.sort((a, b) => {
    let vA = a[sortConfig.field] || "";
    let vB = b[sortConfig.field] || "";
    if (sortConfig.field === 'amount') { vA = parseFloat(a.amount) || 0; vB = parseFloat(b.amount) || 0; }
    if (sortConfig.field === 'status') { vA = a.status === 'pending' ? 0 : 1; vB = b.status === 'pending' ? 0 : 1; }
    if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
    if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
    return (b.date || "").localeCompare(a.date || "");
  });
  data.forEach(t => {
    const tr = document.createElement('tr');
    tr.onclick = () => openModal(t.id);
    tr.innerHTML = `
      <td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
      <td>${t.date || ''}</td>
      <td>${t.category || ''}</td>
      <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
      <td style="color:#888">${t.memo || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleSort(field) {
  sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc';
  sortConfig.field = field;
  renderTransactions();
}

function openModal(id = null) {
  editingId = id;
  const m = document.getElementById('modal');
  const accSelect = document.getElementById('account-select-container');
  const editActions = document.getElementById('edit-actions');
  
  if (id) {
    const t = transactions.find(x => x.id === id);
    document.getElementById('modal-title').innerText = 'Bewerken';
    document.getElementById('date').value = t.date;
    document.getElementById('category').value = t.category;
    document.getElementById('memo').value = t.memo || '';
    document.getElementById('amount').value = t.amount;
    document.getElementById('status').value = t.status;
    document.getElementById('target-account').value = t.accountId || accounts[0].id;
    accSelect.style.display = 'block';
    editActions.style.display = 'flex';
  } else {
    document.getElementById('modal-title').innerText = 'Nieuw';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('category').value = '';
    document.getElementById('memo').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('status').value = 'pending';
    accSelect.style.display = 'none';
    editActions.style.display = 'none';
  }
  m.style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveTransaction() {
  const data = {
    date: document.getElementById('date').value,
    category: document.getElementById('category').value || 'Diversen',
    memo: document.getElementById('memo').value,
    amount: document.getElementById('amount').value || 0,
    status: document.getElementById('status').value,
    accountId: editingId ? document.getElementById('target-account').value : activeAccountId
  };
  if (editingId) {
    const i = transactions.findIndex(t => t.id === editingId);
    transactions[i] = { ...data, id: editingId };
  } else {
    data.id = Date.now().toString();
    transactions.push(data);
  }
  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function duplicateTransaction() {
  if (!editingId) return;
  const t = transactions.find(x => x.id === editingId);
  const copy = { ...t, id: Date.now().toString(), accountId: activeAccountId };
  transactions.push(copy);
  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function addAccount() {
  const n = prompt(\"Naam rekening:\");
  if (n && n.trim()) {
    const newId = Date.now().toString();
    accounts.push({ id: newId, name: n.trim() });
    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    activeAccountId = newId;
    renderAccounts();
    renderTransactions();
  }
}

function renameAccount(id) {
  const acc = accounts.find(a => a.id === id);
  const n = prompt(\"Nieuwe naam:\", acc.name);
  if (n && n.trim()) {
    acc.name = n.trim();
    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    renderAccounts();
  }
}

function removeAccount(id) {
  if (accounts.length <= 1) return;
  if (confirm(\"Wissen?\")) {
    accounts = accounts.filter(a => a.id !== id);
    activeAccountId = accounts[0].id;
    localStorage.setItem('payit_accounts', JSON.stringify(accounts));
    renderAccounts();
    renderTransactions();
  }
}

function deleteTransaction() {
  if (editingId && confirm('Wissen?')) {
    transactions = transactions.filter(t => t.id !== editingId);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }
}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
