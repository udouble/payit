<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.1 Ultra Glass</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 20% 20%, #1e293b 0%, #0f172a 40%, #020617 100%);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.4);
      --accent: #10b981;
      --text-main: #ffffff;
      --text-dim: #94a3b8;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: var(--bg-gradient); 
      background-attachment: fixed;
      color: var(--text-main); 
      font-size: 20px; 
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    .container { display: flex; width: 100vw; height: 100vh; }

    /* Sidebar - Prominent Glass */
    .sidebar { 
      width: 340px; 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(25px);
      padding: 40px 25px; 
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      box-shadow: 20px 0 50px var(--glass-shadow);
      z-index: 10;
    }
    
    .sidebar h2 { 
      font-size: 13px; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      color: var(--accent); 
      margin-bottom: 35px; 
      font-weight: 800;
    }

    .account-item { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }

    .account { 
      flex: 1; 
      padding: 16px 20px; 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border);
      border-radius: 14px; 
      cursor: pointer; 
      transition: all 0.3s ease;
      font-size: 19px;
      backdrop-filter: blur(5px);
    }

    .account:hover { background: rgba(255,255,255,0.1); transform: scale(1.02); }
    .account.active { 
      background: var(--accent); 
      color: white; 
      font-weight: 700; 
      border-color: transparent;
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .acc-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: white;
      width: 42px; height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .acc-btn:hover { background: rgba(255,255,255,0.2); }

    .add-acc-btn { 
      width: 100%;
      margin-top: auto;
      padding: 16px; 
      background: transparent; 
      border: 1px dashed #475569; 
      color: var(--text-dim); 
      border-radius: 12px; 
      cursor: pointer;
      font-size: 17px;
    }

    /* Main Content - Wide Layout */
    .main { 
      flex: 1; 
      padding: 60px 80px; 
      overflow-y: auto; 
      background: rgba(255,255,255,0.01);
    }
    
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
    .topbar h2 { font-size: 42px; font-weight: 900; letter-spacing: -1.5px; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }

    .add-btn { 
      background: var(--accent); 
      border: none; color: white; 
      width: 64px; height: 64px; 
      border-radius: 18px; 
      font-size: 32px; 
      cursor: pointer;
      box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4);
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .add-btn:hover { transform: translateY(-5px) rotate(90deg); }

    /* Table - Glass Container */
    .table-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    th { 
      padding: 20px 15px; 
      text-align: left; 
      color: var(--text-main); 
      font-size: 14px; 
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 800;
      border-bottom: 2px solid var(--glass-border);
    }
    
    td { padding: 25px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    /* Geoptimaliseerde Witverdeling */
    th:nth-child(1), td:nth-child(1) { width: 80px; text-align: center; } /* ST */
    th:nth-child(2), td:nth-child(2) { width: 160px; color: var(--text-dim); } /* Datum */
    th:nth-child(3), td:nth-child(3) { width: 220px; font-weight: 600; } /* Categorie */
    th:nth-child(4), td:nth-child(4) { width: 180px; text-align: right; font-weight: 700; color: var(--accent); } /* Bedrag */
    th:nth-child(5), td:nth-child(5) { width: auto; } /* MEMO vult de rest */

    .status-dot { 
      display: inline-block; 
      width: 12px; height: 12px; 
      border-radius: 50%; 
      position: relative;
    }
    .green { background: #10b981; box-shadow: 0 0 15px #10b981, 0 0 30px rgba(16,185,129,0.3); }
    .red { background: #f43f5e; box-shadow: 0 0 15px #f43f5e, 0 0 30px rgba(244,63,94,0.3); }

    tr:hover td { background: rgba(255,255,255,0.03); cursor: pointer; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #0f172a; padding: 50px; border-radius: 30px; width: 550px; border: 1px solid var(--glass-border); box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>REKENINGEN</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Laden...</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th onclick="toggleSort('status')">ST</th>
            <th onclick="toggleSort('date')">Datum</th>
            <th onclick="toggleSort('category')">Categorie</th>
            <th onclick="toggleSort('amount')">Bedrag</th>
            <th onclick="toggleSort('memo')">Memo</th>
          </tr>
        </thead>
        <tbody id="transactions"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title" style="margin-top:0; font-size:28px">Transactie</h3>
    <div style="display:flex; flex-direction:column; gap:15px">
      <input type="date" id="date" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px">
      <input type="text" id="category" placeholder="Categorie" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px">
      <input type="text" id="memo" placeholder="Memo / Omschrijving" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px">
      <input type="number" id="amount" step="0.01" placeholder="0.00" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px">
      <select id="status" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px">
        <option value="pending">Afwachtend</option>
        <option value="confirmed">Bevestigd</option>
      </select>
      <div id="account-select-container">
          <select id="target-account" style="width:100%; padding:15px; background:#1e293b; border:1px solid #334155; color:white; border-radius:12px; font-size:18px"></select>
      </div>
    </div>
    <button onclick="saveTransaction()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:14px; font-size:20px; font-weight:700; margin-top:25px; cursor:pointer">Opslaan</button>
    <div style="display:flex; gap:10px; margin-top:15px" id="edit-actions">
        <button onclick="duplicateTransaction()" style="flex:1; padding:15px; background:#3b82f6; color:white; border:none; border-radius:12px; cursor:pointer">Dupliceren</button>
        <button onclick="deleteTransaction()" style="flex:1; padding:15px; background:transparent; border:1px solid #f43f5e; color:#f43f5e; border-radius:12px; cursor:pointer">Wissen</button>
    </div>
    <button onclick="closeModal()" style="width:100%; background:transparent; border:none; color:#94a3b8; margin-top:15px; cursor:pointer">Annuleren</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    const displayAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    displayAccounts.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      item.innerHTML = `<div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
        <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
        <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>`;
      list.appendChild(item);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
    updateAccountDropdown();
  }

  function updateAccountDropdown() {
    const select = document.getElementById('target-account');
    if(!select) return;
    select.innerHTML = '';
    [...accounts].sort((a, b) => a.name.localeCompare(b.name)).forEach(acc => {
      const opt = document.createElement('option');
      opt.value = acc.id; opt.innerText = "Verplaatsen naar: " + acc.name;
      select.appendChild(opt);
    });
  }

  function selectAccount(id) { activeAccountId = id; renderAccounts(); renderTransactions(); }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    tbody.innerHTML = '';
    let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    data.sort((a, b) => {
      let vA = a[sortConfig.field] || ""; let vB = b[sortConfig.field] || "";
      if (sortConfig.field === 'amount') { vA = parseFloat(a.amount) || 0; vB = parseFloat(b.amount) || 0; }
      if (sortConfig.field === 'status') { vA = a.status === 'pending' ? 0 : 1; vB = b.status === 'pending' ? 0 : 1; }
      if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
      if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
      return (b.date || "").localeCompare(a.date || "");
    });
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      tr.innerHTML = `<td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
        <td>${t.date || ''}</td><td>${t.category || ''}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td style="color:rgba(255,255,255,0.6)">${t.memo || ''}</td>`;
      tbody.appendChild(tr);
    });
  }

  function toggleSort(field) { sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc'; sortConfig.field = field; renderTransactions(); }

  function openModal(id = null) {
    editingId = id;
    const m = document.getElementById('modal');
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Bewerken';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      document.getElementById('target-account').value = t.accountId || accounts[0].id;
      document.getElementById('account-select-container').style.display = 'block';
      document.getElementById('edit-actions').style.display = 'flex';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuw';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = ''; document.getElementById('memo').value = ''; document.getElementById('amount').value = ''; document.getElementById('status').value = 'pending';
      document.getElementById('account-select-container').style.display = 'none';
      document.getElementById('edit-actions').style.display = 'none';
    }
    m.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = { date: document.getElementById('date').value, category: document.getElementById('category').value || 'Diversen', memo: document.getElementById('memo').value, amount: document.getElementById('amount').value || 0, status: document.getElementById('status').value, accountId: editingId ? document.getElementById('target-account').value : activeAccountId };
    if (editingId) { const i = transactions.findIndex(t => t.id === editingId); transactions[i] = { ...data, id: editingId }; }
    else { data.id = Date.now().toString(); transactions.push(data); }
    localStorage.setItem('payit_transactions', JSON.stringify(transactions)); closeModal(); renderTransactions();
  }

  function duplicateTransaction() {
    if (!editingId) return;
    const t = transactions.find(x => x.id === editingId);
    transactions.push({ ...t, id: Date.now().toString(), accountId: activeAccountId });
    localStorage.setItem('payit_transactions', JSON.stringify(transactions)); closeModal(); renderTransactions();
  }

  function addAccount() {
    const n = prompt("Naam:");
    if (n && n.trim()) { accounts.push({ id: Date.now().toString(), name: n.trim() }); localStorage.setItem('payit_accounts', JSON.stringify(accounts)); renderAccounts(); }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id); const n = prompt("Naam:", acc.name);
    if (n && n.trim()) { acc.name = n.trim(); localStorage.setItem('payit_accounts', JSON.stringify(accounts)); renderAccounts(); }
  }

  function removeAccount(id) {
    if (accounts.length > 1 && confirm("Wissen?")) { accounts = accounts.filter(a => a.id !== id); activeAccountId = accounts[0].id; localStorage.setItem('payit_accounts', JSON.stringify(accounts)); renderAccounts(); renderTransactions(); }
  }

  function deleteTransaction() { if (editingId && confirm('Wissen?')) { transactions = transactions.filter(t => t.id !== editingId); localStorage.setItem('payit_transactions', JSON.stringify(transactions)); closeModal(); renderTransactions(); } }

  renderAccounts();
  renderTransactions();
</script>
</body>
</html>
