<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body {
      margin:0;
      font-family:-apple-system;
      background:#1c1c1e;
      color:white;
    }

    .container { display:flex; height:100vh; }

    .sidebar { width:260px; background:#2c2c2e; padding:20px; }

    .account {
      padding:12px;
      margin:6px 0;
      background:#3a3a3c;
      border-radius:8px;
      cursor:pointer;
    }

    .account.active { background:#0a84ff; }

    .main { flex:1; padding:25px; }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .add-btn {
      background:#0a84ff;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:10px;
      font-size:20px;
      cursor:pointer;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
    }

    th { border-bottom:1px solid #444; }
    td { padding:12px 0; }

    /* MODAL */
    .modal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#2c2c2e;
      padding:30px;
      border-radius:16px;
      width:90%;
      max-width:500px;
    }

    input, select {
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:10px;
      border:none;
      background:#3a3a3c;
      color:white;
    }

    .btn {
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .save-btn { background:#30d158; }
    .close-btn { background:#48484a; }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts"></div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn" id="addBtn">＋</button>
    </div>

    <table>
      <tbody id="transactions"></tbody>
    </table>

  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nieuwe transactie</h3>

    <input type="text" id="date" placeholder="Datum">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo">
    <input type="number" id="amount" placeholder="Bedrag">

    <button class="btn save-btn" onclick="addTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
let transactions = [];

document.getElementById("addBtn").addEventListener("click", openModal);

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function addTransaction() {
  const row = document.createElement("tr");
  row.innerHTML = "<td>" + document.getElementById("memo").value + "</td>";
  document.getElementById("transactions").appendChild(row);
  closeModal();
}
</script>

</body>
</html>
