<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.9</title>
  <style>
    :root {
      --bg-main: #121212;
      --bg-sidebar: #1a1a1a;
      --bg-item: #252525;
      --accent: #4caf50;
      --text-main: #e0e0e0;
      --text-dim: #888;
      --border: #282828;
    }

    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg-main); 
      color: var(--text-main); 
      font-size: 20px; 
      -webkit-font-smoothing: antialiased;
    }

    .container { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { 
      width: 320px; 
      background: var(--bg-sidebar); 
      padding: 30px 20px; 
      border-right: 1px solid var(--border); 
      display: flex; 
      flex-direction: column;
    }
    
    .sidebar h2 { 
      font-size: 14px; 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      color: var(--accent); 
      margin-bottom: 25px; 
      margin-left: 10px;
    }

    .account-item { 
      display: flex; 
      align-items: center; 
      margin-bottom: 8px; 
      gap: 8px;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    
    .account-item:hover { background: rgba(255,255,255,0.03); }

    .account { 
      flex: 1; 
      padding: 12px 16px; 
      background: transparent; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 18px;
      transition: all 0.2s;
    }
    
    .account.active { 
      background: var(--accent); 
      color: white; 
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
    }

    .acc-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      opacity: 0; /* Verbergen tot hover */
      transition: all 0.2s;
    }
    
    .account-item:hover .acc-btn { opacity: 1; }
    .acc-btn:hover { background: #333; color: white; }

    .add-acc-btn { 
      width: calc(100% - 20px);
      margin: 20px 10px;
      padding: 12px; 
      background: transparent; 
      border: 1px dashed #444; 
      color: var(--text-dim); 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px;
      transition: all 0.2s;
    }
    
    .add-acc-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Main Content */
    .main { flex: 1; padding: 40px 60px; overflow-y: auto; }
    
    .topbar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 40px; 
    }
    
    .topbar h2 { font-size: 32px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }

    .add-btn { 
      background: var(--accent); 
      border: none; 
      color: white; 
      width: 48px;
      height: 48px;
      border-radius: 12px; 
      font-size: 24px; 
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .add-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    
    th { 
      padding: 12px 10px; 
      text-align: left; 
      color: var(--text-dim); 
      border-bottom: 1px solid var(--border); 
      cursor: pointer; 
      font-size: 13px; 
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    
    th:hover { color: white; }
    
    td { 
      padding: 20px 10px; 
      border-bottom: 1px solid var(--border); 
      font-size: 19px;
      transition: background 0.2s;
    }

    tr:hover td { background: rgba(255,255,255,0.015); cursor: pointer; }

    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 140px; color: var(--text-dim); font-size: 17px; }
    th:nth-child(3), td:nth-child(3) { width: 220px; font-weight: 500; }
    th:nth-child(4), td:nth-child(4) { width: 150px; text-align: right; font-weight: 600; }

    .status-dot { 
      display: inline-block; 
      width: 10px; 
      height: 10px; 
      border-radius: 50%; 
    }
    .green { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.5); }
    .red { background: #ff5252; box-shadow: 0 0 8px rgba(255,82,82,0.5); }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #1e1e1e; padding: 40px; border-radius: 20px; width: 480px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .modal-content h3 { margin-top: 0; font-size: 24px; margin-bottom: 25px; }
    .modal-content label { display: block; margin-top: 18px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-content input, .modal-content select { width: 100%; padding: 14px; margin-top: 6px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
    
    .btn-group { display: flex; gap: 12px; margin-top: 25px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .save-btn { background: var(--accent); color: white; width: 100%; margin-top: 15px; }
    .duplicate-btn { background: #2196F3; color: white; }
    .delete-btn { background: transparent; color: #ff5252; border: 1px solid #ff5252; }
    .close-btn { background: transparent; color: var(--text-dim); width: 100%; margin-top: 10px; }
    .close-btn:hover { color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <label>Categorie</label>
    <input type="text" id="category">
    <label>Memo</label>
    <input type="text" id="memo">
    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    
    <div id="account-select-container">
        <label>Verplaats naar rekening</label>
        <select id="target-account"></select>
    </div>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    
    <div class="btn-group" id="edit-actions">
        <button class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
        <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    </div>
    
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
  // SCRIPT LOGICA IS ONGEWIJZIGD GEBLEVEN (VERSUE 1.8)
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    if(!list) return;
    list.innerHTML = '';
    const displayAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    displayAccounts.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      item.innerHTML = `
        <div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
        <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
        <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>
      `;
      list.appendChild(item);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
    updateAccountDropdown();
  }

  function updateAccountDropdown() {
    const select = document.getElementById('target-account');
    if(!select) return;
    select.innerHTML = '';
    [...accounts].sort((a, b) => a.name.localeCompare(b.name)).forEach(acc => {
      const opt = document.createElement('option');
      opt.value = acc.id;
      opt.innerText = acc.name;
      select.appendChild(opt);
    });
  }

  function selectAccount(id) {
    activeAccountId = id;
    renderAccounts();
    renderTransactions();
  }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    if(!tbody) return;
    tbody.innerHTML = '';
    let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    data.sort((a, b) => {
      let vA = a[sortConfig.field] || "";
      let vB = b[sortConfig.field] || "";
      if (sortConfig.field === 'amount') { vA = parseFloat(a.amount) || 0; vB = parseFloat(b.amount) || 0; }
      if (sortConfig.field === 'status') { vA = a.status === 'pending' ? 0 : 1; vB = b.status === 'pending' ? 0 : 1; }
      if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
      if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
      return (b.date || "").localeCompare(a.date || "");
    });
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      tr.innerHTML = `
        <td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
        <td>${t.date || ''}</td>
        <td>${t.category || ''}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td style="color:#666; font-size: 16px;">${t.memo || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function toggleSort(field) {
    sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc';
    sortConfig.field = field;
    renderTransactions();
  }

  function openModal(id = null) {
    editingId = id;
    const m = document.getElementById('modal');
    const accSelect = document.getElementById('account-select-container');
    const editActions = document.getElementById('edit-actions');
    
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Bewerken';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      document.getElementById('target-account').value = t.accountId || accounts[0].id;
      accSelect.style.display = 'block';
      editActions.style.display = 'flex';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuwe transactie';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('status').value = 'pending';
      accSelect.style.display = 'none';
      editActions.style.display = 'none';
    }
    m.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = {
      date: document.getElementById('date').value,
      category: document.getElementById('category').value || 'Diversen',
      memo: document.getElementById('memo').value,
      amount: document.getElementById('amount').value || 0,
      status: document.getElementById('status').value,
      accountId: editingId ? document.getElementById('target-account').value : activeAccountId
    };
    if (editingId) {
      const i = transactions.findIndex(t => t.id === editingId);
      transactions[i] = { ...data, id: editingId };
    } else {
      data.id = Date.now().toString();
      transactions.push(data);
    }
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function duplicateTransaction() {
    if (!editingId) return;
    const t = transactions.find(x => x.id === editingId);
    const copy = { 
        ...t, 
        id: Date.now().toString(), 
        accountId: activeAccountId 
    };
    transactions.push(copy);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function addAccount() {
    const n = prompt("Naam rekening:");
    if (n && n.trim()) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: n.trim() });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const n = prompt("Nieuwe naam:", acc.name);
    if (n && n.trim()) {
      acc.name = n.trim();
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;
    if (confirm("Wissen?")) {
      accounts = accounts.filter(a => a.id !== id);
      activeAccountId = accounts[0].id;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
      renderTransactions();
    }
  }

  function deleteTransaction() {
    if (editingId && confirm('Wissen?')) {
      transactions = transactions.filter(t => t.id !== editingId);
      localStorage.setItem('payit_transactions', JSON.stringify(transactions));
      closeModal();
      renderTransactions();
    }
  }

  renderAccounts();
  renderTransactions();
</script>
</body>
</html>
