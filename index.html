<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payit v5.5 - FINAL NAVIGATION & PERSISTENT STATE</title>
  <style>
    :root {
      --bg-body: #f1f5f9; 
      --bg-sidebar: #ffffff; 
      --bg-card: #ffffff;
      --bg-input: #f8fafc;
      --primary: #3f8cff; 
      --text-main: #1e293b; 
      --text-muted: #64748b; 
      --border: #e2e8f0; 
      --positive: #10b981; 
      --negative: #ef4444; 
      --orange: #f97316; 
    }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      overscroll-behavior-y: contain;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .sidebar-header {
      padding: 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .main-view {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-body);
      position: relative;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ACCOUNT ITEMS */
    .acc-item {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: all 0.2s;
      position: relative;
    }
    .acc-item:hover { background: var(--bg-body); }
    .acc-item.active { 
      background: #f8fafc;
      border-color: var(--primary); 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .acc-name { font-weight: 700; font-size: 14px; color: var(--text-main); line-height: 1.2; padding-right: 25px; }
    .acc-bal { font-family: "SF Mono", monospace; color: var(--orange); font-size: 13px; font-weight: 700; }
    .acc-settings { position: absolute; right: 12px; top: 18px; opacity: 0.3; font-size: 14px; }

    .content-wrapper {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .summary-hero {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03);
    }
    .hero-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .hero-total { font-size: 32px; font-weight: 800; color: var(--orange); margin-top: 5px; }

    /* TRANSACTIE RIJ */
    .tr-row {
      background: var(--bg-card);
      margin-bottom: 8px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      gap: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s ease;
    }
    .tr-row:hover { background: var(--bg-input); }

    .tr-status-line {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 5px;
    }

    .tr-main-info { flex: 1; min-width: 0; } 
    .tr-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
    .tr-cat { font-weight: 700; font-size: 15px; color: var(--text-main); }
    .tr-date { font-size: 11px; color: var(--text-muted); }
    .tr-memo { color: var(--text-muted); font-size: 13px; line-height: 1.4; display: block; overflow-wrap: break-word; }
    .tr-right-info { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-left: 10px; }
    .tr-amount { font-family: "SF Mono", monospace; font-weight: 700; font-size: 16px; display: block; }

    /* MODALS & BUTTON GRID */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--bg-card); width: 90%; max-width: 480px;
      padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%; padding: 14px; margin-top: 10px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text-main); font-size: 16px; box-sizing: border-box;
    }
    .btn-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 12px; 
      margin-top: 20px; 
    }
    .btn { padding: 16px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; font-size: 15px; text-align: center; }
    .btn-save { background: var(--primary); color: white; }
    .btn-cancel { background: #f1f5f9; color: var(--text-muted); }
    .btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
    .btn-dup { background: #e2e8f0; color: var(--text-main); }

    /* PULL TO REFRESH */
    #pull-indicator { 
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      height: 64px; 
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center; 
      font-size: 13px; 
      font-weight: 700;
      opacity: 0; 
      color: var(--primary);
      z-index: 50; 
      background: var(--bg-body);
    }

    /* IPHONE TAB BAR */
    .iphone-tabs {
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      height: 85px;
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: none; 
      justify-content: space-around; 
      align-items: flex-start; 
      padding-top: 12px;
      z-index: 1100;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
    }
    .tab-item { 
      background: none; 
      border: none; 
      color: var(--text-muted); 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 80px;
      cursor: pointer;
    }
    .tab-icon { font-size: 24px; transition: transform 0.2s ease; }
    .tab-text { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .tab-item.active { color: var(--primary); }

    .green-bg { background-color: var(--positive); }
    .red-bg { background-color: var(--negative); }
    .pos-text { color: var(--positive); }
    .neg-text { color: var(--negative); }

    @media (max-width: 850px) {
      .sidebar { position: fixed; transform: translateX(-100%); height: 100%; }
      .sidebar.open { transform: translateX(0); }
      .iphone-tabs { display: flex; }
      .content-wrapper { padding: 15px; padding-bottom: 110px; }
      .navbar { padding: 0 15px; }
      .modal { align-items: flex-end; }
      .modal-content { border-radius: 24px 24px 0 0; width: 100%; max-width: 100%; padding: 25px;}
    }
  </style>
</head>
<body id="app-body">

<div id="pull-indicator">Laat los om te verversen...</div>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: 800; color: var(--primary); font-size: 22px;">Payit</span>
      <button onclick="openAccountModal()" style="background:var(--bg-card); border:1px solid var(--border); color:var(--primary); width:36px; height:36px; border-radius:10px; cursor:pointer; font-size: 20px;">+</button>
    </div>
    <div class="sidebar-content" id="sidebar-accounts"></div>
    <div style="padding: 15px; text-align: center; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border);" id="sync-label">Sync: OK</div>
  </aside>

  <main class="main-view" id="main-scroll">
    <nav class="navbar">
      <div id="nav-title" style="font-weight: 800; font-size: 17px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Laden...</div>
      <button onclick="openModal()" style="background: var(--primary); color: white; padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; cursor:pointer;">+ Nieuw</button>
    </nav>

    <div class="content-wrapper">
      <div id="transaction-view">
        <div class="summary-hero">
          <div class="hero-label">Huidig Saldo</div>
          <div id="total" class="hero-total">€ 0,00</div>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
          <span style="font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Historie</span>
          <button id="filterBtn" onclick="toggleConfirmed()" style="background:none; border:none; color:var(--primary); font-size: 13px; font-weight: 700;">Toon bevestigd</button>
        </div>
        <div id="transactions-container"></div>
      </div>
    </div>
  </main>
</div>

<div class="iphone-tabs">
  <button class="tab-item" onclick="loadFromCloud()">
    <span class="tab-icon">🔄</span>
    <span class="tab-text">Sync</span>
  </button>
  <button class="tab-item" onclick="openModal()" style="color:var(--primary);">
    <span class="tab-icon" style="font-size: 30px; margin-top: -4px;">⊕</span>
    <span class="tab-text">Nieuw</span>
  </button>
  <button class="tab-item" onclick="toggleSidebar()">
    <span class="tab-icon">🏦</span>
    <span class="tab-text">Rekeningen</span>
  </button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin:0; color:var(--primary); margin-bottom: 12px; font-weight: 800;">Transactie</h3>
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie" list="cat-list">
    <datalist id="cat-list"></datalist>
    <input type="text" id="memo" placeholder="Memo / Omschrijving">
    <div style="display:flex; gap:10px;">
        <input type="number" id="income" placeholder="In" step="0.01" style="color:var(--positive)">
        <input type="number" id="expense" placeholder="Uit" step="0.01" style="color:var(--negative)">
    </div>
    <select id="status"><option value="pending">Afwachtend</option><option value="confirmed">Bevestigd</option></select>
    <select id="target-account"></select>
    
    <div class="btn-grid">
        <button class="btn btn-cancel" onclick="closeModal()">Annuleren</button>
        <button class="btn btn-save" onclick="saveTransaction()">Opslaan</button>
        <button id="btnDeleteTransaction" class="btn btn-danger" style="display:none;" onclick="deleteTransaction()">Wissen</button>
        <button id="btnDupTransaction" class="btn btn-dup" style="display:none;" onclick="duplicateTransaction()">Dupliceren</button>
    </div>
  </div>
</div>

<div class="modal" id="accModal">
  <div class="modal-content">
    <h3 id="accModalTitle" style="font-weight: 800; color: var(--primary);">Rekening Management</h3>
    <input type="text" id="newAccName" placeholder="Naam rekening">
    <div class="btn-grid">
      <button class="btn btn-cancel" onclick="closeAccountModal()">Annuleren</button>
      <button class="btn btn-save" onclick="handleAccountAction()">Opslaan</button>
      <button id="acc-delete-btn" class="btn btn-danger" style="display:none; grid-column: 1/-1;" onclick="deleteAccount()">Verwijder Rekening</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bfbcyskqgasqouzbakpe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmYmN5c2txZ2FzcW91emJha3BlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjkxMzcsImV4cCI6MjA5MTUwNTEzN30._0_530X8aEaLJmPpH0oBoUZnDdG3O0oIwsWHkP1VxqQ';
const DB_RECORD_ID = 'main_user'; 

let categories = ["Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW","BMW - onderhoud en verzekering","Consensus","Correctie","Delhaize","Dienstencheques","Diversen","Eneco","Etentjes","Invecon","Kampen","Kapper-voeten","KBC","Lening","Maxem","NOG TE ONTVANGEN","Nutsvoorzieningen","Onderhoud","Opzij","Opzij voor liq.reserve 01/2027","Overige","Overschrijving","Paypal","Pensioen","Rekening courant","Reserve","Restant voor de maand","Straetus","Straetus-tweewekelijks","Terugbetaling","TotalEnergies","Tuin","Vanalles","Vergoeding laden"];
let accounts = [{ id:'1',name:'Privé'}];
let transactions = [];
let activeAccountId = null;
let editingId = null;
let showConfirmed = false;

function formatCurrency(n) { return new Intl.NumberFormat('nl-BE', { style: 'currency', currency: 'EUR' }).format(n); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function selectAccount(accId) {
    activeAccountId = accId;
    localStorage.setItem('lastActiveAccountId', accId);
    const acc = accounts.find(a => a.id === accId);
    document.getElementById('nav-title').innerText = acc ? acc.name : "Laden...";
    document.getElementById('sidebar').classList.remove('open');
    renderAccounts();
    renderTransactions();
}

function renderAccounts() {
    const sidebar = document.getElementById('sidebar-accounts');
    sidebar.innerHTML = '';
    accounts.forEach(acc => {
        const bal = transactions.filter(t => t.accountId === acc.id).reduce((sum, t) => sum + Number(t.amount), 0);
        const div = document.createElement('div');
        div.className = `acc-item ${activeAccountId === acc.id ? 'active' : ''}`;
        div.onclick = () => selectAccount(acc.id);
        div.innerHTML = `
            <span class="acc-name">${acc.name}</span>
            <span class="acc-bal">${formatCurrency(bal)}</span>
            <span class="acc-settings" onclick="event.stopPropagation(); openAccountModal('${acc.id}')">⚙️</span>
        `;
        sidebar.appendChild(div);
    });
}

function renderTransactions() {
    const container = document.getElementById('transactions-container');
    container.innerHTML = '';
    let allAccT = transactions.filter(t => t.accountId === activeAccountId);
    let totalBal = allAccT.reduce((sum, t) => sum + Number(t.amount), 0);
    let displayList = showConfirmed ? [...allAccT] : allAccT.filter(t => t.status !== 'confirmed');

    displayList.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
        const statusClass = t.status === 'confirmed' ? 'green-bg' : 'red-bg';
        container.innerHTML += `
            <div class="tr-row" onclick="openModal('${t.id}')">
                <div class="tr-status-line ${statusClass}"></div>
                <div class="tr-main-info">
                    <div class="tr-header">
                        <span class="tr-cat">${t.category}</span>
                        <span class="tr-date">${t.date}</span>
                    </div>
                    <span class="tr-memo">${t.memo || '-'}</span>
                </div>
                <div class="tr-right-info">
                    <span class="tr-amount ${t.amount < 0 ? 'neg-text' : 'pos-text'}">${formatCurrency(t.amount)}</span>
                </div>
            </div>
        `;
    });
    document.getElementById('total').innerText = formatCurrency(totalBal);
}

function openModal(id = null) {
    editingId = id;
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('btnDeleteTransaction').style.display = id ? 'block' : 'none';
    document.getElementById('btnDupTransaction').style.display = id ? 'block' : 'none';
    document.getElementById('target-account').innerHTML = accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    document.getElementById('cat-list').innerHTML = categories.map(c => `<option value="${c}">`).join('');
    if (id) {
        let t = transactions.find(x => x.id === id);
        document.getElementById('date').value = t.date;
        document.getElementById('category').value = t.category;
        document.getElementById('memo').value = t.memo;
        document.getElementById('status').value = t.status;
        document.getElementById('target-account').value = t.accountId;
        if(t.amount >= 0) { document.getElementById('income').value = t.amount; document.getElementById('expense').value = ''; }
        else { document.getElementById('expense').value = Math.abs(t.amount); document.getElementById('income').value = ''; }
    } else {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('category').value = ''; document.getElementById('memo').value = '';
        document.getElementById('status').value = 'pending';
        document.getElementById('target-account').value = activeAccountId || accounts[0].id;
    }
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function openAccountModal(id = null) {
    editingAccountId = id;
    document.getElementById('accModal').style.display = 'flex';
    document.getElementById('acc-delete-btn').style.display = id ? 'block' : 'none';
    document.getElementById('newAccName').value = id ? accounts.find(a => a.id === id).name : '';
}
function closeAccountModal() { document.getElementById('accModal').style.display = 'none'; }

async function saveTransaction() {
    let amt = document.getElementById('income').value ? parseFloat(document.getElementById('income').value) : -parseFloat(document.getElementById('expense').value || 0);
    let data = { id: editingId || Date.now().toString(), date: document.getElementById('date').value, category: document.getElementById('category').value, memo: document.getElementById('memo').value, amount: amt, status: document.getElementById('status').value, accountId: document.getElementById('target-account').value };
    if (editingId) transactions[transactions.findIndex(t => t.id === editingId)] = data;
    else transactions.push(data);
    closeModal(); syncToCloud(); renderTransactions(); renderAccounts();
}
function deleteTransaction() { if(confirm('Wissen?')) { transactions = transactions.filter(t => t.id !== editingId); closeModal(); syncToCloud(); renderTransactions(); renderAccounts(); } }
function duplicateTransaction() { let t = transactions.find(x => x.id === editingId); transactions.push({...t, id: Date.now().toString(), status: 'pending'}); closeModal(); syncToCloud(); renderTransactions(); renderAccounts(); }

function handleAccountAction() {
    const name = document.getElementById('newAccName').value;
    if(!name) return;
    if(editingAccountId) accounts.find(a => a.id === editingAccountId).name = name;
    else accounts.push({ id: Date.now().toString(), name });
    closeAccountModal(); syncToCloud(); renderAccounts();
}
function deleteAccount() {
    if(confirm('Echt zeker?')) {
        transactions = transactions.filter(t => t.accountId !== editingAccountId);
        accounts = accounts.filter(a => a.id !== editingAccountId);
        closeAccountModal(); syncToCloud(); renderAccounts();
        if (accounts.length > 0) selectAccount(accounts[0].id);
    }
}
function toggleConfirmed() { showConfirmed = !showConfirmed; document.getElementById('filterBtn').innerText = showConfirmed ? "Verberg bevestigd" : "Toon bevestigd"; renderTransactions(); }

async function syncToCloud() {
    document.getElementById('sync-label').innerText = "Sync: Opslaan...";
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.${DB_RECORD_ID}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ data: { categories, accounts, transactions } }) });
        document.getElementById('sync-label').innerText = "Sync: OK";
    } catch (e) { document.getElementById('sync-label').innerText = "Sync: Offline"; }
}
async function loadFromCloud() {
    document.getElementById('sync-label').innerText = "Sync: Laden...";
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.${DB_RECORD_ID}&select=data`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        const result = await response.json();
        if (result?.[0]?.data) {
            const d = result[0].data;
            if(d.categories) categories = d.categories;
            if(d.accounts) accounts = d.accounts;
            if(d.transactions) transactions = d.transactions;
            const lastId = localStorage.getItem('lastActiveAccountId');
            if (lastId && accounts.find(a => a.id === lastId)) selectAccount(lastId);
            else if (accounts.length > 0) selectAccount(accounts[0].id);
            renderAccounts();
            document.getElementById('sync-label').innerText = "Sync: OK";
        }
    } catch (e) { document.getElementById('sync-label').innerText = "Sync: Fout"; }
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (document.getElementById('modal').style.display === 'flex') saveTransaction();
        else if (document.getElementById('accModal').style.display === 'flex') handleAccountAction();
    }
    if (e.key === 'Escape') { closeModal(); closeAccountModal(); }
});

let startY = 0; let pullDist = 0;
const scrollArea = document.getElementById('main-scroll');
const indicator = document.getElementById('pull-indicator');
scrollArea.addEventListener('touchstart', (e) => { if (scrollArea.scrollTop === 0) startY = e.touches[0].pageY; else startY = 0; });
scrollArea.addEventListener('touchmove', (e) => {
    if (startY === 0) return;
    pullDist = e.touches[0].pageY - startY;
    if (pullDist > 0 && pullDist < 100) { 
        indicator.style.opacity = pullDist / 100; 
        indicator.style.transform = `translateY(${pullDist/2}px)`; 
    }
});
scrollArea.addEventListener('touchend', async () => {
    if (pullDist > 70) await loadFromCloud();
    indicator.style.opacity = 0; indicator.style.transform = `translateY(0)`;
    pullDist = 0; startY = 0;
});

loadFromCloud();
</script>
</body>
</html>
