<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body { margin:0; font-family:Arial; background:#1e1e1e; color:white; }
    .container { display:flex; height:100vh; }

    .sidebar { width:250px; background:#2b2b2b; padding:20px; }

    .account {
      padding:10px; margin:5px 0;
      background:#3a3a3a; border-radius:5px;
    }

    .main { flex:1; padding:20px; }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .add-btn {
      background:#4caf50; border:none;
      color:white; padding:12px 18px;
      border-radius:6px; font-size:20px;
      cursor:pointer;
    }

    table { width:100%; border-collapse:collapse; margin-top:20px; }

    th {
      text-align:left;
      border-bottom:1px solid #444;
      font-size:18px;
      cursor:pointer;
    }

    td {
      padding:10px 0;
      font-size:16px;
      cursor:pointer;
    }

    tr:hover { background:#2a2a2a; }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#2b2b2b;
      padding:30px;
      border-radius:12px;
      width:90%;
      max-width:500px;
    }

    input, select {
      width:100%;
      padding:12px;
      margin:8px 0 15px 0;
      border-radius:6px;
      border:none;
      font-size:16px;
    }

    .btn {
      width:100%;
      padding:12px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
    }

    .save-btn { background:#4caf50; color:white; }
    .delete-btn { background:#ff4444; color:white; }
    .close-btn { background:#666; color:white; }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div class="account">Privé</div>
    <div class="account">VOF</div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="sortBy('date')">Datum</th>
          <th onclick="sortBy('category')">Categorie</th>
          <th>Memo</th>
          <th onclick="sortBy('amount')">Bedrag</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>

  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Nieuwe transactie</h3>

    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo">
    <input type="number" id="amount" placeholder="Bedrag">

    <select id="status">
      <option value="confirmed">Bevestigd</option>
      <option value="pending">Afwachtend</option>
    </select>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    <button class="btn close-btn" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let editIndex = null;
let sortField = null;

function saveToStorage() {
  localStorage.setItem("transactions", JSON.stringify(transactions));
}

function renderTransactions() {
  const table = document.getElementById("transactions");
  table.innerHTML = "";

  let list = [...transactions];

  if (sortField) {
    list.sort((a,b) => a[sortField] > b[sortField] ? 1 : -1);
  }

  list.forEach((t) => {
    const index = transactions.indexOf(t);

    const row = document.createElement("tr");

    const color = t.amount < 0 ? "red" : "lightgreen";
    const sign = t.amount < 0 ? "" : "+";
    const statusIcon = t.status === "confirmed" ? "🟢" : "🔴";

    row.innerHTML = `
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>${t.memo}</td>
      <td style="color:${color};">${sign}${t.amount} €</td>
      <td>${statusIcon}</td>
    `;

    row.onclick = () => editTransaction(index);

    table.appendChild(row);
  });
}

function sortBy(field) {
  sortField = field;
  renderTransactions();
}

function openModal() {
  editIndex = null;
  document.getElementById("modalTitle").innerText = "Nieuwe transactie";

  date.value = "";
  category.value = "";
  memo.value = "";
  amount.value = "";
  status.value = "confirmed";

  document.querySelector(".delete-btn").style.display = "none";

  document.getElementById("modal").style.display = "flex";
}

function editTransaction(index) {
  const t = transactions[index];
  editIndex = index;

  document.getElementById("modalTitle").innerText = "Transactie bewerken";
  date.value = t.date;
  category.value = t.category;
  memo.value = t.memo;
  amount.value = t.amount;
  status.value = t.status;

  document.querySelector(".delete-btn").style.display = "block";

  document.getElementById("modal").style.display = "flex";
}

function saveTransaction() {
  const transaction = {
    date: date.value,
    category: category.value,
    memo: memo.value,
    amount: parseFloat(amount.value),
    status: status.value
  };

  if (editIndex !== null) {
    transactions[editIndex] = transaction;
  } else {
    transactions.push(transaction);
  }

  saveToStorage();
  renderTransactions();
  closeModal();
}

function deleteTransaction() {
  if (editIndex !== null && confirm("Zeker verwijderen?")) {
    transactions.splice(editIndex, 1);
    saveToStorage();
    renderTransactions();
    closeModal();
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

renderTransactions();
</script>

</body>
</html>
