<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.1 Ultra Glass</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #10b981;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif; 
      background: var(--bg-gradient);
      color: white; 
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
    }

    .sidebar { 
      width: 300px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(30px);
    }

    .account {
      padding: 14px;
      border-radius: 12px;
      background: var(--glass-bg);
      margin-bottom: 10px;
      cursor: pointer;
    }

    .account.active { background: var(--accent); }

    .main {
      flex: 1;
      padding: 30px;
      border-radius: 20px;
      background: rgba(30,41,59,0.6);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .add-btn {
      background: orange;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      font-size:20px;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      table-layout: fixed;
    }

    th, td {
      padding:10px;
    }

    /* 👉 ENIGE WIJZIGING: compact links */
    th:nth-child(1), td:nth-child(1) { width: 50px; }
    th:nth-child(2), td:nth-child(2) { width: 110px; }
    th:nth-child(3), td:nth-child(3) { width: 120px; }
    th:nth-child(4), td:nth-child(4) { width: 100px; text-align:right; }
    th:nth-child(5), td:nth-child(5) { width: auto; }

    .status-dot {
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .green { background:#10b981; }
    .red { background:red; }

    .modal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#1e293b;
      padding:30px;
      border-radius:10px;
      width:400px;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div class="account active">Privé</div>
    <div class="account">VOF</div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ST</th>
          <th>Datum</th>
          <th>Categorie</th>
          <th>Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="date">
    <input type="text" id="category">
    <input type="text" id="memo">
    <input type="number" id="amount">

    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <button onclick="saveTransaction()">Opslaan</button>
    <button onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let editIndex = null;

function renderTransactions() {
  const table = document.getElementById("transactions");
  table.innerHTML = "";

  transactions.forEach((t, i) => {
    const color = t.status === "confirmed" ? "green" : "red";

    const row = document.createElement("tr");
    row.innerHTML = `
      <td><span class="status-dot ${color}"></span></td>
      <td>${t.date}</td>
      <td>${t.category}</td>
      <td>${t.amount} €</td>
      <td>${t.memo || ""}</td>
    `;

    row.onclick = () => editTransaction(i);
    table.appendChild(row);
  });
}

function openModal(){
  editIndex = null;
  document.getElementById("modal").style.display="flex";
}

function editTransaction(i){
  const t = transactions[i];
  editIndex = i;

  date.value = t.date;
  category.value = t.category;
  memo.value = t.memo;
  amount.value = t.amount;
  status.value = t.status;

  document.getElementById("modal").style.display="flex";
}

function saveTransaction(){
  const obj = {
    date: date.value,
    category: category.value,
    memo: memo.value,
    amount: amount.value,
    status: status.value
  };

  if(editIndex !== null) transactions[editIndex] = obj;
  else transactions.push(obj);

  localStorage.setItem("transactions", JSON.stringify(transactions));
  renderTransactions();
  closeModal();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

renderTransactions();
</script>

</body>
</html>
