<!DOCTYPE html>
<html>
<head>
  <title>Payit - Premium UI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #1e293b, #020617);
      color: #e5e7eb;
      font-size: 18px;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 24px;
      gap: 24px;
      box-sizing: border-box;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px rgba(255,255,255,0.1), 0 25px 60px rgba(0,0,0,0.8);
    }

    .sidebar h2 {
      font-size: 18px;
      color: #34d399;
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .account-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .account {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      transition: all 0.25s ease;
    }

    .account:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(4px);
    }

    .account.active {
      background: linear-gradient(135deg, #34d399, #059669);
      color: white;
      box-shadow: 0 0 20px rgba(52,211,153,0.6);
    }

    .acc-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #9ca3af;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-acc-btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 10px;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.2);
      color: #9ca3af;
      cursor: pointer;
    }

    .add-acc-btn:hover {
      border-color: #34d399;
      color: #34d399;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 30px;
      border-radius: 20px;
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px rgba(255,255,255,0.1), 0 30px 80px rgba(0,0,0,0.9);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .topbar h2 {
      font-size: 26px;
      font-weight: 600;
    }

    .add-btn {
      background: linear-gradient(135deg, #fb923c, #ea580c);
      border: none;
      color: white;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(249,115,22,0.6);
      transition: 0.2s;
    }

    .add-btn:hover {
      transform: translateY(-3px) scale(1.03);
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px 10px;
      color: #e5e7eb;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    td {
      padding: 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    tr {
      transition: all 0.2s ease;
    }

    tr:hover {
      background: rgba(255,255,255,0.08);
      transform: scale(1.002);
    }

    th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 120px; }
    th:nth-child(3), td:nth-child(3) { width: 180px; }
    th:nth-child(4), td:nth-child(4) { width: 140px; text-align: right; }

    td:nth-child(5) {
      color: #cbd5f5;
    }

    /* ===== STATUS ===== */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .green {
      background: #34d399;
      box-shadow: 0 0 12px #34d399, 0 0 25px #34d399;
    }

    .red {
      background: #ef4444;
      box-shadow: 0 0 12px #ef4444, 0 0 25px #ef4444;
    }

    /* ===== MODAL ===== */
    .modal {
      background: rgba(0,0,0,0.8);
    }

    .modal-content {
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(30px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }

    .modal-content input, .modal-content select {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
    }

    .save-btn {
      background: linear-gradient(135deg, #fb923c, #ea580c);
    }

  </style>
</head>
<body>
