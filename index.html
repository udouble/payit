<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1e1e1e;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #2b2b2b;
      padding: 20px;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .account {
      padding: 10px;
      margin: 5px 0;
      background: #3a3a3a;
      border-radius: 5px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      text-align: left;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    td {
      padding: 8px 0;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div class="account">Privé</div>
    <div class="account">VOF</div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn">＋</button>
    </div>

    <table>
      <tr>
        <th>Datum</th>
        <th>Categorie</th>
        <th>Memo</th>
        <th>Bedrag</th>
        <th>Status</th>
      </tr>

      <tr>
        <td>09/04/2026</td>
        <td>Boodschappen</td>
        <td>Colruyt</td>
        <td style="color:red;">-85,20 €</td>
        <td>🔴</td>
      </tr>

      <tr>
        <td>08/04/2026</td>
        <td>Inkomen</td>
        <td>Loon</td>
        <td style="color:lightgreen;">+2.500,00 €</td>
        <td>🟢</td>
      </tr>

    </table>

  </div>

</div>

</body>
</html>
