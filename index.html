<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    :root {
      --bg: #020617;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text: white;
      --muted: #94a3b8;
      --accent: #10b981;
      --danger: #ff5252;
    }

    body.light {
      --bg: #f8fafc;
      --card: white;
      --border: #e2e8f0;
      --text: #020617;
      --muted: #64748b;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 18px;
    }

    .container {
      display: flex;
      height: 100vh;
      gap: 20px;
      padding: 20px;
      box-sizing: border-box;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .account-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .account {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
    }

    .account.active {
      background: var(--accent);
      color: white;
    }

    .acc-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
    }

    .add-acc-btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 25px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .add-btn {
      background: var(--accent);
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 20px;
      color: white;
      cursor: pointer;
    }

    .theme-toggle {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    th {
      font-size: 14px;
      color: var(--muted);
      padding: 6px;
    }

    tr {
      background: var(--card);
      border-radius: 10px;
    }

    td {
      padding: 12px 8px;
    }

    th:nth-child(1), td:nth-child(1) { width: 50px; }
    th:nth-child(2), td:nth-child(2) { width: 110px; }
    th:nth-child(3), td:nth-child(3) { width: 140px; }
    th:nth-child(4), td:nth-child(4) { width: 110px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .green { background: var(--accent); }
    .red { background: var(--danger); }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: var(--card);
      padding: 30px;
      border-radius: 14px;
      width: 420px;
      border: 1px solid var(--border);
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .save-btn { background: var(--accent); color:white; }
    .duplicate-btn { background: #3b82f6; color:white; }
    .delete-btn { background: transparent; color: var(--danger); border:1px solid var(--danger); }
    .close-btn { background: #555; color:white; margin-top: 10px; }

    /* MOBILE */
    @media (max-width: 700px) {

      .container {
        flex-direction: column;
        padding: 10px;
      }

      .sidebar {
        width: 100%;
        display: flex;
        overflow-x: auto;
        gap: 10px;
      }

      table, tr, td {
        display: block;
      }

      tr {
        margin-bottom: 10px;
        padding: 10px;
      }

      td:nth-child(4) {
        font-weight: bold;
        font-size: 18px;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="add-btn" onclick="openModal()">＋</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>

</div>

<!-- MODAL + SCRIPT = VOLLEDIG ORIGINEEL -->

<script>
/* 👉 ENKEL TOEGEVOEGD: theme toggle */
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
