<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.0</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top left, #1e293b, #0f172a, #020617);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #10b981;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: var(--bg-gradient); 
      background-attachment: fixed;
      color: var(--text-main); 
      font-size: 20px; 
      height: 100vh;
      overflow: hidden;
    }

    .container { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { 
      width: 300px; 
      background: rgba(0, 0, 0, 0.2); 
      backdrop-filter: blur(10px);
      padding: 40px 20px; 
      border-right: 1px solid var(--glass-border); 
    }
    
    .sidebar h2 { 
      font-size: 12px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      color: var(--accent); 
      margin-bottom: 30px; 
      padding-left: 15px;
    }

    .account-item { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }

    .account { 
      flex: 1; 
      padding: 14px 18px; 
      background: var(--glass); 
      border: 1px solid var(--glass-border);
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 18px;
    }

    .account:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
    .account.active { 
      background: var(--accent); 
      color: white; 
      font-weight: 600; 
      border-color: transparent;
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
    }

    .acc-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
      width: 38px; height: 38px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-acc-btn { 
      width: calc(100% - 10px);
      margin-top: 25px;
      padding: 14px; 
      background: transparent; 
      border: 1px dashed #475569; 
      color: var(--text-dim); 
      border-radius: 12px; 
      cursor: pointer;
    }

    /* Main Content */
    .main { flex: 1; padding: 50px 60px; overflow-y: auto; }
    
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .topbar h2 { font-size: 36px; font-weight: 800; letter-spacing: -1px; }

    .add-btn { 
      background: var(--accent); 
      border: none; color: white; 
      width: 54px; height: 54px; 
      border-radius: 16px; 
      font-size: 28px; 
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
      transition: transform 0.2s;
    }
    .add-btn:hover { transform: scale(1.05); }

    /* Table - Ruimteverdeling aangepast */
    table { width: 100%; border-collapse: collapse; }
    
    th { 
      padding: 15px 10px; 
      text-align: left; 
      color: var(--text-dim); 
      font-size: 13px; 
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--glass-border);
    }
    
    td { padding: 22px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }

    /* Breedte kolommen */
    th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; } /* ST */
    th:nth-child(2), td:nth-child(2) { width: 130px; } /* Datum */
    th:nth-child(3), td:nth-child(3) { width: 180px; } /* Categorie */
    th:nth-child(4), td:nth-child(4) { width: 140px; text-align: right; } /* Bedrag */
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 40px; } /* MEMO krijgt alle ruimte */

    .status-dot { 
      display: inline-block; 
      width: 10px; height: 10px; 
      border-radius: 50%; 
    }
    .green { background: #10b981; box-shadow: 0 0 12px #10b981; }
    .red { background: #f43f5e; box-shadow: 0 0 12px #f43f5e; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #0f172a; padding: 40px; border-radius: 24px; width: 480px; border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .modal-content input, .modal-content select { width: 100%; padding: 15px; margin-top: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
    
    .btn-group { display: flex; gap: 12px; margin-top: 25px; }
    .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
    .save-btn { background: var(--accent); color: white; width: 100%; margin-top: 15px; }
    .duplicate-btn { background: #3b82f6; color: white; }
    .delete-btn { background: transparent; color: #f43f5e; border: 1px solid #f43f5e; }
    .close-btn { background: transparent; color: var(--text-dim); width: 100%; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Categorie">
    <input type="text" id="memo" placeholder="Memo / Omschrijving">
    <input type="number" id="amount" step="0.01" placeholder="0.00">
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    
    <div id="account-select-container">
        <select id="target-account"></select>
    </div>

    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    
    <div class="btn-group" id="edit-actions">
        <button class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
        <button class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
    </div>
    
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    if(!list) return;
    list.innerHTML = '';
    const displayAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    displayAccounts.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      item.innerHTML = `
        <div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>
        <button class="acc-btn" onclick="renameAccount('${acc.id}')">✎</button>
        <button class="acc-btn" onclick="removeAccount('${acc.id}')">✕</button>
      `;
      list.appendChild(item);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
    updateAccountDropdown();
  }

  function updateAccountDropdown() {
    const select = document.getElementById('target-account');
    if(!select) return;
    select.innerHTML = '';
    [...accounts].sort((a, b) => a.name.localeCompare(b.name)).forEach(acc => {
      const opt = document.createElement('option');
      opt.value = acc.id;
      opt.innerText = "Verplaats naar: " + acc.name;
      select.appendChild(opt);
    });
  }

  function selectAccount(id) {
    activeAccountId = id;
    renderAccounts();
    renderTransactions();
  }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    if(!tbody) return;
    tbody.innerHTML = '';
    let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    data.sort((a, b) => {
      let vA = a[sortConfig.field] || "";
      let vB = b[sortConfig.field] || "";
      if (sortConfig.field === 'amount') { vA = parseFloat(a.amount) || 0; vB = parseFloat(b.amount) || 0; }
      if (sortConfig.field === 'status') { vA = a.status === 'pending' ? 0 : 1; vB = b.status === 'pending' ? 0 : 1; }
      if (vA < vB) return sortConfig.direction === 'asc' ? -1 : 1;
      if (vA > vB) return sortConfig.direction === 'asc' ? 1 : -1;
      return (b.date || "").localeCompare(a.date || "");
    });
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      tr.innerHTML = `
        <td><span class="status-dot ${t.status === 'confirmed' ? 'green' : 'red'}"></span></td>
        <td>${t.date || ''}</td>
        <td>${t.category || ''}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td style="color:rgba(255,255,255,0.5); padding-left: 40px;">${t.memo || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function toggleSort(field) {
    sortConfig.direction = (sortConfig.field === field && sortConfig.direction === 'asc') ? 'desc' : 'asc';
    sortConfig.field = field;
    renderTransactions();
  }

  function openModal(id = null) {
    editingId = id;
    const m = document.getElementById('modal');
    const accSelect = document.getElementById('account-select-container');
    const editActions = document.getElementById('edit-actions');
    
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Bewerken';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      document.getElementById('target-account').value = t.accountId || accounts[0].id;
      accSelect.style.display = 'block';
      editActions.style.display = 'flex';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuw';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('status').value = 'pending';
      accSelect.style.display = 'none';
      editActions.style.display = 'none';
    }
    m.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = {
      date: document.getElementById('date').value,
      category: document.getElementById('category').value || 'Diversen',
      memo: document.getElementById('memo').value,
      amount: document.getElementById('amount').value || 0,
      status: document.getElementById('status').value,
      accountId: editingId ? document.getElementById('target-account').value : activeAccountId
    };
    if (editingId) {
      const i = transactions.findIndex(t => t.id === editingId);
      transactions[i] = { ...data, id: editingId };
    } else {
      data.id = Date.now().toString();
      transactions.push(data);
    }
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function duplicateTransaction() {
    if (!editingId) return;
    const t = transactions.find(x => x.id === editingId);
    const copy = { ...t, id: Date.now().toString(), accountId: activeAccountId };
    transactions.push(copy);
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function addAccount() {
    const n = prompt("Naam rekening:");
    if (n && n.trim()) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: n.trim() });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const n = prompt("Nieuwe naam:", acc.name);
    if (n && n.trim()) {
      acc.name = n.trim();
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;
    if (confirm("Wissen?")) {
      accounts = accounts.filter(a => a.id !== id);
      activeAccountId = accounts[0].id;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
      renderTransactions();
    }
  }

  function deleteTransaction() {
    if (editingId && confirm('Wissen?')) {
      transactions = transactions.filter(t => t.id !== editingId);
      localStorage.setItem('payit_transactions', JSON.stringify(transactions));
      closeModal();
      renderTransactions();
    }
  }

  renderAccounts();
  renderTransactions();
</script>
</body>
</html>
