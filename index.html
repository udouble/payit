<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.9 FIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #020617; color: white; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #111827; padding: 20px; }
    .account-item { display:flex; gap:8px; margin-bottom:10px; }
    .account { flex:1; padding:10px; background:#1f2937; border-radius:6px; cursor:pointer; }
    .account.active { background:#10b981; }
    .main { flex:1; padding:20px; }
    table { width:100%; }
    td { padding:10px; }
    .status-dot { width:10px;height:10px;border-radius:50%;display:inline-block; }
    .green { background:#10b981; }
    .red { background:#ff5252; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); justify-content:center; align-items:center; }
    .modal-content { background:#111827; padding:20px; width:400px; }
  </style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <h2 id="current-account-title"></h2>
    <button onclick="openModal()">+</button>

    <table>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="date">
    <input type="text" id="category">
    <input type="text" id="memo">
    <input type="number" id="amount">
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <select id="target-account"></select>

    <button onclick="saveTransaction()">Opslaan</button>
    <button onclick="duplicateTransaction()">Dupliceren</button>
    <button onclick="deleteTransaction()">Verwijderen</button>
    <button onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = accounts[0].id;
let editingId = null;
let sortConfig = { field: 'status', direction: 'asc' };

function renderAccounts() {
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';

  [...accounts].sort((a,b)=>a.name.localeCompare(b.name)).forEach(acc=>{
    const div = document.createElement('div');
    div.className = 'account-item';

    div.innerHTML = `
      <div class="account ${acc.id===activeAccountId?'active':''}" onclick="selectAccount('${acc.id}')">
        ${acc.name}
      </div>
      <button onclick="renameAccount('${acc.id}')">✎</button>
      <button onclick="removeAccount('${acc.id}')">✕</button>
    `;

    list.appendChild(div);
  });

  document.getElementById('current-account-title').innerText =
    accounts.find(a=>a.id===activeAccountId)?.name;
}

function renderTransactions() {
  const tbody = document.getElementById('transactions');
  tbody.innerHTML = '';

  transactions
    .filter(t=>t.accountId===activeAccountId)
    .forEach(t=>{
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td><span class="status-dot ${t.status==='confirmed'?'green':'red'}"></span></td>
        <td>${t.date||''}</td>
        <td>${t.category||''}</td>
        <td>€ ${parseFloat(t.amount||0).toFixed(2)}</td>
        <td>${t.memo||''}</td>
      `;

      tr.onclick = ()=>openModal(t.id);

      tbody.appendChild(tr);
    });
}

function openModal(id=null){
  editingId=id;
  document.getElementById('modal').style.display='flex';

  if(id){
    const t = transactions.find(x=>x.id===id);
    date.value=t.date;
    category.value=t.category;
    memo.value=t.memo;
    amount.value=t.amount;
    status.value=t.status;
  } else {
    date.value=new Date().toISOString().split('T')[0];
    category.value='';
    memo.value='';
    amount.value='';
    status.value='pending';
  }
}

function closeModal(){ modal.style.display='none'; }

function saveTransaction(){
  const data={
    id: editingId || Date.now().toString(),
    date: date.value,
    category: category.value,
    memo: memo.value,
    amount: amount.value,
    status: status.value,
    accountId: activeAccountId
  };

  if(editingId){
    const i=transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions', JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function duplicateTransaction(){
  if(!editingId) return;
  const t=transactions.find(x=>x.id===editingId);
  transactions.push({...t,id:Date.now().toString()});
  renderTransactions();
}

function deleteTransaction(){
  transactions=transactions.filter(t=>t.id!==editingId);
  renderTransactions();
}

function addAccount(){
  const n=prompt("Naam?");
  if(!n) return;
  const id=Date.now().toString();
  accounts.push({id,name:n});
  activeAccountId=id;
  renderAccounts();
}

function renameAccount(id){
  const acc=accounts.find(a=>a.id===id);
  const n=prompt("Nieuwe naam",acc.name);
  if(n) acc.name=n;
  renderAccounts();
}

function removeAccount(id){
  accounts=accounts.filter(a=>a.id!==id);
  transactions=transactions.filter(t=>t.accountId!==id);
  activeAccountId=accounts[0]?.id;
  renderAccounts();
  renderTransactions();
}

function selectAccount(id){
  activeAccountId=id;
  renderAccounts();
  renderTransactions();
}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
