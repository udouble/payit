<!DOCTYPE html>
<html>
<head>
  <title>Payit - v3.3 (correct + supabase)</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
      background:#1c1c1e;
      color:#e5e5e7;
      font-size:15px;
    }

    .container{display:flex;height:100vh;}

    .sidebar{
      width:260px;
      background:#2a2a2d;
      padding:18px;
      border-right:1px solid #3a3a3d;
    }

    .account{
      padding:10px 12px;
      border-radius:6px;
      margin-bottom:6px;
      cursor:pointer;
      font-size:14px;
    }

    .account:hover{background:#3a3a3d;}
    .account.active{background:#3f8cff;color:white;}

    .add-account-btn,.cat-btn{
      width:100%;
      padding:10px;
      margin-top:8px;
      background:#3a3a3d;
      border:none;
      color:#ccc;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
    }

    .main{flex:1;padding:24px;}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .total-box{
      background:#ff9f43;
      color:#000;
      padding:6px 12px;
      border-radius:6px;
      font-size:13px;
      font-weight:600;
    }

    .filter-btn{
      background:#3a3a3d;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      font-size:12px;
      color:#ccc;
      cursor:pointer;
    }

    .add-btn{
      background:#3f8cff;
      width:36px;
      height:36px;
      border-radius:10px;
      font-size:20px;
      border:none;
      color:white;
      cursor:pointer;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    th{
      text-align:left;
      font-size:12px;
      color:#888;
      padding:8px;
      border-bottom:1px solid #333;
    }

    td{
      padding:10px 8px;
      border-bottom:1px solid #2a2a2d;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    th:nth-child(1), td:nth-child(1){width:30px;}
    th:nth-child(2), td:nth-child(2){width:110px;}
    th:nth-child(3), td:nth-child(3){width:180px;}
    th:nth-child(4), td:nth-child(4){width:120px;text-align:right;}
    th:nth-child(5), td:nth-child(5){width:auto;}

    .positive{color:#4caf50;}
    .negative{color:#ff5e57;}

    .status-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      display:inline-block;
    }

    .green{background:#4caf50;}
    .red{background:#ff5e57;}

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#2a2a2d;
      padding:20px;
      border-radius:10px;
      width:420px;
    }

    .label{
      font-size:12px;
      color:#888;
      margin-top:10px;
      display:block;
    }

    input,select{
      width:100%;
      padding:10px;
      margin-top:4px;
      background:#1c1c1e;
      border:1px solid #3a3a3d;
      color:white;
      border-radius:6px;
      font-size:14px;
    }

    .amount-row{display:flex;gap:8px;}

    .btn-row{display:flex;gap:8px;margin-top:16px;}

    .btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
    }

    .save{background:#4caf50;}
    .cancel{background:#555;}
    .dup{background:#3f8cff;}
    .del{background:#ff5e57;}

    .autocomplete-box{position:relative;}
    .autocomplete-list{
      position:absolute;
      width:100%;
      background:#1c1c1e;
      border:1px solid #333;
      max-height:160px;
      overflow-y:auto;
    }

    .autocomplete-item{
      padding:8px;
      cursor:pointer;
      font-size:13px;
    }

    .autocomplete-item:hover{background:#333;}

  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
  <button class="add-account-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  <button class="cat-btn" onclick="openCatModal()">Categorie toevoegen</button>
</div>

<div class="main">

<div class="topbar">
  <div style="display:flex;gap:8px;">
    <div id="total" class="total-box"></div>
    <button class="filter-btn" onclick="toggleConfirmed()" id="filterBtn">Toon bevestigd</button>
  </div>
  <button class="add-btn" onclick="openModal()">＋</button>
</div>

<table>
<thead>
<tr>
  <th>ST</th>
  <th>Datum</th>
  <th>Categorie</th>
  <th>Bedrag</th>
  <th>Memo</th>
</tr>
</thead>
<tbody id="transactions-body"></tbody>
</table>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">

<label class="label">Datum</label>
<input type="date" id="date">

<div class="autocomplete-box">
  <label class="label">Categorie</label>
  <input type="text" id="category" oninput="filterCategories()">
  <div id="category-list" class="autocomplete-list"></div>
</div>

<label class="label">Memo</label>
<input type="text" id="memo">

<div class="amount-row">
  <div style="flex:1;">
    <label class="label">Inkomsten</label>
    <input type="number" id="income">
  </div>
  <div style="flex:1;">
    <label class="label">Uitgaven</label>
    <input type="number" id="expense">
  </div>
</div>

<label class="label">Status</label>
<select id="status">
  <option value="pending">Afwachtend</option>
  <option value="confirmed">Bevestigd</option>
</select>

<label class="label">Rekening</label>
<select id="target-account"></select>

<div class="btn-row">
  <button class="btn cancel" onclick="closeModal()">Annuleren</button>
  <button class="btn save" onclick="saveTransaction()">Opslaan</button>
</div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://oubutokvbhfifihjgiiy.supabase.co",
  "sb_publishable_duu2yC3c_-vwRMAam-LyXg_LLegwzo-"
);

let categories = JSON.parse(localStorage.getItem('payit_categories')) || [
"Apple Pay","Bancontact","Belastingen","BTW","BTW-voorzien","BMW"
];

let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];

function filterCategories(){
  const val=category.value.toLowerCase();
  category-list.innerHTML='';
  categories.filter(c=>c.toLowerCase().includes(val)).forEach(c=>{
    let d=document.createElement('div');
    d.className='autocomplete-item';
    d.innerText=c;
    d.onclick=()=>{category.value=c;category-list.innerHTML='';};
    category-list.appendChild(d);
  });
}

async function saveTransaction(){

  if(!categories.includes(category.value)){
    alert("Categorie bestaat niet");
    return;
  }

  let amount=income.value?parseFloat(income.value):-parseFloat(expense.value||0);

  let data={
    date:date.value,
    category:category.value,
    memo:memo.value,
    amount,
    status:status.value,
    accountId:'1'
  };

  transactions.push(data);
  localStorage.setItem('payit_transactions',JSON.stringify(transactions));

  await supabase.from('transactions').insert([data]);

  closeModal();
}

function openModal(){modal.style.display='flex';}
function closeModal(){modal.style.display='none';}

</script>

</body>
</html>
