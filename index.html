<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 1.19</title>

<style>
body { margin:0; font-family:Arial; background:#1e1e1e; color:white; font-size:20px; }
.container { display:flex; height:100vh; }

.sidebar { width:300px; background:#2b2b2b; padding:25px; }
.account { padding:12px; background:#3a3a3a; border-radius:6px; margin-bottom:10px; cursor:pointer; }
.account.active { background:#4caf50; }

.main { flex:1; padding:30px; }

/* HEADER ROW */
.header-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

/* TOTAAL */
.total-box {
  background:#fb923c;
  color:black;
  padding:14px 18px;
  border-radius:10px;
  font-weight:bold;
  display:inline-block;
}

/* PLUS KNOP */
.add-btn {
  background:#4caf50;
  border:none;
  color:white;
  padding:12px 18px;
  font-size:22px;
  border-radius:8px;
  cursor:pointer;
}

/* TABEL */
table { width:100%; border-collapse:collapse; table-layout:fixed; }

th, td {
  padding:12px 10px;
  border-bottom:1px solid #222;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

th { color:#888; }

th:nth-child(1), td:nth-child(1) { width:50px; text-align:center; }
th:nth-child(2), td:nth-child(2) { width:130px; }
th:nth-child(3), td:nth-child(3) { width:180px; }
th:nth-child(4), td:nth-child(4) { width:140px; text-align:right; }
th:nth-child(5), td:nth-child(5) { width:auto; }

.amount-pos { color:#4caf50; }
.amount-neg { color:#ff5252; }

/* MODAL */
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; }
.modal-content { background:#2b2b2b; padding:30px; border-radius:12px; width:480px; }

.modal-content input,
.modal-content select {
  width:100%;
  padding:16px;
  margin-top:8px;
  background:#1a1a1a;
  border:1px solid #444;
  color:white;
  border-radius:8px;
  font-size:20px;
  height:56px;
  box-sizing:border-box;
}

.modal-content label {
  display:block;
  margin-top:18px;
  font-size:16px;
  color:#aaa;
}

.amount-grid { display:flex; gap:12px; }

.btn-row { display:flex; gap:12px; margin-top:20px; }
.btn { flex:1; padding:16px; font-size:18px; border-radius:8px; cursor:pointer; border:none; }

.save-btn { background:#4caf50; color:white; }
.close-btn { background:#555; color:white; }
.duplicate-btn { background:#2196F3; color:white; }
.delete-btn { border:1px solid #ff5252; color:#ff5252; background:transparent; }

.button-section { margin-top:30px; }
.hidden { visibility:hidden; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <div id="accounts-list"></div>
</div>

<div class="main">

  <div class="header-row">
    <div id="total" class="total-box"></div>
    <button class="add-btn" onclick="openModal()">＋</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ST</th>
        <th>Datum</th>
        <th>Categorie</th>
        <th>Bedrag</th>
        <th>Memo</th>
      </tr>
    </thead>
    <tbody id="transactions"></tbody>
  </table>

</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <label>Datum</label>
    <input type="date" id="date">

    <label>Categorie</label>
    <input type="text" id="category">

    <label>Memo</label>
    <input type="text" id="memo">

    <label>Bedrag</label>
    <div class="amount-grid">
      <input type="number" id="income" placeholder="Inkomsten">
      <input type="number" id="expense" placeholder="Uitgaven">
    </div>

    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>

    <label>Verplaats naar rekening</label>
    <select id="target-account"></select>

    <div class="button-section">

      <div class="btn-row">
        <button id="dup-btn" class="btn duplicate-btn" onclick="duplicateTransaction()">Dupliceren</button>
        <button id="del-btn" class="btn delete-btn" onclick="deleteTransaction()">Verwijderen</button>
      </div>

      <div class="btn-row">
        <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
        <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
      </div>

    </div>

  </div>
</div>

<script>
let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{id:'1',name:'Privé'}];
let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
let activeAccountId = localStorage.getItem('active_account') || accounts[0].id;
let editingId=null;

/* 🔥 FIX: dropdown vullen */
function updateAccountDropdown(){
  const select=document.getElementById('target-account');
  if(!select) return;
  select.innerHTML='';
  accounts.forEach(acc=>{
    const opt=document.createElement('option');
    opt.value=acc.id;
    opt.innerText=acc.name;
    select.appendChild(opt);
  });
}

function formatAmount(v){
  return new Intl.NumberFormat('nl-BE',{minimumFractionDigits:2}).format(v);
}

function renderAccounts(){
  const list=document.getElementById('accounts-list');
  list.innerHTML='';
  accounts.forEach(acc=>{
    list.innerHTML+=`<div class="account ${acc.id===activeAccountId?'active':''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>`;
  });
  updateAccountDropdown(); // 🔥 belangrijk
}

function renderTransactions(){
  const tbody=document.getElementById('transactions');
  tbody.innerHTML='';

  let total=0;

  transactions.filter(t=>t.accountId===activeAccountId).forEach(t=>{
    const amount=parseFloat(t.amount)||0;
    total+=amount;

    tbody.innerHTML+=`
      <tr onclick="openModal('${t.id}')">
        <td></td>
        <td>${t.date}</td>
        <td>${t.category}</td>
        <td class="${amount>=0?'amount-pos':'amount-neg'}">€ ${formatAmount(amount)}</td>
        <td>${t.memo||''}</td>
      </tr>`;
  });

  document.getElementById('total').innerText="Totaal: € "+formatAmount(total);
}

function openModal(id=null){
  editingId=id;
  modal.style.display='flex';

  income.value='';
  expense.value='';

  if(id){
    const t=transactions.find(x=>x.id===id);

    date.value=t.date;
    category.value=t.category;
    memo.value=t.memo;
    status.value=t.status;

    if(t.amount>=0) income.value=t.amount;
    else expense.value=Math.abs(t.amount);

    document.getElementById('target-account').value=t.accountId;

    dup-btn.classList.remove('hidden');
    del-btn.classList.remove('hidden');

  } else {
    date.value=new Date().toISOString().split('T')[0];

    dup-btn.classList.add('hidden');
    del-btn.classList.add('hidden');
  }
}

function closeModal(){ modal.style.display='none'; }

function saveTransaction(){
  let inc=parseFloat(income.value)||0;
  let exp=parseFloat(expense.value)||0;
  let amount=inc>0?inc:-exp;

  const data={
    id:editingId||Date.now().toString(),
    date:date.value,
    category:category.value||'Diversen',
    memo:memo.value,
    amount:amount,
    status:status.value,
    accountId:document.getElementById('target-account').value || activeAccountId
  };

  if(editingId){
    const i=transactions.findIndex(t=>t.id===editingId);
    transactions[i]=data;
  } else {
    transactions.push(data);
  }

  localStorage.setItem('payit_transactions',JSON.stringify(transactions));
  closeModal();
  renderTransactions();
}

function duplicateTransaction(){
  const t=transactions.find(x=>x.id===editingId);
  transactions.push({...t,id:Date.now().toString()});
  renderTransactions();
}

function deleteTransaction(){
  transactions=transactions.filter(t=>t.id!==editingId);
  renderTransactions();
}

function selectAccount(id){
  activeAccountId=id;
  localStorage.setItem('active_account',id);
  renderAccounts();
  renderTransactions();
}

renderAccounts();
renderTransactions();
</script>

</body>
</html>
