<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payit v3.0 - Gold Master</title>
  <style>
    :root {
      --bg-body: #f1f5f9; --bg-sidebar: #ffffff; --bg-card: #ffffff; --bg-input: #f8fafc;
      --primary: #3f8cff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
      --positive: #10b981; --negative: #ef4444; --orange: #f97316;
      --theme-btn-bg: #e2e8f0; --theme-btn-text: #64748b;
      --tab-bg: #ffffff;
    }
    [data-theme="dark"] {
      --bg-body: #0f172a; --bg-sidebar: #1e293b; --bg-card: #1e293b; --bg-input: #334155;
      --primary: #60a5fa; --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
      --positive: #4ade80; --negative: #f87171; --orange: #fb923c;
      --theme-btn-bg: #334155; --theme-btn-text: #f1f5f9;
      --tab-bg: #1e293b;
    }
    
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-body); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow: hidden; transition: background-color 0.3s; }
    .app-container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s; z-index: 1000; }
    .sidebar.open { transform: translateX(0); }
    
    .main-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background-color: var(--bg-body); position: relative; padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
    .content-wrapper { padding: 10px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    
    /* HERSTELDE HEADER: NAAM BOVEN SALDO */
    .header-wrapper { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; }
    .header-card { flex: 1; background: var(--bg-card); border-radius: 12px; padding: 12px 16px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
    .acc-title-text { font-weight: 800; font-size: 13px; color: var(--text-muted); text-transform: uppercase; text-align: left; }
    .saldo-container { display: flex; align-items: baseline; gap: 8px; }
    .saldo-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
    .saldo-text { font-size: 26px; font-weight: 800; color: var(--orange); }

    .header-btns-aside { display: flex; gap: 8px; align-items: center; padding-top: 8px; }
    .btn-add { height: 36px; border-radius: 8px; border: none; background: var(--primary); color: white; padding: 0 16px; font-size: 14px; font-weight: 700; cursor: pointer; }

    /* TRANSACTIES */
    .tr-row { background: var(--bg-card); margin-bottom: 4px; padding: 0 14px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; height: 50px; position: relative; overflow: hidden; }
    .tr-status-line { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .tr-main-content { display: flex; flex: 1; align-items: center; gap: 15px; overflow: hidden; }
    .tr-date { font-size: 11px; color: var(--text-muted); font-weight: 700; font-family: "SF Mono", monospace; min-width: 80px; }
    .tr-cat { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .tr-memo-list { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .tr-amount { font-family: "SF Mono", monospace; font-weight: 700; font-size: 15px; text-align: right; min-width: 100px; }

    /* PULL TO REFRESH UI */
    #ptr-indicator { height: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--primary); transition: height 0.2s; background: var(--bg-body); }

    /* OVERIGE STYLES */
    .sidebar-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .acc-item { padding: 12px 16px; border-radius: 10px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; display: flex; flex-direction: column; gap: 2px; }
    .acc-item.active { background: rgba(63, 140, 255, 0.1); border-color: var(--primary); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-card); width: 90%; max-width: 420px; padding: 25px; border-radius: 20px; }
    input, select { width: 100%; height: 44px; padding: 0 12px; margin-top: 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: var(--text-main); font-size: 16px; box-sizing: border-box; }
    .iphone-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: var(--tab-bg); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 1100; padding-bottom: env(safe-area-inset-bottom); }
    
    @media (max-width: 1025px) {
      .sidebar { position: fixed; transform: translateX(-100%); height: 100%; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
      .sidebar.open { transform: translateX(0); }
      .iphone-nav { display: flex; }
    }
    .green-bg { background-color: var(--positive); } .red-bg { background-color: var(--negative); }
    .pos-text { color: var(--positive); } .neg-text { color: var(--negative); }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: 800; color: var(--primary); font-size: 20px;">Payit v3.0</span>
      <button onclick="openAccMgmtModal()" style="border-radius:8px; border:1px solid var(--border); background:none; color:var(--primary); width:32px; height:32px; cursor:pointer;">+</button>
    </div>
    <div class="sidebar-content" style="flex:1; overflow-y:auto; padding:10px;" id="sidebar-accounts"></div>
  </aside>

  <main class="main-view" id="main-view">
    <div id="ptr-indicator">Trekt om te vernieuwen...</div>
    <div class="content-wrapper">
        <div class="header-wrapper">
            <div class="header-card">
                <div id="acc-title-text" class="acc-title-text">REKENING</div>
                <div class="saldo-container">
                    <span class="saldo-label">Saldo</span>
                    <span id="total" class="saldo-text">€ 0,00</span>
                </div>
            </div>
            <div class="header-btns-aside">
                <button class="btn-add" onclick="openModal()">+ Nieuw</button>
            </div>
        </div>
        <div id="transactions-container"></div>
    </div>
  </main>
</div>

<nav class="iphone-nav">
  <button class="nav-item" style="background:none; border:none; color:var(--text-muted);" onclick="toggleSidebar()"><span>💳</span><br><small>REKENINGEN</small></button>
  <button class="nav-item" style="background:none; border:none; color:var(--primary);" onclick="openModal()"><span>⊕</span><br><small>NIEUW</small></button>
  <button class="nav-item" style="background:none; border:none; color:var(--text-muted);" onclick="loadFromCloud()"><span>🔄</span><br><small id="sync-label">SYNC OK</small></button>
</nav>

<div class="modal" id="modal"><div class="modal-content"><h3 style="margin:0 0 15px 0; color:var(--primary);">Transactie</h3><input type="date" id="t-date"><input type="text" id="t-cat" placeholder="Categorie"><input type="text" id="t-memo" placeholder="Omschrijving"><div style="display:flex; gap:10px;"><input type="number" id="t-in" placeholder="In (+)"><input type="number" id="t-out" placeholder="Uit (-)"></div><select id="t-status"><option value="pending">Afwachtend</option><option value="confirmed">Bevestigd</option></select><div style="display:flex; gap:10px; margin-top:20px;"><button style="flex:1; height:44px; border-radius:10px; border:none;" onclick="closeModal()">Annuleer</button><button style="flex:1; height:44px; border-radius:10px; border:none; background:var(--primary); color:white;" onclick="saveTransaction()">Opslaan</button></div></div></div>

<script>
const SUPABASE_URL = 'https://bfbcyskqgasqouzbakpe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmYmN5c2txZ2FzcW91emJha3BlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjkxMzcsImV4cCI6MjA5MTUwNTEzN30._0_530X8aEaLJmPpH0oBoUZnDdG3O0oIwsWHkP1VxqQ';
let accounts = [], transactions = [], activeAccountId = null;

// PULL TO REFRESH LOGICA
let touchStart = 0;
const mainView = document.getElementById('main-view');
const ptr = document.getElementById('ptr-indicator');

mainView.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; });
mainView.addEventListener('touchmove', e => {
    const touchY = e.touches[0].pageY;
    const diff = touchY - touchStart;
    if (mainView.scrollTop <= 0 && diff > 0) {
        ptr.style.height = Math.min(diff, 60) + 'px';
        if (diff > 60) ptr.innerText = "Laat los om te vernieuwen";
    }
});
mainView.addEventListener('touchend', () => {
    if (parseInt(ptr.style.height) > 50) {
        ptr.innerText = "Synchroniseren...";
        loadFromCloud().then(() => { ptr.style.height = '0'; ptr.innerText = "Trekt om te vernieuwen..."; });
    } else { ptr.style.height = '0'; }
});

async function loadFromCloud() {
    try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.main_user&select=data`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        const res = await r.json();
        if (res?.[0]?.data) {
            accounts = res[0].data.accounts || [];
            transactions = res[0].data.transactions || [];
            if (!activeAccountId && accounts.length) activeAccountId = accounts[0].id;
            render();
        }
    } catch (e) { console.error(e); }
}

async function syncToCloud() {
    await fetch(`${SUPABASE_URL}/rest/v1/payit?id=eq.main_user`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { accounts, transactions } })
    });
}

function render() {
    const accList = document.getElementById('sidebar-accounts');
    accList.innerHTML = '';
    accounts.forEach(a => {
        const div = document.createElement('div');
        div.className = `acc-item ${activeAccountId === a.id ? 'active' : ''}`;
        div.onclick = () => { activeAccountId = a.id; document.getElementById('sidebar').classList.remove('open'); render(); };
        div.innerHTML = `<strong>${a.name}</strong>`;
        accList.appendChild(div);
    });

    const activeAcc = accounts.find(a => a.id === activeAccountId);
    document.getElementById('acc-title-text').innerText = activeAcc ? activeAcc.name : "REKENING";

    const container = document.getElementById('transactions-container');
    container.innerHTML = '';
    const filtered = transactions.filter(t => t.accountId === activeAccountId);
    
    // Sortering: Eerst pending, dan confirmed, binnen status op datum
    filtered.sort((a, b) => {
        if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
        return new Date(b.date) - new Date(a.date);
    });

    let total = 0;
    filtered.forEach(t => {
        total += Number(t.amount);
        const d = document.createElement('div');
        d.className = 'tr-row';
        d.innerHTML = `
            <div class="tr-status-line ${t.status === 'confirmed' ? 'green-bg' : 'red-bg'}"></div>
            <div class="tr-main-content">
                <span class="tr-date">${t.date}</span>
                <span class="tr-cat">${t.category}</span>
                <span class="tr-memo-list">${t.memo}</span>
            </div>
            <span class="tr-amount ${t.amount < 0 ? 'neg-text' : 'pos-text'}">€ ${Number(t.amount).toFixed(2)}</span>`;
        container.appendChild(d);
    });
    document.getElementById('total').innerText = `€ ${total.toFixed(2)}`;
}

function openModal() { document.getElementById('modal').style.display = 'flex'; document.getElementById('t-date').valueAsDate = new Date(); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

async function saveTransaction() {
    const amount = (Number(document.getElementById('t-in').value) || 0) - (Number(document.getElementById('t-out').value) || 0);
    const nt = {
        id: Date.now().toString(),
        date: document.getElementById('t-date').value,
        category: document.getElementById('t-cat').value,
        memo: document.getElementById('t-memo').value,
        amount: amount,
        status: document.getElementById('t-status').value,
        accountId: activeAccountId
    };
    transactions.push(nt);
    closeModal();
    render();
    await syncToCloud();
}

loadFromCloud();
</script>
</body>
</html>
