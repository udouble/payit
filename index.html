<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payit - Ultra Premium Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-orange: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 280px;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT --- */
        .container { display: flex; width: 100%; height: 100%; }

        .sidebar {
            width: var(--sidebar-width);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-orange);
            margin: 0 0 30px 10px;
            font-weight: 800;
        }

        .account-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }

        .account {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            border: 1px solid transparent;
            font-size: 16px;
        }

        .account:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        .account.active {
            background: var(--accent-green);
            color: #fff;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            font-weight: 700;
        }

        .main {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .topbar h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- TRANSACTION CARDS --- */
        .transaction-list { display: flex; flex-direction: column; gap: 14px; }

        .transaction-header {
            display: grid;
            grid-template-columns: 40px 140px 200px 1fr 180px;
            padding: 0 30px 15px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .t-card {
            display: grid;
            grid-template-columns: 40px 140px 200px 1fr 180px;
            align-items: center;
            padding: 24px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .t-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .status-dot.confirmed { background: var(--accent-green); box-shadow: 0 0 15px var(--accent-green); }
        .status-dot.pending { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }

        .t-date { color: var(--text-dim); font-size: 15px; }
        .t-cat { font-weight: 700; font-size: 17px; }
        .t-memo { color: var(--text-dim); font-size: 15px; opacity: 0.7; }
        .t-amount { text-align: right; font-weight: 800; font-size: 20px; color: #fff; }

        /* --- MODAL FLASHY DESIGN --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .modal h3 { margin: 0 0 30px 0; font-size: 28px; font-weight: 900; text-align: center; letter-spacing: -1px; }

        /* Inputs Upgrade */
        input, select {
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: white;
            font-family: inherit;
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 16px;
            outline: none;
            transition: 0.2s;
            appearance: none;
        }

        input:focus, select:focus { border-color: #f97316; background: rgba(255, 255, 255, 0.08); }

        /* Flashy Datepicker */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            cursor: pointer;
            scale: 1.2;
        }

        /* MASSIVE BUTTONS */
        .btn-save {
            width: 100%;
            padding: 22px;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(234, 88, 12, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(234, 88, 12, 0.5); }

        .btn-group { display: flex; gap: 12px; margin-top: 15px; }

        .btn-group button {
            flex: 1;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-dup { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3) !important; }
        .btn-del { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.3) !important; }

        .btn-cancel {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-dim);
            margin-top: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: underline;
            opacity: 0.6;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main { padding: 40px 20px; }
            .topbar h1 { font-size: 32px; }
            .transaction-header { display: none; }
            .t-card {
                grid-template-columns: 1fr 120px;
                grid-template-areas: "cat amount" "date amount" "memo memo";
                padding: 20px;
                gap: 5px;
            }
            .t-cat { grid-area: cat; }
            .t-amount { grid-area: amount; font-size: 22px; }
            .t-date { grid-area: date; }
            .t-memo { grid-area: memo; border-top: 1px solid var(--glass-border); margin-top: 10px; padding-top: 10px; }
            .status-dot { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2>REKENINGEN</h2>
        <div id="accounts-list"></div>
        <button class="account" style="background: transparent; border: 1px dashed var(--text-dim); color: var(--text-dim); margin-top: auto; text-align: center;" onclick="addAccount()">+ Nieuwe rekening</button>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 id="current-account-title">Payit</h1>
            <button class="btn-save" style="width: auto; padding: 12px 25px; margin: 0; font-size: 16px;" onclick="openModal()">＋ Nieuw</button>
        </header>

        <div class="transaction-header">
            <div></div>
            <div>Datum</div>
            <div>Categorie</div>
            <div>Omschrijving</div>
            <div style="text-align: right;">Bedrag</div>
        </div>

        <div id="transactions" class="transaction-list"></div>
    </main>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modal-title">Transactie</h3>
        
        <label style="font-size: 11px; color: var(--accent-orange); font-weight: 800; letter-spacing: 1px; margin: 0 0 8px 5px; display: block;">DATUM</label>
        <input type="date" id="date">
        
        <input type="text" id="category" placeholder="Categorie">
        <input type="text" id="memo" placeholder="Memo / Omschrijving">
        
        <div style="position: relative;">
            <span style="position: absolute; left: 20px; top: 18px; color: var(--text-dim); font-weight: 800; font-size: 18px;">€</span>
            <input type="number" id="amount" step="0.01" placeholder="0,00" style="padding-left: 50px;">
        </div>

        <select id="status">
            <option value="pending">⚠️ Afwachtend</option>
            <option value="confirmed">✅ Bevestigd</option>
        </select>
        
        <div id="account-select-container">
            <select id="target-account"></select>
        </div>
        
        <button class="btn-save" onclick="saveTransaction()">Opslaan</button>
        
        <div class="btn-group" id="edit-actions">
            <button class="btn-dup" onclick="duplicateTransaction()">Dupliceren</button>
            <button class="btn-del" onclick="deleteTransaction()">Wissen</button>
        </div>
        
        <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
    </div>
</div>

<script>
    // CORE APP LOGIC
    let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
    let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
    let activeAccountId = accounts[0].id;
    let editingId = null;

    function renderAccounts() {
        const list = document.getElementById('accounts-list');
        list.innerHTML = '';
        accounts.sort((a,b) => a.name.localeCompare(b.name)).forEach(acc => {
            const item = document.createElement('div');
            item.className = 'account-item';
            item.innerHTML = `<div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>`;
            list.appendChild(item);
        });
        document.getElementById('current-account-title').innerText = accounts.find(a => a.id === activeAccountId).name;
        updateAccountDropdown();
    }

    function selectAccount(id) { 
        activeAccountId = id; 
        renderAccounts(); 
        renderTransactions(); 
    }

    function renderTransactions() {
        const container = document.getElementById('transactions');
        container.innerHTML = '';
        let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
        
        data.sort((a,b) => b.date.localeCompare(a.date));

        data.forEach(t => {
            const card = document.createElement('div');
            card.className = 't-card';
            card.onclick = () => openModal(t.id);
            card.innerHTML = `
                <div class="status-dot ${t.status === 'confirmed' ? 'confirmed' : 'pending'}"></div>
                <div class="t-date">${new Date(t.date).toLocaleDateString('nl-NL', {day: '2-digit', month: 'short'})}</div>
                <div class="t-cat">${t.category}</div>
                <div class="t-memo">${t.memo || '-'}</div>
                <div class="t-amount">€ ${parseFloat(t.amount).toLocaleString('nl-NL', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
            `;
            container.appendChild(card);
        });
    }

    function openModal(id = null) {
        editingId = id;
        const m = document.getElementById('modal');
        if (id) {
            const t = transactions.find(x => x.id === id);
            document.getElementById('modal-title').innerText = 'Bewerken';
            document.getElementById('date').value = t.date;
            document.getElementById('category').value = t.category;
            document.getElementById('memo').value = t.memo || '';
            document.getElementById('amount').value = t.amount;
            document.getElementById('status').value = t.status;
            document.getElementById('target-account').value = t.accountId || activeAccountId;
            document.getElementById('edit-actions').style.display = 'flex';
            document.getElementById('account-select-container').style.display = 'block';
        } else {
            document.getElementById('modal-title').innerText = 'Nieuwe Transactie';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('category').value = ''; 
            document.getElementById('memo').value = ''; 
            document.getElementById('amount').value = '';
            document.getElementById('status').value = 'pending';
            document.getElementById('edit-actions').style.display = 'none';
            document.getElementById('account-select-container').style.display = 'none';
        }
        m.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveTransaction() {
        const data = { 
            id: editingId || Date.now().toString(),
            date: document.getElementById('date').value, 
            category: document.getElementById('category').value || 'Diversen', 
            memo: document.getElementById('memo').value, 
            amount: document.getElementById('amount').value || 0, 
            status: document.getElementById('status').value, 
            accountId: editingId ? document.getElementById('target-account').value : activeAccountId 
        };
        if (editingId) {
            const i = transactions.findIndex(t => t.id === editingId);
            transactions[i] = data;
        } else {
            transactions.push(data);
        }
        localStorage.setItem('payit_transactions', JSON.stringify(transactions));
        closeModal();
        renderTransactions();
    }

    function deleteTransaction() {
        if (confirm('Verwijderen?')) {
            transactions = transactions.filter(t => t.id !== editingId);
            localStorage.setItem('payit_transactions', JSON.stringify(transactions));
            closeModal();
            renderTransactions();
        }
    }

    function duplicateTransaction() {
        const t = transactions.find(x => x.id === editingId);
        const newT = {...t, id: Date.now().toString()};
        transactions.push(newT);
        localStorage.setItem('payit_transactions', JSON.stringify(transactions));
        closeModal();
        renderTransactions();
    }

    function addAccount() {
        const n = prompt("Naam rekening:");
        if (n && n.trim()) {
            accounts.push({ id: Date.now().toString(), name: n.trim() });
            localStorage.setItem('payit_accounts', JSON.stringify(accounts));
            renderAccounts();
        }
    }

    function updateAccountDropdown() {
        const select = document.getElementById('target-account');
        if(!select) return;
        select.innerHTML = '';
        accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id;
            opt.innerText = "Verplaats naar: " + acc.name;
            select.appendChild(opt);
        });
    }

    renderAccounts();
    renderTransactions();
</script>
</body>
</html>
