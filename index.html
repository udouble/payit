<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    /* Basisinstelling: 15pt is ongeveer 20px */
    body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: white; font-size: 20px; }
    .container { display: flex; height: 100vh; }

    /* Sidebar Styling */
    .sidebar { width: 300px; background: #2b2b2b; padding: 20px; border-right: 1px solid #444; display: flex; flex-direction: column; }
    
    .sidebar h2 { font-size: 24px; margin-bottom: 20px; }

    .account-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .account {
      flex: 1;
      padding: 12px;
      background: #3a3a3a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 20px; /* 15pt */
    }

    .account:hover { background: #4a4a4a; }
    .account.active { background: #4caf50; font-weight: bold; }

    .acc-action-btn {
      background: #444;
      border: none;
      color: #ccc;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
    }

    .add-acc-btn {
      margin-top: 15px;
      background: #444;
      border: 1px dashed #888;
      color: white;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 20px; /* 15pt */
    }

    /* Main Content */
    .main { flex: 1; padding: 20px; overflow-y: auto; }

    .topbar h2 { font-size: 24px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .add-btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 24px;
      cursor: pointer;
    }

    /* Table Styling */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { padding: 15px 5px; text-align: left; border-bottom: 1px solid #333; font-size: 20px; }
    th { cursor: pointer; color: #888; user-select: none; text-transform: uppercase; font-size: 16px; }
    th:hover { color: white; }
    
    th:nth-child(1), td:nth-child(1) { width: 60px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 140px; }
    th:nth-child(3), td:nth-child(3) { width: 200px; }
    th:nth-child(4), td:nth-child(4) { width: 130px; text-align: right; }
    th:nth-child(5), td:nth-child(5) { width: auto; padding-left: 20px; color: #aaa; }

    tr:hover { background: #2a2a2a; cursor: pointer; }

    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    .green { background: #4caf50; }
    .red { background: #ff4444; }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #2b2b2b;
      padding: 30px;
      border-radius: 12px;
      width: 480px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .modal-content label { display: block; margin-top: 15px; font-weight: bold; color: #bbb; font-size: 16px; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: white; box-sizing: border-box; font-size: 20px;
    }

    .btn { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .save-btn { background: #4caf50; color: white; }
    .delete-btn { background: #ff4444; color: white; margin-top: 20px; }
    .close-btn { background: #555; color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th>Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Nieuwe transactie</h3>
    <label>Datum</label>
    <input type="date" id="date">
    <label>Categorie</label>
    <input type="text" id="category">
    <label>Memo</label>
    <input type="text" id="memo">
    <label>Bedrag</label>
    <input type="number" id="amount" step="0.01">
    <label>Status</label>
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    <button class="btn save-btn" onclick="saveTransaction()">Opslaan</button>
    <button class="btn close-btn" onclick="closeModal()">Annuleren</button>
    <button class="btn delete-btn" id="delete-btn" onclick="deleteTransaction()" style="display:none;">Verwijderen</button>
  </div>
</div>

<script>
  let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [
    { id: '1', name: 'Privé' },
    { id: '2', name: 'VOF' }
  ];
  
  let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
  let activeAccountId = accounts[0].id;
  let editingId = null;

  // Sorteer staat
  let sortConfig = { field: 'status', direction: 'asc' };

  function renderAccounts() {
    const list = document.getElementById('accounts-list');
    list.innerHTML = '';
    const sortedAccounts = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
    sortedAccounts.forEach(acc => {
      const item = document.createElement('div');
      item.className = 'account-item';
      const div = document.createElement('div');
      div.className = `account ${acc.id === activeAccountId ? 'active' : ''}`;
      div.innerText = acc.name;
      div.onclick = () => { activeAccountId = acc.id; renderAccounts(); renderTransactions(); };
      
      const editBtn = document.createElement('button');
      editBtn.className = 'acc-action-btn';
      editBtn.innerText = '✎';
      editBtn.onclick = (e) => { e.stopPropagation(); renameAccount(acc.id); };
      
      const delBtn = document.createElement('button');
      delBtn.className = 'acc-action-btn';
      delBtn.innerText = '✕';
      delBtn.onclick = (e) => { e.stopPropagation(); removeAccount(acc.id); };
      
      item.appendChild(div);
      item.appendChild(editBtn);
      item.appendChild(delBtn);
      list.appendChild(item);
    });
    const activeAcc = accounts.find(a => a.id === activeAccountId) || accounts[0];
    document.getElementById('current-account-title').innerText = activeAcc.name;
  }

  function addAccount() {
    const name = prompt("Naam nieuwe rekening:");
    if (name && name.trim()) {
      const newId = Date.now().toString();
      accounts.push({ id: newId, name: name.trim() });
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      activeAccountId = newId;
      renderAccounts();
      renderTransactions();
    }
  }

  function renameAccount(id) {
    const acc = accounts.find(a => a.id === id);
    const newName = prompt("Hernoem naar:", acc.name);
    if (newName && newName.trim()) {
      acc.name = newName.trim();
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
    }
  }

  function removeAccount(id) {
    if (accounts.length <= 1) return;
    if (confirm("Rekening verwijderen?")) {
      accounts = accounts.filter(a => a.id !== id);
      if (activeAccountId === id) activeAccountId = accounts[0].id;
      localStorage.setItem('payit_accounts', JSON.stringify(accounts));
      renderAccounts();
      renderTransactions();
    }
  }

  function toggleSort(field) {
    if (sortConfig.field === field) {
      sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
    } else {
      sortConfig.field = field;
      sortConfig.direction = 'asc';
    }
    renderTransactions();
  }

  function renderTransactions() {
    const tbody = document.getElementById('transactions');
    tbody.innerHTML = '';
    
    let filtered = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
    
    filtered.sort((a, b) => {
      let valA = a[sortConfig.field];
      let valB = b[sortConfig.field];

      if (sortConfig.field === 'status') {
        valA = a.status === 'pending' ? 0 : 1;
        valB = b.status === 'pending' ? 0 : 1;
      } else if (sortConfig.field === 'amount') {
        valA = parseFloat(a.amount) || 0;
        valB = parseFloat(b.amount) || 0;
      }

      if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
      if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
      return b.date.localeCompare(a.date);
    });

    filtered.forEach(t => {
      const tr = document.createElement('tr');
      tr.onclick = () => openModal(t.id);
      const statusClass = t.status === 'confirmed' ? 'green' : 'red';
      tr.innerHTML = `
        <td><span class="status-dot ${statusClass}"></span></td>
        <td>${t.date}</td>
        <td>${t.category}</td>
        <td>€ ${parseFloat(t.amount || 0).toFixed(2)}</td>
        <td style="color: #888;">${t.memo || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function openModal(id = null) {
    editingId = id;
    const modal = document.getElementById('modal');
    const deleteBtn = document.getElementById('delete-btn');
    if (id) {
      const t = transactions.find(x => x.id === id);
      document.getElementById('modal-title').innerText = 'Bewerken';
      document.getElementById('date').value = t.date;
      document.getElementById('category').value = t.category;
      document.getElementById('memo').value = t.memo || '';
      document.getElementById('amount').value = t.amount;
      document.getElementById('status').value = t.status;
      deleteBtn.style.display = 'block';
    } else {
      document.getElementById('modal-title').innerText = 'Nieuw';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.getElementById('category').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('status').value = 'pending';
      deleteBtn.style.display = 'none';
    }
    modal.style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function saveTransaction() {
    const data = {
      date: document.getElementById('date').value || new Date().toISOString().split('T')[0],
      category: document.getElementById('category').value || 'Diversen',
      memo: document.getElementById('memo').value,
      amount: document.getElementById('amount').value || 0,
      status: document.getElementById('status').value,
      accountId: activeAccountId
    };
    if (editingId) {
      const index = transactions.findIndex(t => t.id === editingId);
      data.accountId = transactions[index].accountId || accounts[0].id;
      transactions[index] = { ...data, id: editingId };
    } else {
      data.id = Date.now().toString();
      transactions.push(data);
    }
    localStorage.setItem('payit_transactions', JSON.stringify(transactions));
    closeModal();
    renderTransactions();
  }

  function deleteTransaction() {
    if (editingId && confirm('Verwijderen?')) {
      transactions = transactions.filter(t => t.id !== editingId);
      localStorage.setItem('payit_transactions', JSON.stringify(transactions));
      closeModal();
      renderTransactions();
    }
  }

  renderAccounts();
  renderTransactions();
</script>
</body>
</html>
