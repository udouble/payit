<!DOCTYPE html>
<html>
<head>
  <title>Payit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1e1e1e;
      color: white;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #2b2b2b;
      padding: 20px;
    }

    .account {
      padding: 10px;
      margin: 5px 0;
      background: #3a3a3a;
      border-radius: 5px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .add-btn {
      background: #4caf50;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      text-align: left;
      border-bottom: 1px solid #444;
    }

    td {
      padding: 8px 0;
    }

    /* POPUP */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #2b2b2b;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px 0;
      border-radius: 5px;
      border: none;
    }

    .close-btn {
      background: red;
      border: none;
      color: white;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Rekeningen</h2>
    <div class="account">Privé</div>
    <div class="account">VOF</div>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Transacties</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <tr>
        <th>Datum</th>
        <th>Categorie</th>
        <th>Memo</th>
        <th>Bedrag</th>
        <th>Status</th>
      </tr>

      <tr>
        <td>09/04/2026</td>
        <td>Boodschappen</td>
        <td>Colruyt</td>
        <td style="color:red;">-85,20 €</td>
        <td>🔴</td>
      </tr>
    </table>

  </div>

</div>

<!-- POPUP -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nieuwe transactie</h3>

    <input type="date">
    <input type="text" placeholder="Categorie">
    <input type="text" placeholder="Memo">
    <input type="number" placeholder="Bedrag">

    <select>
      <option>Bevestigd</option>
      <option>Afwachtend</option>
    </select>

    <button class="close-btn" onclick="closeModal()">Sluiten</button>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
