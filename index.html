<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payit - Premium Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-orange: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 280px;
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT STRUCTURE --- */
        .container { display: flex; width: 100%; height: 100%; }

        /* SIDEBAR (MAC/IPAD) */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 0 0 24px 12px;
            font-weight: 700;
        }

        .account-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
            transition: 0.3s;
        }

        .account {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            border: 1px solid transparent;
        }

        .account:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .account.active {
            background: var(--accent-green);
            color: #fff;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            font-weight: 700;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .topbar h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .add-btn {
            background: var(--accent-orange);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.3);
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(249, 115, 22, 0.4);
        }

        /* --- TRANSACTION CARDS --- */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-header {
            display: grid;
            grid-template-columns: 40px 120px 180px 1fr 150px;
            padding: 0 24px 10px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .t-card {
            display: grid;
            grid-template-columns: 40px 120px 180px 1fr 150px;
            align-items: center;
            padding: 20px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .t-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px) scale(1.005);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }
        .status-dot.confirmed { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
        .status-dot.pending { background: var(--accent-red); box-shadow: 0 0 12px var(--accent-red); }

        .t-date { color: var(--text-dim); font-size: 14px; }
        .t-cat { font-weight: 600; font-size: 16px; }
        .t-memo { color: var(--text-dim); font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 20px; }
        .t-amount { text-align: right; font-weight: 800; font-size: 18px; color: #fff; }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .modal h3 { margin-top: 0; font-size: 24px; font-weight: 800; }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn-group button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--accent-orange); color: white; margin-top: 10px; }
        .btn-dup { background: #3b82f6; color: white; }
        .btn-del { background: transparent; border: 1px solid var(--accent-red) !important; color: var(--accent-red); }

        /* --- RESPONSIVE (MOBILE) --- */
        @media (max-width: 850px) {
            .sidebar { display: none; }
            .main { padding: 30px 20px; }
            .transaction-header { display: none; }
            
            .t-card {
                grid-template-columns: 1fr 100px;
                grid-template-areas: 
                    "cat amount"
                    "date amount"
                    "memo memo";
                gap: 4px;
                padding: 16px;
            }

            .t-cat { grid-area: cat; }
            .t-amount { grid-area: amount; font-size: 20px; align-self: center; }
            .t-date { grid-area: date; font-size: 12px; }
            .t-memo { grid-area: memo; margin-top: 8px; border-top: 1px solid var(--glass-border); pt: 8px; }
            .status-dot { display: none; } /* Of zet hem naast de categorie */
        }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2>REKENINGEN</h2>
        <div id="accounts-list"></div>
        <button class="add-btn" style="background: transparent; border: 1px dashed var(--text-dim); color: var(--text-dim); box-shadow: none; margin-top: auto;" onclick="addAccount()">+ Nieuwe Rekening</button>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 id="current-account-title">Laden...</h1>
            <button class="add-btn" onclick="openModal()">+ Transactie</button>
        </header>

        <div class="transaction-header">
            <div></div>
            <div>Datum</div>
            <div>Categorie</div>
            <div>Omschrijving</div>
            <div style="text-align: right;">Bedrag</div>
        </div>

        <div id="transactions" class="transaction-list">
            </div>
    </main>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modal-title">Transactie</h3>
        <input type="date" id="date">
        <input type="text" id="category" placeholder="Categorie">
        <input type="text" id="memo" placeholder="Memo / Omschrijving">
        <input type="number" id="amount" step="0.01" placeholder="0.00">
        <select id="status">
            <option value="pending">⚠️ Afwachtend</option>
            <option value="confirmed">✅ Bevestigd</option>
        </select>
        <div id="account-select-container">
            <select id="target-account"></select>
        </div>
        
        <button class="btn-save" onclick="saveTransaction()" style="width: 100%;">Opslaan</button>
        
        <div class="btn-group" id="edit-actions" style="margin-top: 10px;">
            <button class="btn-dup" onclick="duplicateTransaction()">Dupliceren</button>
            <button class="btn-del" onclick="deleteTransaction()">Wissen</button>
        </div>
        <button onclick="closeModal()" style="width:100%; background:transparent; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer">Annuleren</button>
    </div>
</div>

<script>
    // DATA & LOGICA (Hetzelfde als jouw basis, maar met nieuwe render-functies)
    let accounts = JSON.parse(localStorage.getItem('payit_accounts')) || [{ id: '1', name: 'Privé' }, { id: '2', name: 'VOF' }];
    let transactions = JSON.parse(localStorage.getItem('payit_transactions')) || [];
    let activeAccountId = accounts[0].id;
    let editingId = null;

    function renderAccounts() {
        const list = document.getElementById('accounts-list');
        list.innerHTML = '';
        accounts.sort((a,b) => a.name.localeCompare(b.name)).forEach(acc => {
            const item = document.createElement('div');
            item.className = 'account-item';
            item.innerHTML = `<div class="account ${acc.id === activeAccountId ? 'active' : ''}" onclick="selectAccount('${acc.id}')">${acc.name}</div>`;
            list.appendChild(item);
        });
        document.getElementById('current-account-title').innerText = accounts.find(a => a.id === activeAccountId).name;
        updateAccountDropdown();
    }

    function selectAccount(id) { activeAccountId = id; renderAccounts(); renderTransactions(); }

    function renderTransactions() {
        const container = document.getElementById('transactions');
        container.innerHTML = '';
        let data = transactions.filter(t => (t.accountId || accounts[0].id) === activeAccountId);
        
        // Sorteer op datum (nieuwste eerst)
        data.sort((a,b) => b.date.localeCompare(a.date));

        data.forEach(t => {
            const card = document.createElement('div');
            card.className = 't-card';
            card.onclick = () => openModal(t.id);
            card.innerHTML = `
                <div class="status-dot ${t.status === 'confirmed' ? 'confirmed' : 'pending'}"></div>
                <div class="t-date">${t.date}</div>
                <div class="t-cat">${t.category}</div>
                <div class="t-memo">${t.memo || '-'}</div>
                <div class="t-amount">€ ${parseFloat(t.amount).toLocaleString('nl-NL', {minimumFractionDigits: 2})}</div>
            `;
            container.appendChild(card);
        });
    }

    // Modal & CRUD functies (verkort overzicht van jouw logica)
    function openModal(id = null) {
        editingId = id;
        const m = document.getElementById('modal');
        if (id) {
            const t = transactions.find(x => x.id === id);
            document.getElementById('modal-title').innerText = 'Bewerk Transactie';
            document.getElementById('date').value = t.date;
            document.getElementById('category').value = t.category;
            document.getElementById('memo').value = t.memo || '';
            document.getElementById('amount').value = t.amount;
            document.getElementById('status').value = t.status;
            document.getElementById('target-account').value = t.accountId || activeAccountId;
            document.getElementById('edit-actions').style.display = 'flex';
        } else {
            document.getElementById('modal-title').innerText = 'Nieuwe Transactie';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('category').value = ''; 
            document.getElementById('memo').value = ''; 
            document.getElementById('amount').value = '';
            document.getElementById('status').value = 'pending';
            document.getElementById('edit-actions').style.display = 'none';
        }
        m.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveTransaction() {
        const data = { 
            id: editingId || Date.now().toString(),
            date: document.getElementById('date').value, 
            category: document.getElementById('category').value || 'Diversen', 
            memo: document.getElementById('memo').value, 
            amount: document.getElementById('amount').value || 0, 
            status: document.getElementById('status').value, 
            accountId: editingId ? document.getElementById('target-account').value : activeAccountId 
        };
        if (editingId) {
            const i = transactions.findIndex(t => t.id === editingId);
            transactions[i] = data;
        } else {
            transactions.push(data);
        }
        localStorage.setItem('payit_transactions', JSON.stringify(transactions));
        closeModal();
        renderTransactions();
    }

    function deleteTransaction() {
        if (confirm('Zeker weten?')) {
            transactions = transactions.filter(t => t.id !== editingId);
            localStorage.setItem('payit_transactions', JSON.stringify(transactions));
            closeModal();
            renderTransactions();
        }
    }

    function duplicateTransaction() {
        const t = transactions.find(x => x.id === editingId);
        const newT = {...t, id: Date.now().toString()};
        transactions.push(newT);
        localStorage.setItem('payit_transactions', JSON.stringify(transactions));
        closeModal();
        renderTransactions();
    }

    function addAccount() {
        const n = prompt("Naam nieuwe rekening:");
        if (n) {
            accounts.push({ id: Date.now().toString(), name: n });
            localStorage.setItem('payit_accounts', JSON.stringify(accounts));
            renderAccounts();
        }
    }

    function updateAccountDropdown() {
        const select = document.getElementById('target-account');
        select.innerHTML = '';
        accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id;
            opt.innerText = "Verplaats naar: " + acc.name;
            select.appendChild(opt);
        });
    }

    renderAccounts();
    renderTransactions();
</script>
</body>
</html>
