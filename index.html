<!DOCTYPE html>
<html>
<head>
  <title>Payit - Versie 2.1 Ultra Glass</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg-gradient: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #10b981;
      --orange: #fb923c;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif; 
      background: var(--bg-gradient);
      color: white; 
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
    }

    /* SIDEBAR */
    .sidebar { 
      width: 300px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
    }

    .account {
      padding: 14px;
      border-radius: 12px;
      background: var(--glass-bg);
      margin-bottom: 10px;
      cursor: pointer;
      transition: .2s;
    }

    .account:hover { transform: translateX(5px); }
    .account.active { background: var(--accent); }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
      border-radius: 20px;
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      overflow-y: auto;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .add-btn {
      background: linear-gradient(135deg,#fb923c,#ea580c);
      border:none;
      padding:12px 18px;
      border-radius:14px;
      font-size:22px;
      color:white;
      cursor:pointer;
    }

    /* TABLE → CARDS */
    table {
      width:100%;
      border-collapse:separate;
      border-spacing:0 12px;
    }

    tr {
      background: var(--glass-bg);
      border-radius: 14px;
      transition:.2s;
    }

    tr:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
    }

    td {
      padding:18px 14px;
    }

    td:nth-child(4) {
      text-align:right;
      font-weight:700;
      color: var(--accent);
    }

    td:nth-child(5) {
      color: #94a3b8;
    }

    .status-dot {
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .green { background:#10b981; box-shadow:0 0 10px #10b981; }
    .red { background:#f43f5e; box-shadow:0 0 10px #f43f5e; }

    /* MODAL */
    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-content {
      background:#0f172a;
      padding:40px;
      border-radius:20px;
      width:500px;
      border:1px solid var(--glass-border);
    }

    /* MOBILE */
    @media (max-width: 640px) {

      .container {
        flex-direction: column;
        padding: 10px;
      }

      .sidebar {
        width: 100%;
        display:flex;
        overflow-x:auto;
      }

      table {
        border-spacing:0 16px;
      }

      tr {
        display:block;
        padding:15px;
      }

      td {
        display:block;
        padding:5px 0;
      }

      td:nth-child(4) {
        text-align:left;
        font-size:20px;
      }
    }

  </style>
</head>
<body>

<!-- ===== JOUW HTML + JS ONGEWIJZIGD ===== -->

<div class="container">
  <div class="sidebar">
    <h2>REKENINGEN</h2>
    <div id="accounts-list"></div>
    <button class="add-acc-btn" onclick="addAccount()">+ Nieuwe rekening</button>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="current-account-title">Laden...</h2>
      <button class="add-btn" onclick="openModal()">＋</button>
    </div>

    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('status')">ST</th>
          <th onclick="toggleSort('date')">Datum</th>
          <th onclick="toggleSort('category')">Categorie</th>
          <th onclick="toggleSort('amount')">Bedrag</th>
          <th onclick="toggleSort('memo')">Memo</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Transactie</h3>
    <input type="date" id="date">
    <input type="text" id="category">
    <input type="text" id="memo">
    <input type="number" id="amount">
    <select id="status">
      <option value="pending">Afwachtend</option>
      <option value="confirmed">Bevestigd</option>
    </select>
    <div id="account-select-container">
      <select id="target-account"></select>
    </div>
    <button onclick="saveTransaction()">Opslaan</button>
    <div id="edit-actions">
      <button onclick="duplicateTransaction()">Dupliceren</button>
      <button onclick="deleteTransaction()">Wissen</button>
    </div>
    <button onclick="closeModal()">Annuleren</button>
  </div>
</div>

<script>
